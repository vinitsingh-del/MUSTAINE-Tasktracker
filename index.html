<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>MUSTAINE</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister()));}
if('caches' in window){caches.keys().then(k=>k.forEach(c=>caches.delete(c)));}
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#202020;
  --b1:#1c1c1c;--b2:#282828;--b3:#363636;
  --red:#e63329;--gold:#c8a84b;--green:#22c55e;--amber:#f59e0b;
  --white:#f0f0f0;--grey:#777;--grey2:#444;
  --fh:'Barlow Condensed',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--fb);-webkit-font-smoothing:antialiased}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glow{0%,100%{text-shadow:0 0 8px rgba(230,51,41,.5)}50%{text-shadow:0 0 24px rgba(230,51,41,.9)}}
@keyframes burnFlow{0%{background-position:0% 50%}100%{background-position:200% 50%}}

/* LOADING */
#ls{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.ls-logo{font-family:var(--fh);font-size:52px;font-weight:900;letter-spacing:.08em;color:var(--red);animation:glow 2s infinite}
.ls-sub{font-family:var(--fm);font-size:10px;letter-spacing:.3em;color:var(--grey);text-transform:uppercase}
.ls-bar{width:160px;height:2px;background:var(--b2);border-radius:1px;overflow:hidden}
.ls-prog{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));animation:lp 1.5s ease-out forwards}
@keyframes lp{from{width:0}to{width:100%}}

/* AUTH */
#as{position:fixed;inset:0;background:var(--bg);z-index:90;display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.aw{width:100%;max-width:360px}
.a-logo{font-family:var(--fh);font-size:48px;font-weight:900;letter-spacing:.08em;color:var(--red);text-align:center;animation:glow 3s infinite}
.a-tag{font-family:var(--fm);font-size:9px;letter-spacing:.28em;color:var(--grey2);text-align:center;text-transform:uppercase;margin-bottom:24px}
.a-box{background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:22px;display:flex;flex-direction:column;gap:12px}
.a-tabs{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:var(--bg);border-radius:6px;padding:3px}
.a-tab{font-family:var(--fh);font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px;border-radius:4px;border:none;background:transparent;color:var(--grey);cursor:pointer}
.a-tab.on{background:var(--red);color:#fff}
.a-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.18em;color:var(--grey2);text-transform:uppercase;margin-bottom:4px}
.a-inp{background:var(--s2);border:1px solid var(--b3);color:var(--white);font-family:var(--fb);font-size:15px;padding:11px 13px;border-radius:8px;outline:none;width:100%;-webkit-appearance:none}
.a-inp:focus{border-color:var(--red)}
.a-inp::placeholder{color:var(--grey2)}
.a-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px;font-family:var(--fh);font-size:17px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;width:100%}
.a-btn:disabled{opacity:.4;cursor:not-allowed}
.a-err{font-family:var(--fm);font-size:11px;color:var(--red);background:rgba(230,51,41,.08);border:1px solid rgba(230,51,41,.2);border-radius:6px;padding:8px 12px;display:none;text-align:center}
.a-err.on{display:block}
.a-ok{font-family:var(--fm);font-size:11px;color:var(--green);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:8px 12px;display:none;text-align:center}
.a-ok.on{display:block}
.a-or{display:flex;align-items:center;gap:10px}
.a-or::before,.a-or::after{content:'';flex:1;height:1px;background:var(--b2)}
.a-or span{font-family:var(--fm);font-size:9px;color:var(--grey2)}
.a-magic{background:transparent;border:1px solid var(--b3);color:var(--grey);border-radius:8px;padding:10px;font-family:var(--fm);font-size:11px;letter-spacing:.08em;cursor:pointer;width:100%;text-transform:uppercase}

/* APP */
#app{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden}

/* MOBILE HEADER */
.mob-hdr{flex-shrink:0;background:var(--bg)}
.hdr{padding:10px 14px 8px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--b1)}
.hdr-logo{font-family:var(--fh);font-size:22px;font-weight:900;letter-spacing:.1em;color:var(--red);flex:1}
.hdr-clock{font-family:var(--fm);font-size:11px;color:var(--gold);letter-spacing:.06em}
.hdr-bell{position:relative;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--b2)}
.hdr-bell svg{width:15px;height:15px;stroke:var(--grey)}
.bell-dot{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;display:none;animation:pulse 1.5s infinite}
.bell-dot.on{display:block}
.hdr-out{font-family:var(--fm);font-size:10px;color:var(--grey2);cursor:pointer;padding:5px 9px;border-radius:5px;border:1px solid var(--b2)}
.burn{height:2px;background:var(--b1)}
.burn-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--red));background-size:200% 100%;animation:burnFlow 4s linear infinite;transition:width .5s}
.nav{display:flex;border-bottom:1px solid var(--b1)}
.ntab{flex:1;padding:9px 4px;font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;min-height:40px}
.ntab.on{color:var(--red);border-bottom-color:var(--red)}

/* SIDEBAR (desktop) */
.sidebar{display:none;flex-direction:column;flex-shrink:0;width:240px;min-width:240px;background:var(--s1);border-right:1px solid var(--b1);height:100%}
.sb-logo{font-family:var(--fh);font-size:28px;font-weight:900;letter-spacing:.1em;color:var(--red);padding:20px 18px 14px}
.sb-nav{flex:1;padding:6px 10px;display:flex;flex-direction:column;gap:2px}
.sb-tab{font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);border:none;background:transparent;cursor:pointer;padding:10px 14px;border-radius:7px;text-align:left;border-left:3px solid transparent;min-height:40px}
.sb-tab.on{color:var(--white);background:rgba(230,51,41,.08);border-left-color:var(--red)}
.sb-footer{padding:14px 18px;border-top:1px solid var(--b1)}
.sb-date{font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.sb-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.sb-chip{font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;background:var(--s2);border:1px solid var(--b2);color:var(--grey);cursor:pointer}
.sb-chip:active{border-color:var(--gold)}
.sb-out{font-family:var(--fm);font-size:10px;color:var(--grey2);cursor:pointer;background:none;border:none;padding:2px 0}
.sb-out:hover{color:var(--red)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* VIEWS */
.view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.view.on{display:block}
.view::-webkit-scrollbar{display:none}

/* DAY STRIP */
.day-strip{padding:10px 14px 8px;background:var(--s1);border-bottom:1px solid var(--b1)}
.day-date{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.chips-row{display:flex;gap:5px;flex-wrap:wrap}
.stat-chip{font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;background:var(--s2);border:1px solid var(--b2);color:var(--grey);cursor:pointer}
.stat-chip:active{border-color:var(--gold);color:var(--white)}
.stat-chip.on{border-color:var(--gold);color:var(--white)}
.stat-chip.red{border-color:rgba(230,51,41,.3)}
.stat-chip.red.on,.stat-chip.red:active{border-color:var(--red);color:var(--red)}
.stat-chip b{color:var(--white)}
.stat-chip.red b{color:var(--red)}
.load-msg{margin-top:7px;font-family:var(--fm);font-size:10px;padding:5px 9px;border-radius:6px;border:1px solid;letter-spacing:.04em;display:none}
.lm-ok{display:block;background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2);color:var(--green)}
.lm-mid{display:block;background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2);color:var(--amber)}
.lm-hi{display:block;background:rgba(230,51,41,.06);border-color:rgba(230,51,41,.2);color:var(--red)}

/* ADD BOX */
.add-box{padding:9px 12px;border-bottom:1px solid var(--b1);background:var(--bg)}
.add-row{display:flex;gap:7px}
.add-inp{flex:1;background:var(--s1);border:1px solid var(--b2);color:var(--white);font-family:var(--fb);font-size:14px;padding:9px 12px;border-radius:8px;outline:none;-webkit-appearance:none}
.add-inp:focus{border-color:var(--red)}
.add-inp::placeholder{color:var(--grey2)}
.add-go{background:var(--red);color:#fff;border:none;border-radius:8px;padding:0 16px;font-family:var(--fh);font-size:15px;font-weight:800;letter-spacing:.1em;cursor:pointer;white-space:nowrap}
.add-go:active{opacity:.8}
.add-meta{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px}
.add-sel{background:var(--s1);border:1px solid var(--b2);color:var(--grey);font-family:var(--fm);font-size:11px;padding:7px 10px;border-radius:7px;outline:none;-webkit-appearance:none;appearance:none;width:100%;cursor:pointer}
.add-sel:focus{border-color:var(--red)}
.add-times{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px}
.add-t{background:var(--s1);border:1px solid var(--b2);color:var(--grey);font-family:var(--fm);font-size:11px;padding:7px 10px;border-radius:7px;outline:none;width:100%;-webkit-appearance:none}
.add-t:focus{border-color:var(--red)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:5px;padding:6px 12px;border-bottom:1px solid var(--b1);overflow-x:auto;-webkit-overflow-scrolling:touch}
.toolbar::-webkit-scrollbar{display:none}
.tb{font-family:var(--fm);font-size:10px;padding:5px 10px;border-radius:5px;border:1px solid var(--b2);background:transparent;color:var(--grey);cursor:pointer;white-space:nowrap;flex-shrink:0}
.tb.on{color:var(--white);border-color:var(--gold)}
.tb-sep{flex:1;flex-shrink:0}
.sync{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync.busy{background:var(--amber);animation:pulse .8s infinite}
.sync.err{background:var(--red)}

/* FILTERS */
.filters{display:flex;overflow-x:auto;border-bottom:1px solid var(--b1);-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.ftab{font-family:var(--fm);font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:8px 12px;border:none;background:transparent;color:var(--grey);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0;min-height:38px}
.ftab.on{color:var(--white);border-bottom-color:var(--gold)}
.ftab.dim{opacity:.38}

/* OD BANNER */
.od-banner{margin:6px 12px;padding:7px 11px;background:rgba(230,51,41,.07);border:1px solid rgba(230,51,41,.25);border-radius:7px;font-family:var(--fm);font-size:10px;color:var(--red);display:none;animation:pulse 2s infinite}
.od-banner.on{display:block}

/* SECTION */
.sec{padding:8px 12px 4px;display:flex;align-items:center;justify-content:space-between}
.sec-title{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.2em;color:var(--grey2);text-transform:uppercase}
.sec-btn{font-family:var(--fm);font-size:10px;color:var(--gold);cursor:pointer;background:none;border:none;letter-spacing:.05em}

/* TASK CARDS */
.card-list{padding:0 10px 8px;display:flex;flex-direction:column;gap:7px}
.card{background:var(--s1);border:1px solid var(--b2);border-radius:10px;overflow:hidden;cursor:pointer;animation:fadeUp .2s ease both;transition:border-color .2s;position:relative}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--b3))}
.card.done-card{opacity:.38}
.card.blocked-card{border-color:rgba(230,51,41,.3)}
.card-inner{padding:10px 10px 10px 14px;display:flex;align-items:flex-start;gap:8px}
.card-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--b3);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;background:transparent;transition:all .2s}
.card-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.card-body{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:500;color:var(--white);line-height:1.35;margin-bottom:6px;word-break:break-word}
.card.done-card .card-title{text-decoration:line-through;color:var(--grey)}
.card-chips{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.chip{font-family:var(--fm);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px;border:1px solid;white-space:nowrap}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ctime{font-family:var(--fm);font-size:9px;color:var(--grey2)}
.ctime.od{color:var(--red)}
.ctime.soon{color:var(--amber)}
.ccounts{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.cc{font-family:var(--fm);font-size:9px;color:var(--grey);background:var(--s3);padding:1px 5px;border-radius:3px}
.card-acts{display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0}
.card-del{background:transparent;border:none;color:var(--grey2);font-size:18px;cursor:pointer;line-height:1;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.card-del:active{color:var(--red)}
.card-del.arm{color:var(--red);font-size:9px;font-family:var(--fm);width:auto;padding:3px 6px;border:1px solid rgba(230,51,41,.3)}
.card-blk{background:transparent;border:none;color:var(--grey2);cursor:pointer;font-size:9px;font-family:var(--fm);padding:2px 4px;border-radius:3px}
.card-blk:active{color:var(--red)}
.card.blocked-card .card-blk{color:var(--amber)}
.card-timer{background:var(--s2);border-top:1px solid var(--b2);padding:6px 12px 6px 14px;display:flex;align-items:center;justify-content:space-between}
.ct-disp{font-family:var(--fm);font-size:11px;letter-spacing:.06em;color:var(--gold)}
.ct-disp.run{color:var(--red);animation:glow 2s infinite}
.ct-stop{background:var(--red);color:#fff;border:none;border-radius:4px;padding:3px 9px;font-family:var(--fm);font-size:10px;cursor:pointer}

/* DONE BUTTON */
.show-done-btn{width:calc(100% - 24px);margin:4px 12px 8px;padding:8px;font-family:var(--fm);font-size:10px;background:transparent;border:1px solid var(--b2);color:var(--grey);border-radius:6px;cursor:pointer;text-align:center;display:none}

/* DATE GROUP */
.date-grp{padding:6px 2px 2px;font-family:var(--fm);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--amber)}
.date-grp.past{color:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:44px 20px;color:var(--grey2)}
.empty-ico{font-family:var(--fh);font-size:28px;font-weight:900;letter-spacing:.1em;color:var(--b3);margin-bottom:8px}
.empty-txt{font-family:var(--fm);font-size:11px;letter-spacing:.08em;text-transform:uppercase;line-height:1.8}

/* DRAWER */
#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
#backdrop.on{opacity:1;pointer-events:all}
#drawer{position:fixed;bottom:0;left:0;right:0;max-height:91vh;background:var(--s1);border-radius:14px 14px 0 0;border-top:1px solid var(--b2);z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#drawer.on{transform:translateY(0)}
.dr-drag{width:36px;height:4px;background:var(--b3);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.dr-head{padding:10px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dr-head-title{font-family:var(--fh);font-size:18px;font-weight:800;letter-spacing:.06em;flex:1}
.dr-x{background:none;border:none;color:var(--grey);font-size:22px;cursor:pointer;line-height:1}
.dr-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.dr-body::-webkit-scrollbar{display:none}
.dr-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.18em;color:var(--grey2);text-transform:uppercase;margin-bottom:5px}
.dr-inp{background:var(--s2);border:1px solid var(--b2);color:var(--white);font-family:var(--fb);font-size:14px;padding:10px 11px;border-radius:8px;outline:none;width:100%;-webkit-appearance:none}
.dr-inp:focus{border-color:var(--red)}
.dr-2col{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dr-sel{background:var(--s2);border:1px solid var(--b2);color:var(--white);font-family:var(--fm);font-size:11px;padding:9px 10px;border-radius:8px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;width:100%}
.dr-sel:focus{border-color:var(--red)}
.dr-t{background:var(--s2);border:1px solid var(--b2);color:var(--white);font-family:var(--fm);font-size:11px;padding:9px 10px;border-radius:8px;outline:none;width:100%;-webkit-appearance:none}
/* QA buttons */
.qa-row{display:flex;gap:6px;flex-wrap:wrap}
.qa{flex:1;min-width:0;border:none;border-radius:8px;padding:11px 8px;font-family:var(--fh);font-size:14px;font-weight:800;letter-spacing:.1em;cursor:pointer;text-align:center;text-transform:uppercase}
.qa:active{opacity:.78}
.qa-done{background:var(--green);color:#fff}
.qa-close{background:var(--s3);color:var(--grey);border:1px solid var(--b3)}
.qa-reopen{background:var(--s3);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
/* Stepper */
.stepper{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}
.stepper::-webkit-scrollbar{display:none}
.snode{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:52px;position:relative;cursor:pointer}
.snode:not(:last-child)::after{content:'';position:absolute;top:11px;left:50%;width:100%;height:1px;background:var(--b3);z-index:0}
.snode.past::after{background:var(--red)}
.scircle{width:22px;height:22px;border-radius:50%;border:2px solid var(--b3);background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:11px;font-weight:700;z-index:1;position:relative;color:var(--grey)}
.snode.past .scircle{border-color:var(--red);background:rgba(230,51,41,.12);color:var(--red)}
.snode.cur .scircle{border-color:var(--red);background:var(--red);color:#fff}
.snode.done .scircle{border-color:var(--green);background:var(--green);color:#fff}
.slbl{font-family:var(--fm);font-size:8px;color:var(--grey2);text-transform:uppercase;text-align:center;position:relative;z-index:1}
.snode.cur .slbl{color:var(--white)}
/* Timer */
.timer-card{background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px}
.timer-num{font-family:var(--fh);font-size:44px;font-weight:900;letter-spacing:.04em;color:var(--gold);line-height:1}
.timer-num.run{color:var(--red);animation:glow 2s infinite}
.timer-lbl{font-family:var(--fm);font-size:9px;letter-spacing:.18em;color:var(--grey2);text-transform:uppercase}
.t-start{background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-family:var(--fh);font-size:15px;font-weight:800;letter-spacing:.1em;cursor:pointer;text-transform:uppercase}

.remark-edit-row{display:flex;gap:5px}
.r-save{background:var(--red);color:#fff;border:none;border-radius:5px;padding:5px 11px;font-family:var(--fm);font-size:10px;cursor:pointer;text-transform:uppercase;letter-spacing:.05em}

.att-dl{background:none;border:none;color:var(--gold);font-family:var(--fm);font-size:10px;cursor:pointer;flex-shrink:0}
.att-del{background:none;border:none;color:var(--grey2);font-size:15px;cursor:pointer;flex-shrink:0}

.an-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:13px;margin-bottom:9px;animation:fadeUp .3s ease both}
.an-title{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--grey);text-transform:uppercase;margin-bottom:10px}
.bc-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.bc-lbl{font-family:var(--fm);font-size:9px;color:var(--grey);width:60px;flex-shrink:0;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-track{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden}

.bc-val{font-family:var(--fm);font-size:9px;width:28px;text-align:right;flex-shrink:0}

/* VIEWER BANNER */
.viewer-banner{background:rgba(200,168,75,.08);border-bottom:1px solid rgba(200,168,75,.2);padding:7px 14px;font-family:var(--fm);font-size:10px;color:var(--gold);letter-spacing:.06em;text-align:center;display:none}

#toast.ok{border-color:rgba(34,197,94,.3)}
.t-msg{flex:1;line-height:1.4}

  const usr=()=>sess()?.user;
  const save=d=>localStorage.setItem(K,JSON.stringify({access_token:d.access_token,refresh_token:d.refresh_token,expires_at:Date.now()+(d.expires_in||3600)*1000,user:d.user}));
  const clear=()=>localStorage.removeItem(K);
  async function refresh(){
    const s=sess();if(!s?.refresh_token){clear();return null;}
    if(Date.now()<s.expires_at-90000)return s;
    try{const r=await fetch(SUPA+'/auth/v1/token?grant_type=refresh_token',{method:'POST',headers:{'apikey':ANON,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:s.refresh_token})});if(!r.ok){clear();return null;}const d=await r.json();if(d.access_token){save(d);return d;}clear();return null;}catch{clear();return null;}
  }
  const hdrs=x=>({'apikey':ANON,'Content-Type':'application/json',...(tok()?{'Authorization':'Bearer '+tok()}:{}),...(x||{})});
  async function api(method,path,body,qp,xh){
    await refresh();
    let url=SUPA+path;
    if(qp){const p=new URLSearchParams();Object.entries(qp).forEach(([k,v])=>Array.isArray(v)?v.forEach(vi=>p.append(k,vi)):p.append(k,v));url+='?'+p;}
    const r=await fetch(url,{method,headers:hdrs(xh),body:body!=null?JSON.stringify(body):undefined});
    const txt=await r.text();let d;try{d=txt?JSON.parse(txt):null;}catch{d=txt;}
    if(!r.ok){const m=(Array.isArray(d)?d[0]?.message:null)||d?.message||d?.error||r.statusText;throw new Error(m);}
    return d;
  }
  const row=t=>({id:t.id,user_id:uid2(),title:t.title,tag:t.tag||'personal',priority:t.priority||'medium',stage:t.stage||'todo',done:!!t.done,task_date:t.task_date||today(),task_time:t.task_time||null,remarks:JSON.stringify(Array.isArray(t.remarks)?t.remarks:[]),activity:JSON.stringify(Array.isArray(t.activity)?t.activity:[]),timer_started_at:t.timer_started_at||null,timer_stopped_at:t.timer_stopped_at||null,timer_total_seconds:t.timer_total_seconds||0,recurrence:t.recurrence||'none',start_date:t.start_date||null,finish_date:t.finish_date||null,...(t.created_at?{created_at:t.created_at}:{})});
  async function signIn(e,p){const d=await api('POST','/auth/v1/token',{email:e,password:p},{grant_type:'password'});if(d?.access_token)save(d);return d;}
  async function signUp(e,p,n){const d=await api('POST','/auth/v1/signup',{email:e,password:p,options:{data:{full_name:n}}});if(d?.access_token)save(d);return d;}
  async function signOut(){try{await api('POST','/auth/v1/logout',{});}catch{}clear();}
  async function magic(e){return api('POST','/auth/v1/magiclink',{email:e});}
  async function getTasks(date){await refresh();return(await api('GET','/rest/v1/tasks',null,{task_date:'eq.'+date,select:'*',order:'created_at.asc'}))||[];}
  async function getRange(s,e){await refresh();const r=await fetch(SUPA+'/rest/v1/tasks?task_date=gte.'+s+'&task_date=lte.'+e+'&select=*&order=task_date.desc,created_at.asc',{headers:hdrs()});return r.ok?r.json():[];}
  async function upsert(t){await refresh();return api('POST','/rest/v1/tasks',row(t),{on_conflict:'id'},{'Prefer':'resolution=merge-duplicates,return=representation'});}
  async function del(id){await refresh();return api('DELETE','/rest/v1/tasks',null,{id:'eq.'+id},{'Prefer':'return=minimal'});}
  async function getNotifs(){await refresh();return(await api('GET','/rest/v1/notifications',null,{select:'*',order:'created_at.desc',limit:'50'}))||[];}
  async function addNotif(n){await refresh();const u=uid2();if(!u)return;return api('POST','/rest/v1/notifications',{...n,user_id:u},null,{'Prefer':'return=minimal'});}
  async function readAll(){await refresh();return api('PATCH','/rest/v1/notifications',{read:true},{user_id:'eq.'+uid2(),read:'eq.false'},{'Prefer':'return=minimal'});}
  async function getAtts(tid){await refresh();return(await api('GET','/rest/v1/attachments',null,{task_id:'eq.'+tid,select:'*'}))||[];}
  async function upload(tid,file){
    await refresh();const u=uid2();if(!u)throw new Error('Not authenticated');
    const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');const path=u+'/'+tid+'/'+Date.now()+'_'+safe;
    const r=await fetch(SUPA+'/storage/v1/object/attachments/'+path,{method:'POST',headers:{'apikey':ANON,'Authorization':'Bearer '+tok(),'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},body:file});
    if(!r.ok)throw new Error('Upload failed');
    const rec=await api('POST','/rest/v1/attachments',{task_id:tid,user_id:u,name:file.name,size:file.size,mime_type:file.type||'',storage_path:path},null,{'Prefer':'return=representation'});
    return Array.isArray(rec)?rec[0]:rec;
  }
  async function delAtt(id,path){await refresh();try{await fetch(SUPA+'/storage/v1/object/attachments/'+path,{method:'DELETE',headers:hdrs()});}catch{}return api('DELETE','/rest/v1/attachments',null,{id:'eq.'+id},{'Prefer':'return=minimal'});}
  async function signUrl(path){await refresh();const d=await api('POST','/storage/v1/object/sign/attachments/'+path,{expiresIn:3600});return SUPA+'/storage/v1'+d.signedURL;}
  async function getRole(){await refresh();try{const d=await api('GET','/rest/v1/profiles',null,{id:'eq.'+uid2(),select:'role,viewer_owner_id'});if(d?.[0]){G.role=d[0].role||'owner';G.viewerOwner=d[0].viewer_owner_id;}}catch{G.role='owner';}}
  return{signIn,signUp,signOut,magic,refresh,sess,tok,uid:uid2,usr,getTasks,getRange,upsert,del,getNotifs,addNotif,readAll,getAtts,upload,delAtt,signUrl,getRole};
})();

/* ── BOOT ── */
async function boot(){
  document.getElementById('ls').style.display='flex';
  document.getElementById('as').style.display='none';
  document.getElementById('app').style.display='none';
  const s=await SB.refresh()||SB.sess();

  document.getElementById('add-date').value=today();
  const nh=n.getMinutes()>=30?n.getHours()+1:n.getHours(),nm=n.getMinutes()>=30?0:30;
  document.getElementById('add-time').value=String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');

/* ── LOAD ── */
async function loadTasks(){
  setSyncing(true);
  try{
    let raw;
    if(G.df==='today')raw=await SB.getTasks(today());
    else if(G.df==='week'){const d=new Date();d.setDate(d.getDate()-7);raw=await SB.getRange(d.toISOString().slice(0,10),today());}
    else{const d=new Date();d.setDate(d.getDate()-90);raw=await SB.getRange(d.toISOString().slice(0,10),today());}
    G.tasks=(raw||[]).map(norm);

  }catch(e){setSyncing(false,true);toast('Load failed: '+e.message,'err');}
}

/* ── RENDER ── */
function render(){
  const T=today();
  // Tag filter
  const tagOk=t=>G.filter==='all'||t.tag===G.filter;
  // Source = all loaded tasks matching tag
  const src=G.tasks.filter(tagOk);
  // Categories
  const done=src.filter(t=>t.stage==='done'||t.stage==='closed');
  const blocked=src.filter(t=>t.stage==='blocked');
  const active=src.filter(t=>!['done','closed','blocked'].includes(t.stage));
  const od=active.filter(isOD);

  // ── CHIPS ──
  Q('st-tot',src.length);Q('st-done',done.length);Q('st-active',active.length);Q('st-od',od.length);
  Q('sb-tot',src.length);Q('sb-done',done.length);Q('sb-od',od.length);

  // Chip highlights
  ['chip-all','chip-done','chip-active','chip-od'].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.remove('on');});
  const cmap={all:'chip-all',done:'chip-done',active:'chip-active',overdue:'chip-od'};
  if(G.chip&&cmap[G.chip]){const e=document.getElementById(cmap[G.chip]);if(e)e.classList.add('on');}

  // ── OD BANNER ──
  const ob=document.getElementById('od-banner');
  if(ob){if(od.length){ob.className='od-banner on';ob.textContent=od.length+' overdue task'+(od.length>1?'s':'');}else ob.className='od-banner';}

  // ── LOAD MSG ──
  const lm=document.getElementById('load-msg');
  if(lm){
    const n=active.length;
    if(n===0&&src.length>0){lm.className='load-msg lm-ok';lm.textContent='All done. Clean day.';}
    else if(n<=3&&n>0){lm.className='load-msg lm-ok';lm.textContent=n+' tasks. Light load.';}
    else if(n<=6){lm.className='load-msg lm-mid';lm.textContent=n+' tasks. Moderate day.';}
    else if(n>6){lm.className='load-msg lm-hi';lm.textContent=n+' tasks. Heavy day.';}
    else lm.className='load-msg';
  }

  // ── FILTER TAB COUNTS ──
  document.querySelectorAll('.ftab[data-f]').forEach(b=>{
    const f=b.dataset.f;
    const n=f==='all'?active.length:G.tasks.filter(t=>t.tag===f&&!['done','closed','blocked'].includes(t.stage)).length;
    const base={all:'All',sales:'Sales',revenue:'Revenue',client:'Client',kam:'KAM',design:'Design',ops:'Ops','follow-up':'Follow-up',control:'Control',management:'Management',daily:'Daily'}[f]||f;
    b.textContent=n>0?base+' ('+n+')':base;
    b.classList.toggle('dim',n===0&&G.tasks.length>0&&f!=='all');
  });

  // ── LISTS ──
  const al=document.getElementById('active-list');
  const dl=document.getElementById('done-list');
  const bl=document.getElementById('blocked-list');
  const dh=document.getElementById('done-hdr');
  const bh=document.getElementById('blocked-hdr');
  const sdb=document.getElementById('show-done-btn');
  const ah=document.getElementById('act-hdr');
  const at=document.getElementById('act-title');
  al.innerHTML='';dl.innerHTML='';bl.innerHTML='';

  // Sort active: overdue first, then priority, then time
  const priR={urgent:0,high:1,medium:2,low:3};
  const sorted=active.slice().sort((a,b)=>{
    const ao=isOD(a)?0:1,bo=isOD(b)?0:1;if(ao!==bo)return ao-bo;
    const pr=(priR[a.priority]||2)-(priR[b.priority]||2);if(pr)return pr;
    const at2=a.task_time||a.time||'',bt=b.task_time||b.time||'';
    if(at2&&bt)return at2<bt?-1:1;if(at2&&!bt)return-1;if(!at2&&bt)return 1;
    return new Date(a.created_at)-new Date(b.created_at);
  });

  // Chip filter mode
  if(G.chip==='done'){
    if(ah)ah.style.display='none';if(dh)dh.style.display='none';if(bh)bh.style.display='none';if(sdb)sdb.style.display='none';
    if(!done.length){al.innerHTML='<div class="empty"><div class="empty-ico">[ NONE ]</div><div class="empty-txt">No completed tasks</div></div>';}
    else done.forEach(t=>al.appendChild(mkCard(t)));
  } else if(G.chip==='overdue'){
    if(ah)ah.style.display='none';if(dh)dh.style.display='none';if(bh)bh.style.display='none';if(sdb)sdb.style.display='none';
    if(!od.length){al.innerHTML='<div class="empty"><div class="empty-ico">[ NONE ]</div><div class="empty-txt">No overdue tasks</div></div>';}
    else od.forEach(t=>al.appendChild(mkCard(t)));
  } else if(G.chip==='all'){
    if(ah)ah.style.display='none';if(dh)dh.style.display='none';if(bh)bh.style.display='none';if(sdb)sdb.style.display='none';
    if(!src.length){al.innerHTML='<div class="empty"><div class="empty-ico">[ NONE ]</div><div class="empty-txt">No tasks</div></div>';}
    else{
      if(active.length){const h=document.createElement('div');h.className='sec';h.innerHTML='<div class="sec-title">Active ('+active.length+')</div>';al.appendChild(h);sorted.forEach(t=>al.appendChild(mkCard(t)));}
      if(blocked.length){const h=document.createElement('div');h.className='sec';h.innerHTML='<div class="sec-title" style="color:var(--red)">Blocked ('+blocked.length+')</div>';al.appendChild(h);blocked.forEach(t=>al.appendChild(mkCard(t)));}
      if(done.length){const h=document.createElement('div');h.className='sec';h.innerHTML='<div class="sec-title" style="color:var(--green)">Completed ('+done.length+')</div>';al.appendChild(h);done.forEach(t=>al.appendChild(mkCard(t)));}
    }
  } else {
    // DEFAULT — active list
    if(ah){ah.style.display=sorted.length?'flex':'none';if(at)at.textContent='Active ('+sorted.length+')';}
    if(!sorted.length){
      al.innerHTML='<div class="empty"><div class="empty-ico">[ NONE ]</div><div class="empty-txt">No active tasks'+(G.filter!=='all'?' in '+G.filter:'')+'</div></div>';
    } else if(G.df!=='today'){
      // Group by date
      const grps={};sorted.forEach(t=>{const d=t.task_date||t.date||T;if(!grps[d])grps[d]=[];grps[d].push(t);});
      Object.keys(grps).sort((a,b)=>b.localeCompare(a)).forEach(d=>{
        const ip=d<T;const div=document.createElement('div');div.className='date-grp'+(ip?' past':'');div.textContent=(d===T?'Today':d)+(ip?' — PAST':'');al.appendChild(div);
        grps[d].forEach(t=>al.appendChild(mkCard(t)));
      });
    } else {
      sorted.forEach(t=>al.appendChild(mkCard(t)));
    }
    // Done section
    if(done.length&&dh&&sdb){
      if(G.showDone){dh.style.display='flex';sdb.style.display='none';done.forEach(t=>dl.appendChild(mkCard(t)));}
      else{dh.style.display='none';sdb.style.display='';sdb.textContent='Show '+done.length+' completed';}
    } else {if(dh)dh.style.display='none';if(sdb)sdb.style.display='none';}
    // Blocked
    if(bh)bh.style.display=blocked.length?'flex':'none';
    blocked.forEach(t=>bl.appendChild(mkCard(t)));
  }
}

/* ── mkCard — PURE DOM, NO STRINGS WITH QUOTES ── */
function mkCard(task){
  const id=task.id;
  const tm=TAG[task.tag]||{l:task.tag||'?',c:'#666'};
  const pm=PRI[task.priority]||PRI.medium;
  const sm=STG[task.stage]||STG.todo;
  const od=isOD(task);
  const isDone=task.stage==='done'||task.stage==='closed';
  const isBlocked=task.stage==='blocked';
  const running=tRun(task),elapsed=tEl(task);
  const taskTime=task.task_time||task.time||'';
  const off=minOff(taskTime);
  let tTxt='',tCls='ctime';
  if(taskTime){
    const parts=taskTime.split(':'),h=parseInt(parts[0])||0,m=parseInt(parts[1])||0;
    const ap=h>=12?'pm':'am',hr=h%12||12;
    tTxt=hr+':'+String(m).padStart(2,'0')+' '+ap;
    if(!isDone&&!isBlocked&&off!==null){if(off>5){tCls='ctime od';tTxt+=' - overdue';}else if(off>-20)tCls='ctime soon';}
  }
  const rc=(task.remarks||[]).length,ac=(task.attachments||[]).length;

  // Card
  const card=document.createElement('div');
  card.className='card'+(isDone?' done-card':'')+(isBlocked?' blocked-card':'');
  card.style.setProperty('--accent',od?'#e63329':tm.c);
  card.dataset.id=id;

  // Inner
  const inner=document.createElement('div');inner.className='card-inner';

  // Check button
  const chk=document.createElement('button');
  chk.className='card-check'+(isDone?' checked':'');
  chk.textContent='✓';
  chk.addEventListener('click',e=>{e.stopPropagation();if(!V())toggleDone(e,id);});

  // Body
  const body=document.createElement('div');body.className='card-body';

  // Title
  const title=document.createElement('div');title.className='card-title';title.id='ct-'+id;title.textContent=task.title||'';
  title.addEventListener('dblclick',e=>{e.stopPropagation();if(!V())startEdit(e,id);});
  body.appendChild(title);

  // Chips row
  const chips=document.createElement('div');chips.className='card-chips';

  const pdot=document.createElement('div');pdot.className='pdot';pdot.style.background=pm.c;pdot.title=pm.l;chips.appendChild(pdot);

  const tagC=document.createElement('span');tagC.className='chip';tagC.style.cssText='color:'+tm.c+';border-color:'+tm.c+'33;background:'+tm.c+'14';tagC.textContent=tm.l;chips.appendChild(tagC);

  const stgC=document.createElement('span');stgC.className='chip';stgC.style.cssText='color:'+sm.c+';border-color:'+sm.c+'33;background:'+sm.c+'14';stgC.textContent=sm.l;
  stgC.addEventListener('click',e=>{e.stopPropagation();if(!V())cycleStage(id);});chips.appendChild(stgC);

  if(task.recurrence==='daily'){const rc2=document.createElement('span');rc2.className='chip';rc2.style.cssText='color:#f97316;border-color:#f9731633;background:#f9731614';rc2.textContent='DAILY';chips.appendChild(rc2);}
  if(od){const oc=document.createElement('span');oc.className='chip';oc.style.cssText='color:var(--red);border-color:rgba(230,51,41,.25);background:rgba(230,51,41,.08)';oc.textContent='OVERDUE';chips.appendChild(oc);}
  if(tTxt){const tc=document.createElement('span');tc.className=tCls;tc.textContent=tTxt;chips.appendChild(tc);}
  if(task.task_date&&task.task_date!==today()&&G.df!=='today'){const dc=document.createElement('span');dc.className='ctime';dc.style.color='var(--amber)';dc.textContent=task.task_date;chips.appendChild(dc);}
  if(task.start_date){const sc=document.createElement('span');sc.className='ctime';sc.style.color='var(--grey)';sc.textContent='Start: '+task.start_date;chips.appendChild(sc);}
  if(task.finish_date){const fc=document.createElement('span');fc.className='ctime';fc.style.color=task.finish_date<today()?'var(--red)':task.finish_date===today()?'var(--amber)':'var(--green)';fc.textContent='Due: '+task.finish_date;chips.appendChild(fc);}
  body.appendChild(chips);

  // Counts
  const counts=document.createElement('div');counts.className='ccounts';
  if(rc){const s=document.createElement('span');s.className='cc';s.textContent=rc+' note'+(rc>1?'s':'');counts.appendChild(s);}
  if(ac){const s=document.createElement('span');s.className='cc';s.textContent=ac+' file'+(ac>1?'s':'');counts.appendChild(s);}
  if(elapsed>0){const s=document.createElement('span');s.className='cc';s.id='ct-timer-'+id;s.style.color=running?'var(--red)':'var(--gold)';s.textContent=fmtT(elapsed);counts.appendChild(s);}
  // Calendar total duration (start_date → finish_date or now)
  const cdur=calDuration(task);
  if(cdur){const s=document.createElement('span');s.className='cc';s.title='Calendar duration (start to '+(task.finish_date?'finish':'now')+')';s.style.color='var(--grey)';s.textContent='Duration: '+cdur;counts.appendChild(s);}
  body.appendChild(counts);

  // Actions
  const acts=document.createElement('div');acts.className='card-acts';
  if(!V()){
    const del=document.createElement('button');del.className='card-del';del.id='del-'+id;del.textContent='✕';
    del.addEventListener('click',e=>{e.stopPropagation();delTask(e,id);});acts.appendChild(del);
    const blk=document.createElement('button');blk.className='card-blk';blk.textContent=isBlocked?'unblock':'block';
    blk.addEventListener('click',e=>{e.stopPropagation();toggleBlock(id);});acts.appendChild(blk);
  }

  inner.appendChild(chk);inner.appendChild(body);inner.appendChild(acts);
  card.appendChild(inner);

  // Timer strip
  if(running||elapsed>0){
    const strip=document.createElement('div');strip.className='card-timer';
    const disp=document.createElement('span');disp.className='ct-disp'+(running?' run':'');disp.id='ct-timer-'+id;disp.textContent=fmtT(elapsed);strip.appendChild(disp);
    if(running&&!V()){const stop=document.createElement('button');stop.className='ct-stop';stop.textContent='Stop';stop.addEventListener('click',e=>{e.stopPropagation();stopTimer(id);});strip.appendChild(stop);}
    card.appendChild(strip);
  }

  card.addEventListener('click',e=>{if(e.target.closest('.card-check,.card-del,.card-blk,.chip'))return;openDrawer(id);});
  return card;
}

/* ── HELPERS ── */
function Q(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}
function setSyncing(on,err){const e=document.getElementById('sync');if(!e)return;e.className='sync'+(err?' err':on?' busy':'');}
function setChip(c){G.chip=G.chip===c?'':c;render();}
function setF(el){document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));el.classList.add('on');G.filter=el.dataset.f;render();}
async function setDF(el){document.querySelectorAll('[data-df]').forEach(b=>b.classList.toggle('on',b===el));G.df=el.dataset.df;setSyncing(true);await loadTasks();render();}

function notifBadge(){const u=G.notifs.filter(n=>!n.read).length;const d=document.getElementById('bell-dot');if(d)d.className='bell-dot'+(u>0?' on':'');}
async function markAllRead(){try{await SB.readAll();G.notifs.forEach(n=>n.read=true);notifBadge();renderNotifs();toast('All read');}catch(e){toast(e.message,'err');}}
async function clearDone(){const d=G.tasks.filter(t=>t.stage==='done');if(!d.length){toast('No completed tasks');return;}if(!confirm('Delete '+d.length+' completed task'+(d.length>1?'s':'')+'?'))return;for(const t of d)try{await SB.del(t.id);}catch{}await loadTasks();render();toast('Cleared');}

/* ── TASK ACTIONS ── */
async function addTask(){
  if(V()){toast('View only','warn');return;}
  const inp=document.getElementById('add-title');
  const title=(inp.value||'').replace(/\s+/g,' ').trim();
  if(title.length<1){inp.style.borderColor='var(--red)';inp.focus();toast('Enter a task title','warn');return;}
  const task={id:uid(),title,tag:document.getElementById('add-tag').value||'personal',priority:document.getElementById('add-pri').value||'medium',task_time:document.getElementById('add-time').value||null,task_date:document.getElementById('add-date').value||today(),start_date:document.getElementById('add-start-date').value||null,finish_date:document.getElementById('add-finish-date').value||null,stage:'todo',done:false,created_at:new Date().toISOString(),recurrence:document.getElementById('add-recur')?.value||'none',remarks:'[]',activity:JSON.stringify([{ts:now(),text:'Task created'}]),timer_total_seconds:0,timer_started_at:null,timer_stopped_at:null};
  const btn=document.querySelector('.add-go');if(btn){btn.disabled=true;btn.textContent='...';}
  setSyncing(true);
  try{await SB.upsert(task);try{await SB.addNotif({task_id:task.id,title:'Task Created',body:title,type:'system'});}catch{}await loadTasks();render();inp.value='';inp.style.borderColor='';toast('Task created');}
  catch(e){setSyncing(false,true);toast('Failed: '+e.message,'err');}
  finally{if(btn){btn.disabled=false;btn.textContent='ADD';}}
}

async function patch(id,changes,log){
  const task=G.tasks.find(t=>t.id===id);if(!task)return;
  const updated={...task,...changes};
  if(log)updated.activity=[...(task.activity||[]),{ts:now(),text:log}];
  const idx=G.tasks.findIndex(t=>t.id===id);if(idx!==-1)G.tasks[idx]=updated;
  render();setSyncing(true);
  try{await SB.upsert(updated);setSyncing(false);}
  catch(e){setSyncing(false,true);toast('Sync error','err');await loadTasks();render();}
  return updated;
}

async function toggleDone(e,id){
  const t=G.tasks.find(x=>x.id===id);if(!t)return;
  const ns=t.stage==='done'?'todo':'done';
  if(ns==='done'&&tRun(t))await stopTimer(id);
  await patch(id,{stage:ns,done:ns==='done'},ns==='done'?'Marked done':'Reopened');
  if(G.openId===id)await refreshDrawer();
}
function cycleStage(id){
  const t=G.tasks.find(x=>x.id===id);if(!t)return;
  const ord=['todo','in_progress','review','done'];const cur=ord.indexOf(t.stage);const nx=ord[(cur+1)%ord.length];
  if(nx==='done'&&tRun(t))stopTimer(id);
  patch(id,{stage:nx,done:nx==='done'},STG[t.stage]?.l+' to '+STG[nx]?.l);
  if(G.openId===id)refreshDrawer();
}
function toggleBlock(id){
  const t=G.tasks.find(x=>x.id===id);if(!t)return;
  if(t.stage==='blocked')patch(id,{stage:'todo',done:false},'Unblocked');
  else patch(id,{stage:'blocked',done:false},'Blocked');
  if(G.openId===id)refreshDrawer();
}
async function delTask(e,id){
  const btn=document.getElementById('del-'+id);
  if(G.delArm[id]){clearTimeout(G.delArm[id]);delete G.delArm[id];setSyncing(true);try{await SB.del(id);if(G.openId===id)closeDrawer();await loadTasks();render();toast('Deleted');}catch(e){toast('Delete failed','err');};}
  else{if(btn){btn.textContent='Sure?';btn.classList.add('arm');}G.delArm[id]=setTimeout(()=>{delete G.delArm[id];const b=document.getElementById('del-'+id);if(b){b.textContent='✕';b.classList.remove('arm');}},2500);}
}
function startEdit(e,id){
  const t=G.tasks.find(x=>x.id===id);if(!t)return;
  const el=document.getElementById('ct-'+id);if(!el||el.tagName==='INPUT')return;
  const inp=document.createElement('input');inp.value=t.title;inp.style.cssText='font-size:13px;font-weight:500;color:var(--white);background:var(--s3);border:1px solid var(--red);border-radius:4px;padding:2px 7px;outline:none;font-family:var(--fb);width:100%';
  inp.addEventListener('click',e=>e.stopPropagation());
  inp.addEventListener('blur',()=>{const v=inp.value.trim();if(v&&v!==t.title)patch(id,{title:v},'Title changed');else render();});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=inp.value.trim();if(v&&v!==t.title)patch(id,{title:v},'Title changed');else render();}if(e.key==='Escape')render();});
  el.replaceWith(inp);inp.focus();inp.select();
}

/* ── TIMER ── */
async function startTimer(id){
  const t=G.tasks.find(x=>x.id===id);if(!t||tRun(t))return;
  await patch(id,{timer_started_at:new Date().toISOString(),timer_stopped_at:null},'Timer started');
  startTick();render();if(G.openId===id)await refreshDrawer();
}
async function stopTimer(id){
  const t=G.tasks.find(x=>x.id===id);if(!t||!tRun(t))return;
  const el=tEl(t);
  await patch(id,{timer_started_at:null,timer_stopped_at:new Date().toISOString(),timer_total_seconds:el},'Timer stopped ('+fmtT(el)+')');
  render();if(G.openId===id)await refreshDrawer();
}
function startTick(){
  if(G.tickLoop)return;
  G.tickLoop=setInterval(()=>{
    G.tasks.filter(tRun).forEach(t=>{const e=document.getElementById('ct-timer-'+t.id);if(e)e.textContent=fmtT(tEl(t));});
    if(G.openId){const t=G.tasks.find(x=>x.id===G.openId);if(t&&tRun(t)){const e=document.getElementById('dr-timer');if(e)e.textContent=fmtT(tEl(t));}}
  },1000);
}

/* ── NAV ── */
function gTab(name){
  ['tasks','notifs','stats'].forEach(n=>{
    const v=document.getElementById('v-'+n);if(v)v.classList.toggle('on',n===name);
    ['nt-'+n+'-m','sb-'+n].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.toggle('on',n===name);});
  });
  if(name==='notifs')renderNotifs();
  if(name==='stats')renderStats();
}

/* ── NOTIFS ── */
function renderNotifs(){
  const el=document.getElementById('notif-list');if(!el)return;
  if(!G.notifs.length){el.innerHTML='<div class="empty" style="padding:32px 0"><div class="empty-txt">No notifications</div></div>';return;}
  el.innerHTML='';
  G.notifs.forEach(n=>{
    const div=document.createElement('div');div.className='notif-item'+(n.read?'':' unread');
    div.innerHTML='<div class="ni-title">'+esc(n.title)+'</div>'+(n.body?'<div class="ni-body">'+esc(n.body)+'</div>':'')+'<div class="ni-ts">'+fmtTs(new Date(n.created_at).getTime())+' · '+n.type+'</div>';
    el.appendChild(div);
  });
}

/* ── STATS ── */
async function renderStats(){
  const wrap=document.getElementById('an-wrap');if(!wrap)return;
  const T=today();
  let all;
  try{const raw=await SB.getTasks(T);all=(raw||[]).map(norm);}catch{all=G.tasks.filter(t=>(t.task_date||t.date||T)===T);}
  const done=all.filter(t=>t.stage==='done'||t.stage==='closed');
  const active=all.filter(t=>!['done','closed','blocked'].includes(t.stage));
  const od=all.filter(isOD);
  const blocked=all.filter(t=>t.stage==='blocked');
  const pct=all.length?Math.round(done.length/all.length*100):0;
  const tracked=all.reduce((s,t)=>s+tEl(t),0);
  wrap.innerHTML='';

  // Scorecard
  const sc=document.createElement('div');sc.className='an-card';
  sc.innerHTML='<div class="an-title">Today</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">'
    +['<div><div style="font-family:var(--fh);font-size:36px;font-weight:900;color:var(--green);line-height:1">'+done.length+'</div><div style="font-family:var(--fm);font-size:9px;color:var(--grey);margin-top:2px">DONE</div></div>',
       '<div><div style="font-family:var(--fh);font-size:36px;font-weight:900;color:var(--amber);line-height:1">'+active.length+'</div><div style="font-family:var(--fm);font-size:9px;color:var(--grey);margin-top:2px">ACTIVE</div></div>',
       '<div><div style="font-family:var(--fh);font-size:36px;font-weight:900;color:'+( pct>=75?'var(--green)':pct>=40?'var(--amber)':'var(--red)')+';line-height:1">'+pct+'%</div><div style="font-family:var(--fm);font-size:9px;color:var(--grey);margin-top:2px">DONE</div></div>'].join('')
    +'</div><div style="display:flex;gap:7px;flex-wrap:wrap">'
    +(od.length?'<span style="font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(230,51,41,.1);border:1px solid rgba(230,51,41,.3);color:var(--red)">'+od.length+' overdue</span>':'')
    +(tracked>0?'<span style="font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.2);color:var(--gold)">'+fmtT(tracked)+' tracked</span>':'')+(()=>{const td=all.filter(t=>t.start_date);return td.length?'<span style="font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#60a5fa">'+td.length+' task'+(td.length>1?'s':'')+' with duration</span>':'';})()
    +(blocked.length?'<span style="font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;background:var(--s3);border:1px solid var(--b3);color:var(--grey)">'+blocked.length+' blocked</span>':'')
    +'</div>';
  wrap.appendChild(sc);

  // Overdue action list
  if(od.length){
    const oc=document.createElement('div');oc.className='an-card';oc.style.cssText='border-color:rgba(230,51,41,.3);background:rgba(230,51,41,.04)';
    oc.innerHTML='<div class="an-title" style="color:var(--red)">Action Required ('+od.length+')</div>';
    od.forEach(t=>{
      const tm=TAG[t.tag]||{l:t.tag,c:'#666'};const off=minOff(t.task_time||t.time||'');
      const late=off?Math.floor(off/60)+'h '+off%60+'m late':'past due';
      const row=document.createElement('div');row.style.cssText='background:var(--s2);border-radius:7px;padding:9px 11px;margin-bottom:5px;cursor:pointer';
      row.innerHTML='<div style="font-size:13px;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px">'+esc(t.title)+'</div><div style="display:flex;gap:6px"><span style="font-family:var(--fm);font-size:9px;color:'+tm.c+'">'+tm.l+'</span><span style="font-family:var(--fm);font-size:9px;color:var(--red)">'+late+'</span></div>';
      row.addEventListener('click',()=>{gTab('tasks');setTimeout(()=>openDrawer(t.id),150);});
      oc.appendChild(row);
    });
    wrap.appendChild(oc);
  }

  // Category bar
  const bc=document.createElement('div');bc.className='an-card';
  const maxN=Math.max(...Object.keys(TAG).map(tag=>all.filter(t=>t.tag===tag).length),1);
  bc.innerHTML='<div class="an-title">By Category</div>';
  Object.entries(TAG).filter(([tag])=>all.some(t=>t.tag===tag)).forEach(([tag,tm])=>{
    const n=all.filter(t=>t.tag===tag).length;const dn=all.filter(t=>t.tag===tag&&(t.stage==='done'||t.stage==='closed')).length;
    const row=document.createElement('div');row.className='bc-row';
    row.innerHTML='<div class="bc-lbl" style="color:'+tm.c+'">'+tm.l+'</div><div class="bc-track"><div class="bc-fill" style="width:'+Math.round(n/maxN*100)+'%;background:'+tm.c+'"></div></div><div class="bc-val" style="color:'+tm.c+'">'+dn+'/'+n+'</div>';
    bc.appendChild(row);
  });
  wrap.appendChild(bc);
}

/* ── DRAWER ── */
function openDrawer(id){G.openId=id;G.editRemark=null;document.getElementById('backdrop').classList.add('on');document.getElementById('drawer').classList.add('on');refreshDrawer();}
function closeDrawer(){G.openId=null;document.getElementById('backdrop').classList.remove('on');document.getElementById('drawer').classList.remove('on');}
async function refreshDrawer(){
  if(!G.openId)return;
  const task=G.tasks.find(t=>t.id===G.openId);if(!task){closeDrawer();return;}
  let atts=[];try{atts=await SB.getAtts(task.id);}catch{}
  task.attachments=atts.map(a=>({id:a.id,name:a.name,size:a.size,type:a.mime_type,path:a.storage_path}));
  renderDrawer(task,atts);render();
}
function renderDrawer(task,atts){
  const id=task.id;const isDone=task.stage==='done'||task.stage==='closed';const isPast=(task.task_date||task.date||'')< today();const running=tRun(task),elapsed=tEl(task);
  const steps=['todo','in_progress','review','done'];const curIdx=steps.indexOf(task.stage);
  const body=document.getElementById('dr-body');body.innerHTML='';
  const add=html=>{const d=document.createElement('div');d.innerHTML=html;body.appendChild(d);};
  const sec=(lbl,content)=>{const d=document.createElement('div');d.innerHTML='<div class="dr-lbl">'+lbl+'</div>';d.appendChild(content);body.appendChild(d);};

  // Status banner
  if(isPast&&!isDone)add('<div style="background:rgba(230,51,41,.07);border:1px solid rgba(230,51,41,.2);border-radius:8px;padding:8px 12px;font-family:var(--fm);font-size:10px;color:var(--red);letter-spacing:.05em">PAST TASK — Action required</div>');
  if(isDone)add('<div style="background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:8px 12px;font-family:var(--fm);font-size:10px;color:var(--green);letter-spacing:.05em">COMPLETED</div>');

  // Title
  const tDiv=document.createElement('div');tDiv.innerHTML='<div class="dr-lbl">Title</div>';
  const tInp=document.createElement('input');tInp.className='dr-inp';tInp.value=task.title||'';tInp.maxLength=140;
  tInp.addEventListener('change',()=>{if(!V())patch(id,{title:tInp.value.trim()},'Title updated');});tDiv.appendChild(tInp);body.appendChild(tDiv);

  // Quick actions
  if(!V()){
    const qa=document.createElement('div');qa.className='qa-row';
    if(!isDone){const b=document.createElement('button');b.className='qa qa-done';b.textContent='Mark Done';b.addEventListener('click',()=>{if(tRun(task))stopTimer(id);patch(id,{stage:'done',done:true},'Marked done');refreshDrawer();});qa.appendChild(b);}
    const bc=document.createElement('button');bc.className='qa qa-close';bc.textContent='Close';bc.addEventListener('click',()=>{patch(id,{stage:'done',done:true},'Closed');refreshDrawer();});qa.appendChild(bc);
    if(isDone){const b=document.createElement('button');b.className='qa qa-reopen';b.textContent='Reopen';b.addEventListener('click',()=>{patch(id,{stage:'todo',done:false},'Reopened');refreshDrawer();});qa.appendChild(b);}
    body.appendChild(qa);
  }

  // Category + Priority
  const r1=document.createElement('div');r1.className='dr-2col';
  ['tag','priority'].forEach((field,fi)=>{
    const opts=fi===0?Object.entries(TAG).map(([k,v])=>[k,v.l]):Object.entries(PRI).map(([k,v])=>[k,v.l]);
    const d=document.createElement('div');d.innerHTML='<div class="dr-lbl">'+(fi===0?'Category':'Priority')+'</div>';
    const s=document.createElement('select');s.className='dr-sel';
    opts.forEach(([k,l])=>{const o=document.createElement('option');o.value=k;o.textContent=l;if(task[field]===k)o.selected=true;s.appendChild(o);});
    if(!V())s.addEventListener('change',()=>patch(id,{[field]:s.value},field+' changed'));
    else s.disabled=true;d.appendChild(s);r1.appendChild(d);
  });
  body.appendChild(r1);

  // Time + Due Date
  const r2=document.createElement('div');r2.className='dr-2col';
  ['task_time','task_date'].forEach((field,fi)=>{
    const d=document.createElement('div');d.innerHTML='<div class="dr-lbl">'+(fi===0?'Time':'Due Date')+'</div>';
    const inp=document.createElement('input');inp.className='dr-t';inp.type=fi===0?'time':'date';inp.value=(fi===0?task.task_time||task.time:task.task_date||task.date)||'';
    if(!V())inp.addEventListener('change',()=>patch(id,{[field]:inp.value||null},field+' changed'));
    else inp.disabled=true;d.appendChild(inp);r2.appendChild(d);
  });
  body.appendChild(r2);

  // Start Date + Finish Date
  const r3=document.createElement('div');r3.className='dr-2col';
  [['start_date','Start Date'],['finish_date','Finish Date']].forEach(([field,label])=>{
    const d=document.createElement('div');d.innerHTML='<div class="dr-lbl">'+label+'</div>';
    const inp=document.createElement('input');inp.className='dr-t';inp.type='date';inp.value=task[field]||'';
    if(!V())inp.addEventListener('change',()=>patch(id,{[field]:inp.value||null},label+' set to '+(inp.value||'none')));
    else inp.disabled=true;
    // Visual indicator for finish date
    if(field==='finish_date'&&task.finish_date){
      inp.style.color=task.finish_date<today()?'var(--red)':task.finish_date===today()?'var(--amber)':'var(--green)';
    }
    d.appendChild(inp);r3.appendChild(d);
  });
  body.appendChild(r3);

  // Pipeline
  const pDiv=document.createElement('div');pDiv.innerHTML='<div class="dr-lbl">Pipeline</div>';
  const stepper=document.createElement('div');stepper.className='stepper';
  steps.forEach((s,i)=>{
    const node=document.createElement('div');let cls='snode';
    if(i<curIdx)cls+=' past';else if(i===curIdx)cls+=' cur'+(s==='done'?' done':'');
    node.className=cls;
    const circle=document.createElement('div');circle.className='scircle';circle.textContent=i<curIdx?'+':STG[s].i;node.appendChild(circle);
    const lbl=document.createElement('div');lbl.className='slbl';lbl.textContent=STG[s].l;node.appendChild(lbl);
    if(!V())node.addEventListener('click',()=>{if(s==='done'&&tRun(task))stopTimer(id);patch(id,{stage:s,done:s==='done'},'Stage: '+STG[s].l);refreshDrawer();});
    stepper.appendChild(node);
  });
  pDiv.appendChild(stepper);body.appendChild(pDiv);

  // Timer
  const cdurVal=calDuration(task);
  const tCard=document.createElement('div');tCard.innerHTML='<div class="dr-lbl">Time</div>';
  const tc=document.createElement('div');tc.className='timer-card';
  // Calendar duration (big display if start_date set)
  if(cdurVal){
    const cd=document.createElement('div');cd.style.cssText='text-align:center;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--b2)';
    cd.innerHTML='<div style="font-family:var(--fh);font-size:36px;font-weight:900;color:var(--gold);line-height:1">'+cdurVal+'</div><div style="font-family:var(--fm);font-size:9px;letter-spacing:.18em;color:var(--grey2);text-transform:uppercase;margin-top:3px">Total Time ('+task.start_date+' to '+(task.finish_date||'now')+')</div>';
    tc.appendChild(cd);
  }
  const tn=document.createElement('div');tn.className='timer-num'+(running?' run':'');tn.id='dr-timer';tn.textContent=fmtT(elapsed);tn.style.fontSize='32px';tc.appendChild(tn);
  const tl=document.createElement('div');tl.className='timer-lbl';tl.textContent=running?'Timer running':'Tracked time';tc.appendChild(tl);
  if(!V()){
    const tb=document.createElement('button');
    if(running){tb.className='t-stop';tb.textContent='Stop Timer';tb.addEventListener('click',()=>stopTimer(id));}
    else if(!isDone){tb.className='t-start';tb.textContent='Start Timer';tb.addEventListener('click',()=>startTimer(id));}
    if(tb.textContent)tc.appendChild(tb);
  }
  tCard.appendChild(tc);body.appendChild(tCard);

  // Remarks
  const rDiv=document.createElement('div');rDiv.innerHTML='<div class="dr-lbl">Remarks ('+(task.remarks||[]).length+')</div>';
  const rList=document.createElement('div');rList.id='remark-list';
  (task.remarks||[]).forEach((r,i)=>{
    if(G.editRemark===i){
      const box=document.createElement('div');box.className='remark-edit-box';
      const ta=document.createElement('textarea');ta.className='remark-edit-ta';ta.rows=3;ta.value=r.text||'';box.appendChild(ta);
      const row=document.createElement('div');row.className='remark-edit-row';
      const sv=document.createElement('button');sv.className='r-save';sv.textContent='Save';sv.addEventListener('click',()=>{const v=ta.value.trim();if(v){const rem=[...(task.remarks||[])];rem[i]={...rem[i],text:v};patch(id,{remarks:rem},'Remark edited');}G.editRemark=null;refreshDrawer();});
      const cn=document.createElement('button');cn.className='r-cancel';cn.textContent='Cancel';cn.addEventListener('click',()=>{G.editRemark=null;refreshDrawer();});
      row.appendChild(sv);row.appendChild(cn);box.appendChild(row);rList.appendChild(box);
    } else {
      const item=document.createElement('div');item.className='remark-item';
      const txt=document.createElement('div');txt.className='remark-text';txt.textContent=r.text||'';item.appendChild(txt);
      const meta=document.createElement('div');meta.className='remark-meta';
      const ts=document.createElement('span');ts.className='remark-ts';ts.textContent=fmtTs(r.ts);meta.appendChild(ts);
      if(!V()){const acts=document.createElement('div');acts.className='remark-acts';
        const ed=document.createElement('button');ed.className='remark-edit-btn';ed.textContent='Edit';ed.addEventListener('click',()=>{G.editRemark=i;refreshDrawer();});acts.appendChild(ed);
        const dl=document.createElement('button');dl.className='remark-del-btn';dl.textContent='Remove';dl.addEventListener('click',()=>{const rem=[...(task.remarks||[])];rem.splice(i,1);patch(id,{remarks:rem},'Remark removed');refreshDrawer();});acts.appendChild(dl);
        meta.appendChild(acts);}
      item.appendChild(meta);rList.appendChild(item);
    }
  });
  if(!G.tasks.find(t=>t.id===id)?.remarks?.length)rList.innerHTML='<div style="font-family:var(--fm);font-size:10px;color:var(--grey2);padding:4px 0">No remarks yet</div>';
  rDiv.appendChild(rList);
  if(!V()){
    const ra=document.createElement('div');ra.className='remark-add';
    const rta=document.createElement('textarea');rta.className='remark-ta';rta.rows=2;rta.placeholder='Add a note...';
    rta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addRemark(id,rta);}});
    const rab=document.createElement('button');rab.className='remark-add-btn';rab.textContent='Add';rab.addEventListener('click',()=>addRemark(id,rta));
    ra.appendChild(rta);ra.appendChild(rab);rDiv.appendChild(ra);
  }
  body.appendChild(rDiv);

  // Attachments
  const aDiv=document.createElement('div');aDiv.innerHTML='<div class="dr-lbl">Files ('+(atts.length)+')</div>';
  atts.forEach(a=>{
    const item=document.createElement('div');item.className='att-item';
    const nm=document.createElement('div');nm.style.flex='1';nm.style.minWidth='0';
    nm.innerHTML='<div class="att-name">'+esc(a.name)+'</div><div class="att-size">'+fmtSz(a.size||0)+'</div>';item.appendChild(nm);
    const dl=document.createElement('button');dl.className='att-dl';dl.textContent='Download';dl.addEventListener('click',async()=>{try{const url=await SB.signUrl(a.storage_path||a.path||'');const x=document.createElement('a');x.href=url;x.download=a.name;x.target='_blank';x.click();}catch(e){toast('Download failed','err');}});item.appendChild(dl);
    if(!V()){const dd=document.createElement('button');dd.className='att-del';dd.textContent='✕';dd.addEventListener('click',async()=>{try{await SB.delAtt(a.id,a.storage_path||a.path||'');await patch(id,{},'File removed');await refreshDrawer();}catch(e){toast('Delete failed','err');}});item.appendChild(dd);}
    aDiv.appendChild(item);
  });
  if(!V()){const drop=document.createElement('div');drop.className='att-drop';const inp=document.createElement('input');inp.type='file';inp.multiple=true;inp.addEventListener('change',async()=>{for(const f of inp.files){if(f.size>5*1024*1024){toast(f.name+' too large','warn');continue;}try{await SB.upload(id,f);await patch(id,{},'File: '+f.name);}catch(e){toast('Upload failed','err');}}await refreshDrawer();});drop.appendChild(inp);const txt=document.createElement('div');txt.className='att-drop-txt';txt.textContent='Tap to upload files (max 5MB)';drop.appendChild(txt);aDiv.appendChild(drop);}
  body.appendChild(aDiv);

  // Activity
  const actDiv=document.createElement('div');actDiv.innerHTML='<div class="dr-lbl">Journey ('+(task.activity||[]).length+')</div>';
  const actList=document.createElement('div');
  [...(task.activity||[])].reverse().forEach(a=>{
    const item=document.createElement('div');item.className='act-item';
    const dot=document.createElement('div');dot.className='act-dot';dot.style.background=a.text.includes('done')||a.text.includes('Done')?'var(--green)':a.text.includes('Block')||a.text.includes('overdue')?'var(--red)':a.text.includes('Timer')?'var(--gold)':'var(--grey2)';item.appendChild(dot);
    const txt=document.createElement('div');txt.className='act-txt';txt.textContent=a.text||'';item.appendChild(txt);
    const ts=document.createElement('div');ts.className='act-ts';ts.textContent=fmtTs(a.ts);item.appendChild(ts);
    actList.appendChild(item);
  });
  if(!actList.children.length)actList.innerHTML='<div style="font-family:var(--fm);font-size:10px;color:var(--grey2)">No activity</div>';
  actDiv.appendChild(actList);body.appendChild(actDiv);

  // Close
  const cls=document.createElement('button');cls.className='dr-save';cls.textContent='Close';cls.addEventListener('click',closeDrawer);body.appendChild(cls);
}

async function addRemark(id,ta){
  const txt=(ta?.value||'').trim();if(!txt)return;
  const task=G.tasks.find(t=>t.id===id);if(!task)return;
  await patch(id,{remarks:[...(task.remarks||[]),{ts:now(),text:txt}]},'Remark added');
  ta.value='';await refreshDrawer();
}

/* ── CLOCK ── */
function tick(){
  const n=new Date();const h=String(n.getHours()).padStart(2,'0');const m=String(n.getMinutes()).padStart(2,'0');
  const cl=document.getElementById('hclock');if(cl)cl.textContent=h+':'+m;
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const ds=DAYS[n.getDay()]+', '+n.getDate()+' '+MONS[n.getMonth()];
  const dd=document.getElementById('day-date');if(dd)dd.textContent=ds;
  const sd=document.getElementById('sb-date');if(sd)sd.textContent=ds;
  const pct=Math.min(100,Math.max(0,(n.getHours()*60+n.getMinutes()-540)/720*100));
  ['burn-m','burn-d'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.width=pct+'%';});
}

/* ── TOAST ── */
let _tt;
function toast(msg,type='ok'){const e=document.getElementById('toast');document.getElementById('t-msg').textContent=msg;e.className='on'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(hideToast,type==='err'?7000:3500);}
function hideToast(){const e=document.getElementById('toast');if(e)e.className='';}

/* ── KEYBOARD ── */
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('add-title')?.focus();}});
document.getElementById('add-title')?.addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
document.getElementById('a-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});
let _dy=0;
document.getElementById('drawer')?.addEventListener('touchstart',e=>{_dy=e.touches[0].clientY;},{passive:true});
document.getElementById('drawer')?.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-_dy>90)closeDrawer();},{passive:true});

/* ── START ── */
window.addEventListener('load',()=>setTimeout(boot,800));
</script>
