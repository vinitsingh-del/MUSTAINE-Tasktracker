<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>MUSTAINE</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#202020;
  --b1:#1c1c1c;--b2:#282828;--b3:#363636;
  --red:#e63329;--gold:#c8a84b;
  --white:#f0f0f0;--grey:#777;--grey2:#444;
  --green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;--purple:#a855f7;--teal:#14b8a6;
  --font-h:'Barlow Condensed',sans-serif;
  --font-b:'Inter',sans-serif;
  --font-m:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--font-b);-webkit-font-smoothing:antialiased}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes shine{0%{left:-60%}100%{left:120%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes redGlow{0%,100%{text-shadow:0 0 8px rgba(230,51,41,.5)}50%{text-shadow:0 0 24px rgba(230,51,41,.9),0 0 48px rgba(230,51,41,.3)}}
@keyframes burnFlow{0%{background-position:0% 50%}100%{background-position:200% 50%}}

/* LOADING */
#ls{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.ls-logo{font-family:var(--font-h);font-size:48px;font-weight:900;letter-spacing:.08em;color:var(--red);animation:redGlow 2s infinite}
.ls-sub{font-family:var(--font-m);font-size:10px;letter-spacing:.3em;color:var(--grey);text-transform:uppercase}
.ls-bar{width:160px;height:2px;background:var(--b2);border-radius:1px;overflow:hidden}
.ls-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));animation:slideIn 1.4s ease-out forwards}
@keyframes slideIn{from{width:0}to{width:100%}}

/* AUTH */
#as{position:fixed;inset:0;background:var(--bg);z-index:900;display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.aw{width:100%;max-width:360px}
.a-logo{font-family:var(--font-h);font-size:42px;font-weight:900;letter-spacing:.08em;color:var(--red);text-align:center;animation:redGlow 3s infinite}
.a-tag{font-family:var(--font-m);font-size:9px;letter-spacing:.28em;color:var(--grey2);text-align:center;text-transform:uppercase;margin-bottom:28px}
.a-box{background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:24px;display:flex;flex-direction:column;gap:14px}
.a-tabs{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:var(--bg);border-radius:6px;padding:3px}
.a-tab{font-family:var(--font-h);font-size:15px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px;border-radius:4px;border:none;background:transparent;color:var(--grey);cursor:pointer;transition:all .2s}
.a-tab.on{background:var(--red);color:#fff}
.a-field{display:flex;flex-direction:column;gap:5px}
.a-field label{font-family:var(--font-m);font-size:9px;letter-spacing:.2em;color:var(--grey2);text-transform:uppercase}
.a-inp{background:var(--s2);border:1px solid var(--b3);color:var(--white);font-family:var(--font-b);font-size:14px;padding:10px 12px;border-radius:8px;outline:none;width:100%;-webkit-appearance:none;transition:border-color .2s}
.a-inp:focus{border-color:var(--red)}
.a-inp::placeholder{color:var(--grey2)}
.a-btn{position:relative;overflow:hidden;background:var(--red);color:#fff;border:none;border-radius:8px;padding:11px;font-family:var(--font-h);font-size:16px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;width:100%}
.a-btn::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shine 2.5s infinite}
.a-btn:active{opacity:.8}
.a-btn:disabled{opacity:.4;cursor:not-allowed}
.a-err{font-family:var(--font-m);font-size:11px;color:var(--red);background:rgba(230,51,41,.08);border:1px solid rgba(230,51,41,.2);border-radius:6px;padding:8px 12px;display:none;text-align:center;line-height:1.5}
.a-err.on{display:block}
.a-ok{font-family:var(--font-m);font-size:11px;color:var(--green);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:8px 12px;display:none;text-align:center;line-height:1.5}
.a-ok.on{display:block}
.a-divider{display:flex;align-items:center;gap:10px}
.a-divider::before,.a-divider::after{content:'';flex:1;height:1px;background:var(--b2)}
.a-divider span{font-family:var(--font-m);font-size:9px;color:var(--grey2)}
.a-magic{background:transparent;border:1px solid var(--b3);color:var(--grey);border-radius:8px;padding:11px;font-family:var(--font-m);font-size:11px;letter-spacing:.08em;cursor:pointer;width:100%;text-transform:uppercase;transition:all .2s}
.a-magic:active{border-color:var(--red);color:var(--red)}

/* APP */
#app{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden}

/* HEADER */
.hdr{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--b1);padding:9px 14px 8px;display:flex;align-items:center;gap:10px}
.hdr-logo{font-family:var(--font-h);font-size:22px;font-weight:900;letter-spacing:.1em;color:var(--red);line-height:1;flex:1}
.hdr-clock{font-family:var(--font-m);font-size:11px;color:var(--gold);letter-spacing:.06em}
.hdr-notif{position:relative;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--b2)}
.hdr-notif:active{background:var(--s2)}
.notif-ico svg{width:16px;height:16px;stroke:var(--grey)}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--red);border-radius:50%;display:none;animation:pulse 1.5s infinite}
.notif-dot.on{display:block}
.hdr-user{font-family:var(--font-m);font-size:10px;color:var(--grey2);cursor:pointer;padding:5px 9px;border-radius:5px;border:1px solid var(--b2);white-space:nowrap}
.hdr-user:active{border-color:var(--red);color:var(--red)}

/* BURN BAR */
.burn{height:2px;background:var(--b1);flex-shrink:0}
.burn-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--red));background-size:200% 100%;animation:burnFlow 4s linear infinite;transition:width .5s}

/* NAV */
.nav{flex-shrink:0;display:flex;border-bottom:1px solid var(--b1)}
.ntab{flex:1;padding:9px 4px;font-family:var(--font-h);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;position:relative;min-height:40px;-webkit-tap-highlight-color:rgba(230,51,41,.15)}
.ntab.on{color:var(--red);border-bottom-color:var(--red)}
.ntab-dot{position:absolute;top:8px;right:calc(50% - 14px);width:6px;height:6px;background:var(--red);border-radius:50%;display:none;animation:pulse 1.5s infinite}
.ntab-dot.on{display:block}

/* VIEWS */
.view{flex:1;min-height:0;display:none;flex-direction:column;overflow:hidden}
.view.on{display:flex}
.view-head{flex-shrink:0;flex-grow:0;overflow-x:hidden;overflow-y:hidden;background:var(--bg);box-shadow:0 1px 0 var(--b1)}
.view-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scroll-behavior:smooth;touch-action:pan-y}
.view-scroll::-webkit-scrollbar{display:none}

/* DAY STRIP */
.day-strip{padding:10px 14px 8px;background:var(--s1);border-bottom:1px solid var(--b1)}
.day-date{font-family:var(--font-h);font-size:12px;font-weight:700;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.day-stats{display:flex;gap:6px;flex-wrap:wrap}
.ds{font-family:var(--font-m);font-size:10px;padding:3px 8px;border-radius:4px;background:var(--s2);border:1px solid var(--b2);color:var(--grey)}
.ds-btn{cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:rgba(230,51,41,.12)}
.ds-btn:active{transform:scale(.96)}
.ds-btn.active-chip{background:var(--s3);border-color:var(--gold);color:var(--white)}
.ds-btn.red.active-chip{border-color:var(--red);color:var(--red)}
.ds b{color:var(--white)}
.ds.red b{color:var(--red)}
.load-bar{margin-top:8px}
.lb-row{display:flex;justify-content:space-between;margin-bottom:3px}
.lb-lbl,.lb-val{font-family:var(--font-m);font-size:9px;letter-spacing:.1em;text-transform:uppercase}
.lb-lbl{color:var(--grey2)}
.lb-val{color:var(--gold)}
.lb-track{height:3px;background:var(--b2);border-radius:2px;overflow:hidden}
.lb-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;transition:width .6s}
.load-msg{margin-top:6px;font-family:var(--font-m);font-size:10px;padding:6px 10px;border-radius:6px;border:1px solid;letter-spacing:.04em}
.lm-ok{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2);color:var(--green)}
.lm-mid{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2);color:var(--amber)}
.lm-hi{background:rgba(230,51,41,.06);border-color:rgba(230,51,41,.2);color:var(--red)}
.lm-max{background:rgba(230,51,41,.1);border-color:rgba(230,51,41,.4);color:var(--red);animation:pulse 2s infinite}

/* ADD TASK */
.add-box{padding:9px 12px;border-bottom:1px solid var(--b1);background:var(--bg)}
.add-row{display:flex;gap:8px}
.add-inp{flex:1;background:var(--s1);border:1px solid var(--b2);color:var(--white);font-family:var(--font-b);font-size:14px;padding:9px 12px;border-radius:8px;outline:none;-webkit-appearance:none;transition:border-color .2s}
.add-inp:focus{border-color:var(--red)}
.add-inp::placeholder{color:var(--grey2)}
.add-inp.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}}
.add-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:0 18px;font-family:var(--font-h);font-size:16px;font-weight:800;letter-spacing:.1em;cursor:pointer;white-space:nowrap}
.add-btn:active{opacity:.8}
.add-meta{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.add-sel{background:var(--s1);border:1px solid var(--b2);color:var(--grey);font-family:var(--font-m);font-size:11px;padding:8px 10px;border-radius:7px;outline:none;-webkit-appearance:none;appearance:none;width:100%;cursor:pointer}
.add-sel:focus{border-color:var(--red)}
.add-row2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px}
.add-time{background:var(--s1);border:1px solid var(--b2);color:var(--grey);font-family:var(--font-m);font-size:11px;padding:8px 10px;border-radius:7px;outline:none;width:100%;-webkit-appearance:none}
.add-time:focus{border-color:var(--red);color:var(--white)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid var(--b1);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.toolbar::-webkit-scrollbar{display:none}
.tb-btn{font-family:var(--font-m);font-size:10px;padding:8px 12px;border-radius:5px;border:1px solid var(--b2);background:transparent;color:var(--grey);cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:.05em;transition:all .15s;-webkit-tap-highlight-color:rgba(230,51,41,.15);min-height:36px}
.tb-btn.on{color:var(--white);border-color:var(--gold)}
.tb-btn:active{color:var(--red);border-color:rgba(230,51,41,.4)}
.tb-sep{flex:1;flex-shrink:0}
.sync{width:6px;height:6px;border-radius:50%;background:var(--grey2);flex-shrink:0;transition:background .3s}
.sync.ok{background:var(--green)}
.sync.spin{background:var(--amber);animation:pulse .8s infinite}
.sync.err{background:var(--red)}

/* FILTERS */
.filters{display:flex;overflow-x:auto;border-bottom:1px solid var(--b1);-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.filters::-webkit-scrollbar{display:none}
.ftab{font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:8px 12px;border:none;background:transparent;color:var(--grey);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0;transition:all .2s;-webkit-tap-highlight-color:rgba(230,51,41,.15);min-height:40px;display:flex;align-items:center}
.ftab.on{color:var(--white);border-bottom-color:var(--gold)}

/* OVERDUE BANNER */
.od-banner{margin:8px 12px 0;padding:8px 12px;background:rgba(230,51,41,.07);border:1px solid rgba(230,51,41,.25);border-radius:7px;font-family:var(--font-m);font-size:10px;color:var(--red);display:none;animation:pulse 2s infinite;letter-spacing:.04em}
.od-banner.on{display:block}

/* SECTION HEADER */
.sec{padding:7px 12px 4px;display:flex;align-items:center;justify-content:space-between}
.sec-title{font-family:var(--font-h);font-size:11px;font-weight:700;letter-spacing:.2em;color:var(--grey2);text-transform:uppercase}
.sec-btn{font-family:var(--font-m);font-size:10px;color:var(--gold);cursor:pointer;background:none;border:none;letter-spacing:.05em}

/* TASK CARDS */
.card-list{padding:0 10px;display:flex;flex-direction:column;gap:7px;padding-bottom:8px}
.card{background:var(--s1);border:1px solid var(--b2);border-radius:10px;overflow:hidden;position:relative;cursor:pointer;animation:fadeUp .2s ease both;transition:border-color .2s}
.card:active{opacity:.92}
.card.done{opacity:.35}
.card.blocked{border-color:rgba(230,51,41,.3)}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c,var(--b3))}
.card-inner{padding:11px 11px 11px 15px;display:flex;align-items:flex-start;gap:9px}
.card-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--b3);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;transition:all .2s}
.card.done .card-check{background:var(--green);border-color:var(--green);color:#fff}
.card-body{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:500;color:var(--white);line-height:1.35;margin-bottom:5px;word-break:break-word}
.card.done .card-title{text-decoration:line-through;color:var(--grey)}
.card-chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.chip{font-family:var(--font-m);font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:4px;border:1px solid;white-space:nowrap;cursor:pointer}
.chip:active{filter:brightness(1.3)}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ctime{font-family:var(--font-m);font-size:9px;color:var(--grey2)}
.ctime.od{color:var(--red)}
.ctime.soon{color:var(--amber)}
.ccounts{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap}
.cc{font-family:var(--font-m);font-size:9px;color:var(--grey);background:var(--s3);padding:1px 6px;border-radius:3px}
.card-acts{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.card-del{background:transparent;border:none;color:var(--grey2);font-size:19px;cursor:pointer;line-height:1;padding:2px 4px;border-radius:4px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.card-del:active,.card-del.arm{color:var(--red)}
.card-del.arm{font-size:9px;font-family:var(--font-m);width:auto;padding:3px 7px;border:1px solid rgba(230,51,41,.3)}
.card-blk{background:transparent;border:none;color:var(--grey2);cursor:pointer;font-size:9px;font-family:var(--font-m);padding:2px 5px;border-radius:3px}
.card-blk:active{color:var(--red)}
.card.blocked .card-blk{color:var(--amber)}
/* timer strip */
.card-timer{background:var(--s2);border-top:1px solid var(--b2);padding:7px 12px 7px 15px;display:flex;align-items:center;justify-content:space-between}
.ct-disp{font-family:var(--font-m);font-size:12px;letter-spacing:.06em;color:var(--gold)}
.ct-disp.run{color:var(--red);animation:redGlow 2s infinite}
.ct-stop{background:var(--red);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-family:var(--font-m);font-size:10px;letter-spacing:.06em;cursor:pointer}
.ct-stop:active{opacity:.75}
/* date label */
.date-grp{padding:7px 4px 3px;font-family:var(--font-m);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--amber)}
.date-grp.past{color:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:52px 20px;color:var(--grey2)}
.empty-ico{font-family:var(--font-h);font-size:32px;font-weight:900;letter-spacing:.1em;color:var(--b3);margin-bottom:10px}
.empty-txt{font-family:var(--font-m);font-size:11px;letter-spacing:.1em;text-transform:uppercase;line-height:1.8}

/* DRAWER */
#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px)}
#backdrop.on{opacity:1;pointer-events:all}
#drawer{position:fixed;bottom:0;left:0;right:0;max-height:91vh;background:var(--s1);border-radius:16px 16px 0 0;border-top:1px solid var(--b2);z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
#drawer.on{transform:translateY(0)}
.dr-drag{width:38px;height:4px;background:var(--b3);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.dr-top{padding:12px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dr-title{font-family:var(--font-h);font-size:17px;font-weight:800;letter-spacing:.06em;flex:1}
.dr-x{background:none;border:none;color:var(--grey);font-size:24px;cursor:pointer;line-height:1;padding:2px 4px}
.dr-scroll{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px;padding-bottom:24px}
.dr-scroll::-webkit-scrollbar{display:none}
.dr-lbl{font-family:var(--font-m);font-size:9px;letter-spacing:.2em;color:var(--grey2);text-transform:uppercase;margin-bottom:5px}
.dr-inp{background:var(--s2);border:1px solid var(--b2);color:var(--white);font-family:var(--font-b);font-size:13px;padding:9px 11px;border-radius:8px;outline:none;width:100%;-webkit-appearance:none}
.dr-inp:focus{border-color:var(--red)}
.dr-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dr-sel{background:var(--s2);border:1px solid var(--b2);color:var(--white);font-family:var(--font-m);font-size:11px;padding:10px 11px;border-radius:8px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;width:100%}
.dr-sel:focus{border-color:var(--red)}
.dr-time{background:var(--s2);border:1px solid var(--b2);color:var(--white);font-family:var(--font-m);font-size:12px;padding:10px 11px;border-radius:8px;outline:none;width:100%;-webkit-appearance:none}
.dr-time:focus{border-color:var(--red)}
/* quick actions */
.qa-row{display:flex;gap:7px;flex-wrap:wrap}
.qa{flex:1;min-width:0;border:none;border-radius:8px;padding:12px 8px;font-family:var(--font-h);font-size:15px;font-weight:800;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;text-align:center;transition:opacity .15s}
.qa:active{opacity:.78}
.qa-done{background:var(--green);color:#fff}
.qa-close{background:var(--s3);color:var(--grey);border:1px solid var(--b3)}
.qa-reopen{background:var(--s3);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.qa-overdue{background:rgba(230,51,41,.1);color:var(--red);border:1px solid rgba(230,51,41,.3)}
/* stepper */
.stepper{display:flex;overflow-x:auto;gap:0;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stepper::-webkit-scrollbar{display:none}
.snode{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:56px;position:relative;cursor:pointer}
.snode:not(:last-child)::after{content:'';position:absolute;top:11px;left:50%;width:100%;height:1px;background:var(--b3);z-index:0}
.snode.past::after,.snode.active::after{background:var(--red)}
.scircle{width:22px;height:22px;border-radius:50%;border:2px solid var(--b3);background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:11px;font-weight:700;z-index:1;position:relative;transition:all .2s;color:var(--grey)}
.snode.past .scircle{border-color:var(--red);background:rgba(230,51,41,.12);color:var(--red)}
.snode.active .scircle{border-color:var(--red);background:var(--red);color:#fff;box-shadow:0 0 10px rgba(230,51,41,.4)}
.snode.done .scircle{border-color:var(--green);background:var(--green);color:#fff}
.slabel{font-family:var(--font-m);font-size:8px;color:var(--grey2);text-transform:uppercase;letter-spacing:.05em;text-align:center;position:relative;z-index:1}
.snode.active .slabel{color:var(--white)}
/* timer */
.timer-card{background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;align-items:center}
.timer-num{font-family:var(--font-h);font-size:38px;font-weight:900;letter-spacing:.04em;color:var(--gold);line-height:1}
.timer-num.run{color:var(--red);animation:redGlow 2s infinite}
.timer-lbl{font-family:var(--font-m);font-size:9px;letter-spacing:.18em;color:var(--grey2);text-transform:uppercase}
.timer-total{font-family:var(--font-m);font-size:10px;color:var(--grey);text-align:center}
.timer-btns{display:flex;gap:8px}
.t-start{position:relative;overflow:hidden;background:var(--red);color:#fff;border:none;border-radius:8px;padding:11px 28px;font-family:var(--font-h);font-size:16px;font-weight:800;letter-spacing:.1em;cursor:pointer;text-transform:uppercase}
.t-start::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shine 2s infinite}
.t-start:active{opacity:.8}
.t-stop{background:var(--b3);color:var(--white);border:none;border-radius:8px;padding:11px 28px;font-family:var(--font-h);font-size:16px;font-weight:800;letter-spacing:.1em;cursor:pointer;text-transform:uppercase}
.t-stop:active{opacity:.8}
/* remarks */
.remark-item{background:var(--s2);border-radius:8px;padding:10px 12px;animation:fadeUp .2s ease}
.remark-text{font-size:13px;color:var(--white);line-height:1.45;margin-bottom:5px;word-break:break-word}
.remark-meta{display:flex;align-items:center;justify-content:space-between}
.remark-ts{font-family:var(--font-m);font-size:9px;color:var(--grey2)}
.remark-acts{display:flex;gap:8px}
.remark-edit-btn,.remark-del-btn{background:none;border:none;cursor:pointer;font-family:var(--font-m);font-size:9px;letter-spacing:.06em;text-transform:uppercase}
.remark-edit-btn{color:var(--grey2)}
.remark-edit-btn:active{color:var(--gold)}
.remark-del-btn{color:var(--grey2)}
.remark-del-btn:active{color:var(--red)}
.remark-edit-box{display:flex;flex-direction:column;gap:7px;background:var(--s3);border-radius:7px;padding:10px}
.remark-edit-inp{background:var(--s2);border:1px solid var(--red);color:var(--white);font-family:var(--font-b);font-size:13px;padding:8px 10px;border-radius:6px;outline:none;resize:none;width:100%}
.remark-edit-row{display:flex;gap:6px}
.r-save,.r-cancel{font-family:var(--font-m);font-size:10px;padding:5px 12px;border-radius:5px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;border:none}
.r-save{background:var(--red);color:#fff}
.r-cancel{background:var(--s2);color:var(--grey);border:1px solid var(--b3)}
.remark-add{display:flex;gap:7px;margin-top:4px}
.remark-ta{flex:1;background:var(--s2);border:1px solid var(--b2);color:var(--white);font-family:var(--font-b);font-size:13px;padding:9px 12px;border-radius:7px;outline:none;resize:none;-webkit-appearance:none}
.remark-ta:focus{border-color:var(--red)}
.remark-ta::placeholder{color:var(--grey2)}
.remark-add-btn{background:var(--red);color:#fff;border:none;border-radius:7px;padding:0 14px;font-family:var(--font-h);font-size:15px;font-weight:800;cursor:pointer;flex-shrink:0}
.remark-add-btn:active{opacity:.8}
.no-remarks{font-family:var(--font-m);font-size:10px;color:var(--grey2);padding:6px 0;letter-spacing:.06em}
/* attachments */
.att-drop{border:1px dashed var(--b3);border-radius:8px;padding:14px;text-align:center;cursor:pointer;position:relative;transition:all .2s}
.att-drop.drag{border-color:var(--red);background:rgba(230,51,41,.04)}
.att-drop input{position:absolute;inset:0;opacity:0;cursor:pointer}
.att-drop-txt{font-family:var(--font-m);font-size:10px;color:var(--grey2);pointer-events:none;letter-spacing:.06em}
.att-item{background:var(--s2);border-radius:7px;padding:9px 12px;display:flex;align-items:center;gap:9px}
.att-name{font-size:12px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.att-size{font-family:var(--font-m);font-size:9px;color:var(--grey2)}
.att-dl{background:none;border:none;color:var(--gold);font-family:var(--font-m);font-size:10px;cursor:pointer;padding:0 4px;flex-shrink:0}
.att-del{background:none;border:none;color:var(--grey2);font-size:16px;cursor:pointer;flex-shrink:0}
.att-del:active{color:var(--red)}
.att-warn{font-family:var(--font-m);font-size:10px;color:var(--amber);padding:5px 0}
/* activity */
.act-item{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid var(--b1)}
.act-item:last-child{border-bottom:none}
.act-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px}
.act-txt{font-family:var(--font-m);font-size:10px;color:var(--grey);flex:1;line-height:1.5}
.act-ts{font-family:var(--font-m);font-size:9px;color:var(--grey2);flex-shrink:0}
/* drawer save */
.dr-save{position:relative;overflow:hidden;background:var(--red);color:#fff;border:none;border-radius:9px;padding:14px;font-family:var(--font-h);font-size:17px;font-weight:800;letter-spacing:.12em;cursor:pointer;width:100%;text-transform:uppercase;margin-top:4px}
.dr-save::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shine 2.5s infinite}
.dr-save:active{opacity:.83}

/* NOTIFICATIONS VIEW */
.notif-list{padding:0 12px}
.notif-item{background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:12px;margin-bottom:7px;border-left:3px solid var(--b3);animation:fadeUp .2s ease;cursor:pointer}
.notif-item.unread{border-left-color:var(--red)}
.notif-item.overdue{border-left-color:var(--amber)}
.ni-title{font-size:13px;font-weight:500;margin-bottom:3px}
.ni-body{font-family:var(--font-m);font-size:10px;color:var(--grey)}
.ni-ts{font-family:var(--font-m);font-size:9px;color:var(--grey2);margin-top:4px}
.notif-empty{text-align:center;padding:44px 20px;font-family:var(--font-m);font-size:11px;color:var(--grey2);text-transform:uppercase;letter-spacing:.1em}

/* ANALYTICS */
.an-wrap{padding:0 12px 24px}
.an-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:10px;animation:fadeUp .3s ease both}
.an-title{font-family:var(--font-h);font-size:12px;font-weight:700;letter-spacing:.16em;color:var(--grey);text-transform:uppercase;margin-bottom:12px}
.an-big{font-family:var(--font-h);font-size:40px;font-weight:900;color:var(--red);line-height:1}
.an-sub{font-family:var(--font-m);font-size:10px;color:var(--grey);margin-top:2px}
.donut-wrap{display:flex;align-items:center;gap:14px}
.dl-item{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.dl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dl-lbl{font-family:var(--font-m);font-size:10px;color:var(--grey);flex:1}
.dl-val{font-family:var(--font-m);font-size:10px;font-weight:600;color:var(--white)}
.bc-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bc-lbl{font-family:var(--font-m);font-size:9px;color:var(--grey);width:64px;flex-shrink:0;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-track{flex:1;height:7px;background:var(--s3);border-radius:3px;overflow:hidden}
.bc-fill{height:100%;border-radius:3px;transition:width .6s}
.bc-val{font-family:var(--font-m);font-size:9px;width:28px;text-align:right;flex-shrink:0}
.spark{display:flex;align-items:flex-end;gap:4px;height:48px}
.spark-bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;transition:height .5s}
.spark-lbls{display:flex;gap:4px;margin-top:4px}
.spark-lbl{flex:1;font-family:var(--font-m);font-size:8px;text-align:center;color:var(--grey2)}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);opacity:0;background:var(--s1);border:1px solid var(--b3);border-radius:9px;padding:11px 16px;display:flex;align-items:center;gap:9px;font-family:var(--font-m);font-size:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;z-index:500;max-width:calc(100vw - 28px);pointer-events:none;min-width:200px}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:all}
#toast.err{border-color:rgba(230,51,41,.4)}
#toast.warn{border-color:rgba(245,158,11,.35)}
#toast.ok{border-color:rgba(34,197,94,.3)}
.t-msg{flex:1;line-height:1.4}
.t-x{background:none;border:none;color:var(--grey);font-size:18px;cursor:pointer;line-height:1}

/* ═══════════════════════════════════════════════════════════════
   DESKTOP LAYOUT  (≥ 900px)
   Two-column: left sidebar (fixed) + right content panel
   ═══════════════════════════════════════════════════════════════ */

.mob-hdr { display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar { display: none; }
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

@media (min-width: 900px) {
  .mob-hdr { display: none; }


  /* Auth: centred card, reasonable max-width */
  #as { padding: 40px 24px; }
  .aw { max-width: 400px; }
  .a-logo { font-size: 48px; }

  /* ── APP SHELL ── */
  #app {
    flex-direction: row;   /* horizontal root */
    overflow: hidden;
  }

  /* ── LEFT SIDEBAR (fixed-width column) ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: var(--s1);
    border-right: 1px solid var(--b1);
    height: 100vh;
    overflow: hidden;
  }

  /* Move header elements into sidebar */
  .hdr {
    flex-direction: column;
    align-items: flex-start;
    padding: 20px 18px 16px;
    gap: 14px;
    border-right: none;
    border-bottom: 1px solid var(--b1);
  }
  .hdr-logo { font-size: 26px; }
  .hdr-right {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }
  .hdr-clock { font-size: 13px; flex: 1; }

  /* Burn bar goes below header in sidebar */
  .burn { margin: 0; }

  /* Nav becomes vertical in sidebar */
  .nav {
    flex-direction: column;
    border-bottom: none;
    padding: 10px 10px;
    gap: 2px;
  }
  .ntab {
    text-align: left;
    padding: 10px 14px;
    border-bottom: none;
    border-radius: 7px;
    border-left: 3px solid transparent;
    font-size: 13px;
    min-height: 40px;
    letter-spacing: .12em;
  }
  .ntab.on {
    border-left-color: var(--red);
    background: rgba(230,51,41,.08);
    color: var(--white);
    border-bottom: none;
  }
  .ntab-dot { top: 50%; transform: translateY(-50%); right: 10px; }

  /* Sidebar footer: user + date */
  .sidebar-footer {
    margin-top: auto;
    padding: 14px 18px;
    border-top: 1px solid var(--b1);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sidebar-date {
    font-family: var(--font-h);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .12em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .sidebar-stats {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .sidebar-user {
    font-family: var(--font-m);
    font-size: 10px;
    color: var(--grey2);
    cursor: pointer;
    padding: 5px 0;
    border: none;
    background: none;
    text-align: left;
    letter-spacing: .06em;
  }
  .sidebar-user:hover { color: var(--red); }

  /* ── MAIN CONTENT AREA ── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* Content width cap so it never stretches too wide */
  .view-head,
  .view-scroll {
    max-width: 800px;
    width: 100%;
    align-self: center;
  }
  /* But the head needs full-width background */
  .view-head {
    align-self: stretch;
  }
  .view-head > * {
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Day strip compact on desktop */
  .day-strip { padding: 16px 20px 12px; }
  .day-stats { gap: 8px; }
  .ds { font-size: 11px; padding: 4px 10px; }

  /* Add box wider */
  .add-box { padding: 14px 20px; }
  .add-inp { font-size: 15px; }

  /* Toolbar padding */
  .toolbar { padding: 8px 20px; }
  .filters { padding: 0 20px; }

  /* Card list with padding */
  .card-list { padding: 0 20px 8px; gap: 8px; }

  /* Cards: slightly more padding, nicer on large screen */
  .card-inner { padding: 13px 14px 13px 18px; }
  .card-title { font-size: 14px; }

  /* Drawer becomes a right-side panel (not bottom sheet) on desktop */
  #drawer {
    top: 0;
    left: auto;
    right: 0;
    bottom: 0;
    width: 440px;
    max-height: 100vh;
    border-radius: 0;
    border-top: none;
    border-left: 1px solid var(--b2);
    transform: translateX(100%);
  }
  #drawer.on { transform: translateX(0); }
  .dr-drag { display: none; }

  /* Analytics 2-col grid */
  .an-wrap { padding: 0 20px 24px; }

  /* Notif list padding */
  .notif-list { padding: 0 20px; }

  /* Toast position */
  #toast { bottom: 30px; }

  /* Section headers */
  .sec { padding: 12px 20px 6px; }

  /* Overdue banner */
  .od-banner { margin: 8px 20px 0; }

  /* Done section button */
  #show-done-wrap { padding: 4px 20px 8px; }

  /* Add form meta row */
  .add-meta { grid-template-columns: repeat(4, 1fr); }
  .add-row2 { grid-template-columns: 1fr 1fr 1fr; }

  /* Loading screen */
  #ls { gap: 24px; }
  .ls-logo { font-size: 60px; }
}

/* Very wide screens: even more contained */
@media (min-width: 1200px) {
  .sidebar { width: 280px; min-width: 280px; }
  .view-head > *, .view-scroll { max-width: 860px; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="ls">
  <div class="ls-logo">MUSTAINE</div>
  <div class="ls-sub">Task Tracker</div>
  <div class="ls-bar"><div class="ls-fill"></div></div>
</div>

<!-- AUTH -->
<div id="as">
  <div class="aw">
    <div class="a-logo">MUSTAINE</div>
    <div class="a-tag">Troopod Task Tracker</div>
    <div class="a-box">
      <div class="a-tabs">
        <button class="a-tab on" data-m="login" onclick="aTab('login')">Sign In</button>
        <button class="a-tab" data-m="signup" onclick="aTab('signup')">Sign Up</button>
      </div>
      <div id="af-name" style="display:none" class="a-field">
        <label>Full Name</label>
        <input class="a-inp" id="a-name" type="text" placeholder="Vinit Singh" autocomplete="name">
      </div>
      <div class="a-field">
        <label>Email</label>
        <input class="a-inp" id="a-email" type="email" placeholder="vinit.singh@pushstart.in" autocomplete="email" inputmode="email">
      </div>
      <div class="a-field">
        <label>Password</label>
        <input class="a-inp" id="a-pass" type="password" placeholder="Min 6 characters" autocomplete="current-password">
      </div>
      <div class="a-err" id="a-err"></div>
      <div class="a-ok" id="a-ok"></div>
      <button class="a-btn" id="a-btn" onclick="doAuth()"><span id="a-btntxt">Sign In</span></button>
      <div class="a-divider"><span>or</span></div>
      <button class="a-magic" onclick="doMagic()">Send Magic Link</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
<!-- MOBILE HEADER (hidden on desktop) -->
<div class="mob-hdr">
  <div class="hdr">
    <div class="hdr-logo">MUSTAINE</div>
    <div class="hdr-right">
      <div class="hdr-clock" id="hclock">00:00</div>
      <div class="hdr-notif" onclick="goTab('notifs')">
        <div class="notif-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
        <div class="notif-dot" id="ndot-m"></div>
      </div>
      <div class="hdr-user" id="hdr-user-m" onclick="doLogout()">Sign Out</div>
    </div>
  </div>
  <div class="burn"><div class="burn-fill" id="burn-m" style="width:0%"></div></div>
  <div class="nav">
    <button class="ntab on" id="nt-tasks-m"   onclick="goTab('tasks')">Tasks</button>
    <button class="ntab"    id="nt-notifs-m"  onclick="goTab('notifs')">Alerts<div class="ntab-dot" id="nbadge-m"></div></button>
    <button class="ntab"    id="nt-stats-m"   onclick="goTab('stats')">Stats</button>
  </div>
</div>
<div class="sidebar">
  <div class="hdr">
    <div class="hdr-logo">MUSTAINE</div>
    <div class="hdr-clock" id="hclock">00:00</div>
    <div class="hdr-notif" onclick="goTab('notifs')">
      <div class="notif-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
      <div class="notif-dot" id="ndot"></div>
    </div>
    <div class="hdr-user" id="hdr-user" onclick="doLogout()">Sign Out</div>
  </div>
  <div class="burn"><div class="burn-fill" id="burn" style="width:0%"></div></div>
  <div class="nav">
    <button class="ntab on" id="nt-tasks"   onclick="goTab('tasks')">Tasks</button>
    <button class="ntab"    id="nt-notifs"  onclick="goTab('notifs')">Alerts<div class="ntab-dot" id="nbadge"></div></button>
    <button class="ntab"    id="nt-stats"   onclick="goTab('stats')">Stats</button>
  </div><!-- /nav -->

  <!-- SIDEBAR FOOTER -->
  <div class="sidebar-footer">
    <div class="sidebar-date" id="sidebar-date"></div>
    <div class="sidebar-stats">
      <button class="ds ds-btn" onclick="setStatFilter('all')"    style="font-size:10px">Total <b id="sb-total">—</b></button>
      <button class="ds ds-btn" onclick="setStatFilter('done')"   style="font-size:10px">Done <b id="sb-done">—</b></button>
      <button class="ds ds-btn red" onclick="setStatFilter('overdue')" style="font-size:10px">Late <b id="sb-od">—</b></button>
    </div>
    <button class="sidebar-user" id="sidebar-user" onclick="doLogout()">Sign Out</button>
  </div>

</div><!-- /sidebar -->
<div class="main-area">

  <!-- TASKS -->
  <div class="view on" id="v-tasks">
  <div class="view-head">
    <div class="day-strip">
      <div class="day-date" id="day-date">—</div>
      <div class="day-stats">
        <button class="ds ds-btn" id="ds-total"   onclick="setStatFilter('all')"    title="Show all tasks">Total <b id="st-tot">0</b></button>
        <button class="ds ds-btn" id="ds-done"    onclick="setStatFilter('done')"   title="Show completed">Done <b id="st-done">0</b></button>
        <button class="ds ds-btn" id="ds-active"  onclick="setStatFilter('active')" title="Show active">Active <b id="st-active">0</b></button>
        <button class="ds ds-btn red" id="ds-od"  onclick="setStatFilter('overdue')" title="Show overdue">Overdue <b id="st-od">0</b></button>
      </div>
      <div id="load-bar" style="display:none" class="load-bar">
        <div class="lb-row"><span class="lb-lbl">Scheduled today</span><span class="lb-val" id="lb-val">0h</span></div>
        <div class="lb-track"><div class="lb-fill" id="lb-fill" style="width:0%"></div></div>
      </div>
      <div id="load-msg" style="display:none" class="load-msg"></div>
    </div>

    <div class="add-box">
      <div class="add-row">
        <input class="add-inp" id="add-title" placeholder="Add a task..." maxlength="140">
        <button class="add-btn" onclick="addTask()">ADD</button>
      </div>
      <div class="add-meta">
        <select class="add-sel" id="add-tag">
          <option value="sales">Sales</option><option value="revenue">Revenue</option>

// ═══════════════════════════════════════════════════════════════
// DAILY RECURRENCE ROLLOVER
// ═══════════════════════════════════════════════════════════════
async function rolloverDailyTasks() {
  // Find daily tasks that were done yesterday and need to reappear today
  const yesterday = (() => { const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
  const todayKey = today();
  const rollKey = 'rolled_' + todayKey + '_' + (SB.uid()||'');
  if (localStorage.getItem(rollKey)) return; // already rolled today

  try {
    // Fetch yesterday's completed daily tasks
    const yesterdayTasks = await SB.getRange(yesterday, yesterday);
    const dailyDone = yesterdayTasks
      .map(norm)
      .filter(t => t.recurrence === 'daily' && t.stage === 'done');

    if (dailyDone.length === 0) { localStorage.setItem(rollKey, '1'); return; }

    // Check which ones already exist today (avoid duplicates)
    const todayTasks = await SB.getTasks(todayKey);
    const todayTitles = new Set(todayTasks.map(t => t.title.toLowerCase()));

    let rolled = 0;
    for (const t of dailyDone) {
      if (todayTitles.has(t.title.toLowerCase())) continue; // already exists today
      const n = new Date().toISOString();
      const newTask = {
        id: uid6(),
        title: t.title,
        tag: t.tag,
        priority: t.priority,
        task_time: t.task_time || t.time || null,
        task_date: todayKey,
        stage: 'todo',
        done: false,
        created_at: n,
        recurrence: 'daily',
        remarks: '[]',
        activity: JSON.stringify([
          { ts: now(), text: 'Auto-created from daily recurring task' }
        ]),
        timer_total_seconds: 0,
        timer_started_at: null,
        timer_stopped_at: null,
      };
      try { await SB.upsert(newTask); rolled++; } catch(e) { console.warn('Rollover failed:', e); }
    }

    localStorage.setItem(rollKey, '1');
    if (rolled > 0) {
      toast(`${rolled} daily task${rolled>1?'s':''} reset for today`);
      await loadTasks(); render();
    }
  } catch(e) {
    console.warn('Daily rollover error (non-fatal):', e);
    localStorage.setItem(rollKey, '1'); // don't retry on error
  }
}

async function maybeSeed(){
  if(G.tasks.length>0)return;
  const k='seed_'+today()+'_'+(SB.uid()||'');
  if(localStorage.getItem(k))return;
  const n=new Date().toISOString();
  const mk=(title,tag,pri,time,stage='todo')=>({
    id:uid6(),title,tag,priority:pri,task_time:time||null,stage,done:stage==='done',
    task_date:today(),created_at:n,remarks:'[]',activity:JSON.stringify([{ts:now(),text:'Task created'}]),
    timer_total_seconds:0,timer_started_at:null,timer_stopped_at:null,
  });
  const seeds=[
    mk('Send Durex SOW deck to 100 Days','client','urgent','09:30'),
    mk('Wild Wand PDP approval follow-up','follow-up','high','10:00'),
    mk('Weekly revenue report','revenue','high','11:00'),
    mk('KAM sync - Mia Tanishq','kam','medium','12:00'),
    mk('Bullet PDP push to GitHub Pages','design','high','14:00','in_progress'),
    mk('Chase invoice - Mia Tanishq','sales','urgent','15:30'),
    mk('Sweet Nothings desktop build','client','medium','16:00'),
    mk('Vivi Longevity CVR review','revenue','medium','17:00'),
  ];
  for(const t of seeds){try{await SB.upsert(t);}catch{}}
  localStorage.setItem(k,'1');
  await loadTasks();
}

async function addTask(){
  const inp=document.getElementById('add-title');
  const title=inp.value.trim();
  if(!title){inp.classList.add('shake');setTimeout(()=>inp.classList.remove('shake'),400);inp.focus();return;}
  if(G.tasks.find(t=>t.title.toLowerCase()===title.toLowerCase())) toast('Similar task exists today','warn');
  const n=new Date().toISOString();
  const t={
    id:uid6(),title,
    tag:document.getElementById('add-tag').value,
    priority:document.getElementById('add-pri').value,
    task_time:document.getElementById('add-time').value||null,
    task_date:document.getElementById('add-date').value||today(),
    stage:'todo',done:false,created_at:n,
    recurrence:document.getElementById('add-recur')?.value||'none',
    remarks:'[]',activity:JSON.stringify([{ts:now(),text:'Task created'}]),
    timer_total_seconds:0,
    timer_started_at:new Date().toISOString(), // auto-start
    timer_stopped_at:null,
  };
  setSyncing(true);
  try{
    await SB.upsert(t);
    try{await SB.addNotif({task_id:t.id,title:'Task Created',body:title,type:'system'});}catch{}
    await loadTasks();render();
    inp.value='';inp.focus();
    toast('Task added, timer started');
  }catch(e){setSyncing(false,true);toast('Save failed: '+e.message,'err');}
}

async function patch(id,changes,logMsg){
  const task=G.tasks.find(t=>t.id===id);if(!task)return;
  const updated={...task,...changes};
  if(logMsg) updated.activity=[...(task.activity||[]),{ts:now(),text:logMsg}];
  const idx=G.tasks.findIndex(t=>t.id===id);
  if(idx!==-1) G.tasks[idx]=updated;
  render(); setSyncing(true);
  try{await SB.upsert(updated);setSyncing(false);}
  catch(e){setSyncing(false,true);toast('Sync error: '+e.message,'err');await loadTasks();render();}
  return updated;
}

async function delTask(e,id){
  e.stopPropagation();
  const btn=document.getElementById('del-'+id);
  if(G.delArm[id]){
    clearTimeout(G.delArm[id]);delete G.delArm[id];
    setSyncing(true);
    try{await SB.del(id);if(G.openId===id)closeDrawer();await loadTasks();render();toast('Task deleted');}
    catch(e){toast('Delete failed: '+e.message,'err');}
  }else{
    if(btn){btn.textContent='Delete?';btn.classList.add('arm');}
    G.delArm[id]=setTimeout(()=>{delete G.delArm[id];const b=document.getElementById('del-'+id);if(b){b.textContent='x';b.classList.remove('arm');}},2500);
  }
}

async function toggleDone(e,id){
  e.stopPropagation();
  const t=G.tasks.find(t=>t.id===id);if(!t)return;
  const ns=t.stage==='done'?'todo':'done';
  if(ns==='done'&&tRunning(t))await stopTimer(id);
  await patch(id,{stage:ns,done:ns==='done'},ns==='done'?'Marked done':'Reopened');
  if(ns==='done'){try{await SB.addNotif({task_id:id,title:'Task Complete',body:t.title,type:'done'});}catch{}await loadNotifs();notifBadge();}
  if(G.openId===id)await refreshDrawer();
}
async function cycleStage(e,id){
  e.stopPropagation();
  const t=G.tasks.find(t=>t.id===id);if(!t)return;
  const ord=['todo','in_progress','review','done'],cur=ord.indexOf(t.stage),nx=ord[(cur+1)%ord.length];
  if(nx==='done'&&tRunning(t))await stopTimer(id);
  await patch(id,{stage:nx,done:nx==='done'},`Stage: ${STG[t.stage]?.label} to ${STG[nx]?.label}`);
  if(G.openId===id)await refreshDrawer();
}
async function toggleBlock(e,id){
  e.stopPropagation();
  const t=G.tasks.find(t=>t.id===id);if(!t)return;
  if(t.stage==='blocked')await patch(id,{stage:'todo',done:false},'Unblocked');
  else await patch(id,{stage:'blocked',done:false},`Blocked (was ${STG[t.stage]?.label})`);
  if(G.openId===id)await refreshDrawer();
}

// inline edit
function startEdit(e,id){
  e.stopPropagation();
  const t=G.tasks.find(t=>t.id===id);if(!t)return;
  const el=document.getElementById('ct-'+id);if(!el||el.tagName==='INPUT')return;
  el.outerHTML=`<input class="card-title" id="ct-${id}" value="${esc(t.title)}" maxlength="140" style="background:var(--s3);border:1px solid var(--red);border-radius:4px;padding:2px 7px;color:var(--white);font-family:var(--font-b);font-size:14px;width:100%;outline:none" onclick="event.stopPropagation()" onblur="commitEdit('${id}')" onkeydown="editKey(event,'${id}')">`;
  const inp=document.getElementById('ct-'+id);if(inp){inp.focus();inp.select();}
}
function editKey(e,id){if(e.key==='Enter')commitEdit(id);if(e.key==='Escape')render();}
async function commitEdit(id){
  const inp=document.getElementById('ct-'+id);if(!inp||inp.tagName!=='INPUT')return;
  const val=inp.value.trim();const t=G.tasks.find(t=>t.id===id);if(!t)return;
  if(val&&val!==t.title){await patch(id,{title:val},`Title changed`);toast('Saved');}
  else render();
}

// quick actions (from drawer)
async function quickDone(id){
  const t=G.tasks.find(x=>x.id===id);if(!t)return;
  if(tRunning(t))await stopTimer(id);
  await patch(id,{stage:'done',done:true},'Marked done');
  try{await SB.addNotif({task_id:id,title:'Task Complete',body:t.title,type:'done'});}catch{}
  await loadNotifs();notifBadge();await refreshDrawer();toast('Done');
}
async function quickClose(id){
  const t=G.tasks.find(x=>x.id===id);if(!t)return;
  if(tRunning(t))await stopTimer(id);
  await patch(id,{stage:'done',done:true},'Task closed');await refreshDrawer();toast('Closed');
}
async function quickReopen(id){await patch(id,{stage:'todo',done:false},'Reopened');await refreshDrawer();toast('Reopened');}
async function markOD(id){
  const t=G.tasks.find(x=>x.id===id);if(!t)return;
  await patch(id,{},'Marked as overdue action required');
  try{await SB.addNotif({task_id:id,title:'Overdue Task',body:t.title,type:'overdue'});}catch{}
  await loadNotifs();notifBadge();await refreshDrawer();toast('Marked overdue');
}

// TIMER
// ═══════════════════════════════════════════════════════════════
async function startTimer(id){
  const t=G.tasks.find(x=>x.id===id);if(!t||tRunning(t))return;
  await patch(id,{timer_started_at:new Date().toISOString(),timer_stopped_at:null},'Timer started');
  startTickLoop();render();if(G.openId===id)await refreshDrawer();
}
async function stopTimer(id){
  const t=G.tasks.find(x=>x.id===id);if(!t||!tRunning(t))return;
  const el=tElapsed(t);
  await patch(id,{timer_started_at:null,timer_stopped_at:new Date().toISOString(),timer_total_seconds:el},`Timer stopped (${fmtT(el)})`);
  render();if(G.openId===id)await refreshDrawer();
}
function startTickLoop(){
  if(G.tick)return;
  G.tick=setInterval(()=>{
    G.tasks.filter(tRunning).forEach(t=>{
      const el=document.getElementById('ct-timer-'+t.id);if(el)el.textContent=fmtT(tElapsed(t));
    });
    if(G.openId){const t=G.tasks.find(x=>x.id===G.openId);if(t&&tRunning(t)){const el=document.getElementById('dr-timer');if(el)el.textContent=fmtT(tElapsed(t));}}
  },1000);
}

function setF(el){
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  G.filter=el.dataset.f;
  render();
  // Update filter tab counts
  updateFilterCounts();
}
function updateFilterCounts(){
  document.querySelectorAll('.ftab[data-f]').forEach(btn=>{
    const f=btn.dataset.f;
    if(f==='all'){
      const n=G.tasks.filter(t=>!['done','closed'].includes(t.stage)).length;
      btn.textContent=`All${n>0?' ('+n+')':''}`;
    } else {
      const n=G.tasks.filter(t=>t.tag===f&&!['done','closed'].includes(t.stage)).length;
      // Show count only if >0
      const base={sales:'Sales',revenue:'Revenue',client:'Client',kam:'KAM',design:'Design',ops:'Ops','follow-up':'Follow-up',control:'Control',management:'Management'}[f]||f;
      btn.textContent=n>0?`${base} (${n})`:base;
      // Dim tabs with no tasks
      btn.style.opacity=n===0&&G.tasks.length>0?'0.38':'1';
    }
  });
}
async function setDF(df){
  G.df=df;
  document.querySelectorAll('[data-df]').forEach(b=>b.classList.toggle('on',b.dataset.df===df));
  await loadTasks();render();
}
function toggleDoneVis(){G.showDone=!G.showDone;render();}
async function clearDone(){
  const done=G.tasks.filter(t=>t.stage==='done');
  if(!done.length){toast('No completed tasks');return;}
  if(!confirm(`Delete ${done.length} completed task${done.length>1?'s':''}?`))return;
  for(const t of done)try{await SB.del(t.id);}catch{}
  await loadTasks();render();toast(`Cleared ${done.length} tasks`);
}

function getActive(){
  let tt=G.tasks.filter(t=>t.stage!=='done'&&t.stage!=='blocked'&&t.stage!=='closed');
  if(G.filter!=='all')tt=tt.filter(t=>t.tag===G.filter);
  tt.sort((a,b)=>{
    const at=a.task_time||a.time,bt=b.task_time||b.time;
    if(at&&bt)return at<bt?-1:1;if(at&&!bt)return-1;if(!at&&bt)return 1;
    return new Date(a.created_at)-new Date(b.created_at);
  });
  return tt;
}

function setStatFilter(sf){
  G.statFilter = sf;
  // Update chip highlight
  ['ds-total','ds-done','ds-active','ds-od'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.classList.remove('active-chip');
  });
  const map={all:'ds-total',done:'ds-done',active:'ds-active',overdue:'ds-od'};
  const active=document.getElementById(map[sf]);
  if(active) active.classList.add('active-chip');
  // If not on tasks tab, switch to it
  goTab('tasks');
  render();
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  const all=G.tasks, done=all.filter(t=>t.stage==='done'), blocked=all.filter(t=>t.stage==='blocked');
  const active=all.filter(t=>!['done','blocked','closed'].includes(t.stage)), od=all.filter(isOD);

  // stats
  document.getElementById('st-tot').textContent=all.length;
  document.getElementById('st-done').textContent=done.length;
  document.getElementById('st-active').textContent=active.length;
  document.getElementById('st-od').textContent=od.length;
  // Sidebar stats
  const sbt=document.getElementById('sb-total');if(sbt)sbt.textContent=all.length;
  const sbd=document.getElementById('sb-done');if(sbd)sbd.textContent=done.length;
  const sbo=document.getElementById('sb-od');if(sbo)sbo.textContent=od.length;

  // overdue banner
  const ob=document.getElementById('od-banner');
  if(od.length){ob.className='od-banner on';ob.textContent=`${od.length} overdue task${od.length>1?'s':''}`;}
  else ob.className='od-banner';

  // load bar
  const timed=active.filter(t=>t.task_time||t.time);
  const lbar=document.getElementById('load-bar'),lmsg=document.getElementById('load-msg');
  if(all.length){
    lbar.style.display='';
    const pct=Math.min(100,Math.round(timed.length/16*100));
    document.getElementById('lb-fill').style.width=pct+'%';
    document.getElementById('lb-val').textContent=timed.length+'h scheduled';
    lmsg.style.display='';
    const n=active.length;
    if(n===0){lmsg.className='load-msg lm-ok';lmsg.textContent='All tasks done. Clean day.';}
    else if(n<=3){lmsg.className='load-msg lm-ok';lmsg.textContent=`${n} tasks, light load.`;}
    else if(n<=6){lmsg.className='load-msg lm-mid';lmsg.textContent=`${n} tasks, ${timed.length}h scheduled. Moderate day.`;}
    else if(n<=9){lmsg.className='load-msg lm-hi';lmsg.textContent=`${n} tasks. Heavy day, consider deferring.`;}
    else{lmsg.className='load-msg lm-max';lmsg.textContent=`${n} tasks. Maxed out. Prioritise ruthlessly.`;}
  }else{lbar.style.display='none';lmsg.style.display='none';}

  // active list — respects statFilter
  const al=document.getElementById('active-list'); al.innerHTML='';
  let fa;
  if(G.statFilter==='done'){
    fa=G.tasks.filter(t=>t.stage==='done'&&(G.filter==='all'||t.tag===G.filter));
  }else if(G.statFilter==='overdue'){
    fa=G.tasks.filter(t=>isOD(t)&&(G.filter==='all'||t.tag===G.filter));
  }else{
    fa=getActive();
  }
  const showingFiltered=(G.statFilter==='done'||G.statFilter==='overdue');
  if(!fa.length){
    const emptyMsg=G.statFilter==='done'?'No completed tasks yet':G.statFilter==='overdue'?'No overdue tasks':'No active tasks'+(G.filter!=='all'?` in ${G.filter} category`:'');
    al.innerHTML=`<div class="empty"><div class="empty-ico">[ NO TASKS ]</div><div class="empty-txt">${emptyMsg}</div></div>`;
  }else if(G.df!=='today'&&!showingFiltered){
    // group by date
    const grps={};fa.forEach(t=>{const d=t.task_date||t.date||today();if(!grps[d])grps[d]=[];grps[d].push(t);});
    Object.keys(grps).sort((a,b)=>b.localeCompare(a)).forEach(d=>{
      const isPast=d<today();const div=document.createElement('div');
      div.className='date-grp'+(isPast?' past':'');
      div.textContent=(d===today()?'Today':d)+(isPast?' — PAST':'');
      al.appendChild(div);grps[d].forEach(t=>al.appendChild(mkCard(t)));
    });
  }else{fa.forEach(t=>al.appendChild(mkCard(t)));}

  // done
  const dl=document.getElementById('done-list'),dh=document.getElementById('done-hdr');
  const sdb=document.getElementById('show-done-btn');
  const df=showingFiltered?[]:(G.filter==='all'?done:done.filter(t=>t.tag===G.filter));
  dl.innerHTML='';
  if(!df.length){dh.style.display='none';sdb.style.display='none';}
  else if(G.showDone){dh.style.display='flex';sdb.style.display='none';df.forEach(t=>dl.appendChild(mkCard(t)));}
  else{dh.style.display='none';sdb.style.display='';sdb.textContent=`Show ${df.length} completed`;}

  // update filter tab counts
  setTimeout(updateFilterCounts, 0);
  // blocked
  // When statFilter shows done or overdue: hide done/blocked sections (already shown above)
  const bfl=showingFiltered?[]:G.filter==='all'?blocked:blocked.filter(t=>t.tag===G.filter);
  document.getElementById('blocked-hdr').style.display=bfl.length?'flex':'none';
  const bl=document.getElementById('blocked-list');bl.innerHTML='';bfl.forEach(t=>bl.appendChild(mkCard(t)));
}

function mkCard(task){
  const tm=TAG[task.tag]||{label:task.tag,col:'#666'};
  const pm=PRI[task.priority]||PRI.medium;
  const sm=STG[task.stage]||STG.todo;
  const od=isOD(task), taskTime=task.task_time||task.time||'', off=minOff(taskTime);
  let tTxt='',tCls='ctime';
  if(taskTime){
    const[h,m]=taskTime.split(':').map(Number),ap=h>=12?'pm':'am',hr=h%12||12;
    tTxt=`${hr}:${String(m).padStart(2,'0')} ${ap}`;
    if(!task.done&&!['done','blocked','closed'].includes(task.stage)&&off!==null){
      if(off>5){tCls='ctime od';tTxt+=' - overdue';}else if(off>-20)tCls='ctime soon';
    }
  }
  const rc=(task.remarks||[]).length, ac=(task.attachments||[]).length;
  const running=tRunning(task), elapsed=tElapsed(task);
  const card=document.createElement('div');
  card.className='card'+(['done','closed'].includes(task.stage)?' done':'')+(task.stage==='blocked'?' blocked':'')+(od?' od':'');
  card.style.setProperty('--c',od?'#e63329':tm.col);
  card.dataset.id=task.id;
  card.innerHTML=`
    <div class="card-inner">
      <button class="card-check" onclick="toggleDone(event,'${task.id}')" style="${['done','closed'].includes(task.stage)?'background:var(--green);border-color:var(--green);color:#fff':''}">&#10003;</button>
      <div class="card-body">
        <div class="card-title" id="ct-${task.id}" ondblclick="startEdit(event,'${task.id}')">${esc(task.title)}</div>
        <div class="card-chips">
          <div class="pdot" style="background:${pm.col}" title="${pm.label}"></div>
          <span class="chip" style="color:${tm.col};border-color:${tm.col}25;background:${tm.col}12">${tm.label}</span>
          <span class="chip" style="color:${sm.col};border-color:${sm.col}25;background:${sm.col}12" onclick="event.stopPropagation();cycleStage(event,'${task.id}')">${sm.label}</span>
          ${task.recurrence==='daily'?`<span class="chip" style="color:#f97316;border-color:#f9731625;background:#f9731612;letter-spacing:.08em">DAILY</span>`:''}
          ${tTxt?`<span class="${tCls}">${tTxt}</span>`:''}
          ${task.task_date&&task.task_date!==today()&&G.df!=='today'?`<span class="ctime" style="color:var(--amber)">${task.task_date}</span>`:''}
        </div>
        <div class="ccounts">
          ${rc?`<span class="cc">${rc} note${rc>1?'s':''}</span>`:''}
          ${ac?`<span class="cc">${ac} file${ac>1?'s':''}</span>`:''}
          ${elapsed>0?`<span class="cc" id="ct-timer-${task.id}" style="color:${running?'var(--red)':'var(--gold)'}">${fmtT(elapsed)}</span>`:''}
        </div>
      </div>
      <div class="card-acts">
        <button class="card-del" id="del-${task.id}" onclick="delTask(event,'${task.id}')">x</button>
        <button class="card-blk" onclick="toggleBlock(event,'${task.id}')">${task.stage==='blocked'?'unblock':'block'}</button>
      </div>
    </div>
    ${running||elapsed>0?`<div class="card-timer"><span class="ct-disp${running?' run':''}" id="ct-timer-${task.id}">${fmtT(elapsed)}</span>${running?`<button class="ct-stop" onclick="stopTimer('${task.id}');event.stopPropagation()">Stop</button>`:''}</div>`:''}
  `;
  card.addEventListener('click',e=>{if(e.target.closest('.card-check,.card-del,.card-blk,.chip,.card-title[contenteditable]'))return;openDrawer(task.id);});
  return card;
}

// ═══════════════════════════════════════════════════════════════
// DRAWER
// ═══════════════════════════════════════════════════════════════
function openDrawer(id){
  G.openId=id; G.editingRemark=null;
  document.getElementById('backdrop').classList.add('on');
  document.getElementById('drawer').classList.add('on');
  refreshDrawer();
}
function closeDrawer(){
  G.openId=null;
  document.getElementById('backdrop').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
}
async function refreshDrawer(){
  if(!G.openId)return;
  const task=G.tasks.find(t=>t.id===G.openId);if(!task){closeDrawer();return;}
  let atts=[];try{atts=await SB.getAtts(task.id);}catch{}
  task.attachments=atts.map(a=>({id:a.id,name:a.name,size:a.size,type:a.mime_type,path:a.storage_path}));
  renderDrawer(task,atts);render();
}

function renderDrawer(task,atts){
  const steps=['todo','in_progress','review','done'];
  const curIdx=steps.indexOf(task.stage);
  const isBlocked=task.stage==='blocked', isClosed=task.stage==='closed';
  const isDone=task.stage==='done';
  const isPast=task.task_date&&task.task_date<today();
  const running=tRunning(task), elapsed=tElapsed(task);

  document.getElementById('dr-body').innerHTML=`
    ${isPast&&!isDone&&!isClosed?`<div style="background:rgba(230,51,41,.07);border:1px solid rgba(230,51,41,.22);border-radius:8px;padding:9px 13px;font-family:var(--font-m);font-size:10px;color:var(--red);letter-spacing:.05em">PAST TASK — ${task.task_date} — Action required</div>`:''}
    ${task.recurrence==='daily'?`<div style="background:rgba(249,115,22,.07);border:1px solid rgba(249,115,22,.25);border-radius:8px;padding:9px 13px;font-family:var(--font-m);font-size:10px;color:#f97316;letter-spacing:.05em;display:flex;align-items:center;gap:8px"><span style="font-size:16px">&#8635;</span> DAILY RECURRING — completes today, resets tomorrow</div>`:''}
    ${isDone?`<div style="background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.22);border-radius:8px;padding:9px 13px;font-family:var(--font-m);font-size:10px;color:var(--green);letter-spacing:.05em">COMPLETED</div>`:''}
    ${isClosed?`<div style="background:rgba(100,100,100,.07);border:1px solid rgba(100,100,100,.2);border-radius:8px;padding:9px 13px;font-family:var(--font-m);font-size:10px;color:var(--grey);letter-spacing:.05em">CLOSED</div>`:''}

    <div>
      <div class="dr-lbl">Title</div>
      <input class="dr-inp" id="dr-title" value="${esc(task.title)}" maxlength="140" onchange="drPatch('title',this.value)">
    </div>

    <div class="qa-row">
      ${!isDone&&!isClosed?`<button class="qa qa-done" onclick="quickDone('${task.id}')">Mark Done</button>`:''}
      ${!isClosed?`<button class="qa qa-close" onclick="quickClose('${task.id}')">Close Task</button>`:''}
      ${isDone||isClosed?`<button class="qa qa-reopen" onclick="quickReopen('${task.id}')">Reopen</button>`:''}
      ${isPast&&!isDone&&!isClosed?`<button class="qa qa-overdue" onclick="markOD('${task.id}')">Mark Overdue</button>`:''}
    </div>

    <div class="dr-2col">
      <div>
        <div class="dr-lbl">Category</div>
        <select class="dr-sel" onchange="drPatch('tag',this.value)">${Object.entries(TAG).map(([k,v])=>`<option value="${k}"${task.tag===k?' selected':''}>${v.label}</option>`).join('')}</select>
      </div>
      <div>
        <div class="dr-lbl">Priority</div>
        <select class="dr-sel" onchange="drPatch('priority',this.value)">${Object.entries(PRI).map(([k,v])=>`<option value="${k}"${task.priority===k?' selected':''}>${v.label}</option>`).join('')}</select>
      </div>
      <div>
        <div class="dr-lbl">Recurrence</div>
        <select class="dr-sel" onchange="drPatch('recurrence',this.value)">
          <option value="none" ${(task.recurrence||'none')==='none'?'selected':''}>One-time</option>
          <option value="daily" ${task.recurrence==='daily'?'selected':''}>Daily Recurring</option>
        </select>
      </div>
    </div>
    <div class="dr-2col">
      <div>
        <div class="dr-lbl">Time</div>
        <input class="dr-time" type="time" value="${task.task_time||task.time||''}" onchange="drPatch('task_time',this.value)">
      </div>
      <div>
        <div class="dr-lbl">Date</div>
        <input class="dr-time" type="date" value="${task.task_date||task.date||''}" onchange="drPatch('task_date',this.value)">
      </div>
    </div>

    <div>
      <div class="dr-lbl">Pipeline</div>
      <div class="stepper">${steps.map((s,i)=>{let cls='snode';if(isBlocked&&i===0)cls+=' blocked';else if(i<curIdx)cls+=' past';else if(i===curIdx)cls+=' active'+(s==='done'?' done':'');return `<div class="${cls}" onclick="drStage('${s}')"><div class="scircle">${i<curIdx?'+':STG[s].icon}</div><div class="slabel">${STG[s].label}</div></div>`;}).join('')}${isBlocked?`<div class="snode"><div class="scircle" style="border-color:var(--red);background:rgba(230,51,41,.12);color:var(--red)">x</div><div class="slabel">Blocked</div></div>`:''}</div>
      <div style="margin-top:7px">
        <button onclick="toggleBlock(event,'${task.id}')" style="font-family:var(--font-m);font-size:10px;padding:5px 12px;border-radius:5px;border:1px solid ${task.stage==='blocked'?'rgba(245,158,11,.4)':'rgba(230,51,41,.3)'};background:transparent;color:${task.stage==='blocked'?'var(--amber)':'var(--red)'};cursor:pointer;letter-spacing:.06em;text-transform:uppercase">${task.stage==='blocked'?'Unblock':'Block Task'}</button>
      </div>
    </div>

    <div>
      <div class="dr-lbl">Time Tracker</div>
      <div class="timer-card">
        <div class="timer-num${running?' run':''}" id="dr-timer">${fmtT(elapsed)}</div>
        <div class="timer-lbl">${running?'Timer running':'Total tracked'}</div>
        ${elapsed>0?`<div class="timer-total">${fmtT(elapsed)} total (${(elapsed/3600).toFixed(2)}h)</div>`:'<div class="timer-total">No time tracked</div>'}
        <div class="timer-btns">
          ${running?`<button class="t-stop" onclick="stopTimer('${task.id}')">Stop Timer</button>`:''}
          ${!running&&!['done','closed'].includes(task.stage)?`<button class="t-start" onclick="startTimer('${task.id}')">Start Timer</button>`:''}
        </div>
      </div>
    </div>

    <div>
      <div class="dr-lbl">Remarks (${(task.remarks||[]).length})</div>
      ${!(task.remarks||[]).length?'<div class="no-remarks">No remarks yet. Add notes below.</div>':''}
      ${(task.remarks||[]).map((r,i)=>`
        <div class="remark-item" style="margin-bottom:6px">
          ${G.editingRemark===i?`
            <div class="remark-edit-box">
              <textarea class="remark-edit-inp" id="r-edit-inp" rows="3">${esc(r.text)}</textarea>
              <div class="remark-edit-row">
                <button class="r-save" onclick="saveRemark(${i})">Save</button>
                <button class="r-cancel" onclick="cancelRemark()">Cancel</button>
              </div>
            </div>
          `:`
            <div class="remark-text">${esc(r.text)}</div>
            <div class="remark-meta">
              <span class="remark-ts">${fmtTs(r.ts)}${r.editedAt?` (edited ${fmtTs(r.editedAt)})`:''}</span>
              <div class="remark-acts">
                <button class="remark-edit-btn" onclick="editRemark(${i})">Edit</button>
                <button class="remark-del-btn" onclick="delRemark(${i})">Remove</button>
              </div>
            </div>
          `}
        </div>`).join('')}
      <div class="remark-add" style="margin-top:6px">
        <textarea class="remark-ta" id="r-inp" rows="2" placeholder="Add a note, decision, update, or blocker..." onkeydown="rKey(event)"></textarea>
        <button class="remark-add-btn" onclick="addRemark()">Add</button>
      </div>
    </div>

    <div>
      <div class="dr-lbl">Files (${atts.length})</div>
      ${!atts.length?'<div class="no-remarks">No files attached</div>':''}
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px">
        ${atts.map(a=>`<div class="att-item"><div style="flex:1;min-width:0"><div class="att-name">${esc(a.name)}</div><div class="att-size">${fmtSz(a.size)}</div></div><button class="att-dl" onclick="dlAtt('${a.storage_path||a.path||''}','${esc(a.name)}')">Download</button><button class="att-del" onclick="delAtt('${a.id}','${a.storage_path||a.path||''}')">x</button></div>`).join('')}
      </div>
      <div class="att-drop" id="att-drop" ondragover="dOn(event)" ondragleave="dOff()" ondrop="dDrop(event)">
        <input type="file" multiple onchange="dPick(this)" onclick="event.stopPropagation()">
        <div class="att-drop-txt">Drop files or tap to upload (max 5MB)</div>
      </div>
      <div id="att-warn" class="att-warn" style="display:none"></div>
    </div>

    <div>
      <div class="dr-lbl">Task Journey (${(task.activity||[]).length} events)</div>
      <div>
        ${[...(task.activity||[])].reverse().map(a=>`<div class="act-item"><div class="act-dot" style="background:${a.text.includes('done')||a.text.includes('complete')?'var(--green)':a.text.includes('Block')||a.text.includes('overdue')?'var(--red)':a.text.includes('Timer')?'var(--gold)':'var(--grey2)'}"></div><div class="act-txt">${esc(a.text)}</div><div class="act-ts">${fmtTs(a.ts)}</div></div>`).join('')||'<div class="no-remarks">No activity yet</div>'}
      </div>
    </div>

    <button class="dr-save" onclick="closeDrawer()">Close</button>
  `;
}

async function drPatch(field,val){
  if(!G.openId)return;const t=G.tasks.find(t=>t.id===G.openId);if(!t||String(t[field]||'')===String(val))return;
  await patch(G.openId,{[field]:val},`${field} updated`);
  if(['tag','priority'].includes(field))await refreshDrawer();
}
async function drStage(stage){
  if(!G.openId)return;const t=G.tasks.find(t=>t.id===G.openId);if(!t)return;
  if(stage==='done'&&tRunning(t))await stopTimer(G.openId);
  await patch(G.openId,{stage,done:stage==='done'},`Stage set to ${STG[stage]?.label}`);await refreshDrawer();
}

// remarks
function editRemark(i){G.editingRemark=i;refreshDrawer();}
function cancelRemark(){G.editingRemark=null;refreshDrawer();}
async function saveRemark(i){
  const inp=document.getElementById('r-edit-inp');const txt=inp?.value.trim();
  if(!txt||!G.openId){G.editingRemark=null;await refreshDrawer();return;}
  const t=G.tasks.find(t=>t.id===G.openId);if(!t)return;
  const r=[...(t.remarks||[])];r[i]={...r[i],text:txt,editedAt:now()};
  G.editingRemark=null;await patch(G.openId,{remarks:r},'Remark edited');await refreshDrawer();
}
async function addRemark(){
  const inp=document.getElementById('r-inp');const txt=inp?.value.trim();if(!txt||!G.openId)return;
  const t=G.tasks.find(t=>t.id===G.openId);if(!t)return;
  await patch(G.openId,{remarks:[...(t.remarks||[]),{ts:now(),text:txt}]},'Remark added');
  inp.value='';await refreshDrawer();
}
async function delRemark(i){
  if(!G.openId)return;const t=G.tasks.find(t=>t.id===G.openId);if(!t)return;
  const r=[...(t.remarks||[])];r.splice(i,1);
  await patch(G.openId,{remarks:r},'Remark removed');await refreshDrawer();
}
function rKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addRemark();}}

// attachments
async function dlAtt(path,name){try{const url=await SB.signUrl(path);const a=document.createElement('a');a.href=url;a.download=name;a.target='_blank';a.click();}catch(e){toast('Download failed: '+e.message,'err');}}
async function delAtt(id,path){try{await SB.delAtt(id,path);await patch(G.openId,{},'File removed');await refreshDrawer();}catch(e){toast('Delete failed: '+e.message,'err');}}
async function processFiles(files){
  if(!G.openId)return;const warns=[],we=document.getElementById('att-warn');
  for(const f of [...files]){
    if(f.size>MAX_FILE){warns.push(`${f.name} exceeds 5MB`);continue;}
    if(f.size>WARN_FILE)warns.push(`${f.name} is large (${fmtSz(f.size)})`);
    try{setSyncing(true);await SB.upload(G.openId,f);await patch(G.openId,{},'File attached: '+f.name);}
    catch(e){setSyncing(false,true);warns.push(`${f.name}: ${e.message}`);}
  }
  if(we){we.style.display=warns.length?'':'none';we.textContent=warns.join(' | ');}
  await refreshDrawer();render();
}
function dPick(inp){processFiles(inp.files);inp.value='';}
function dOn(e){e.preventDefault();document.getElementById('att-drop')?.classList.add('drag');}
function dOff(){document.getElementById('att-drop')?.classList.remove('drag');}
function dDrop(e){e.preventDefault();dOff();processFiles(e.dataTransfer.files);}
