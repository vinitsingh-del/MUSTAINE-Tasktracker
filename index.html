    // reset time to next slot
    const n2 = new Date();
    document.getElementById('add-time').value = `${String(n2.getHours()).padStart(2,'0')}:${String(n2.getMinutes()>=30?0:30).padStart(2,'0')}`;
    toast('Task added - timer started');
    startTickLoop();
    // Create notification
    try { await SB.insertNotif({ task_id: t.id, title: 'Task Created', body: title, type: 'system' }); } catch {}
  } catch(e) { setSyncing(false, true); toast('Save failed: ' + e.message, 'err'); }
}

async function patch(id, changes, logMsg) {
  const task = S.tasks.find(t => t.id === id); if (!task) return;
  const updated = { ...task, ...changes };
  if (logMsg) updated.activity = [...(task.activity||[]), {ts:nowTs(),text:logMsg}];
  const idx = S.tasks.findIndex(t => t.id === id);
  if (idx !== -1) S.tasks[idx] = updated;
  render();
  setSyncing(true);
  try {
    await SB.upsertTask(updated);
    setSyncing(false);
  } catch(e) {
    setSyncing(false, true);
    toast('Sync error: ' + e.message, 'err');
    await loadTasks(); render();
  }
  return updated;
}

async function delTask(e, id) {
  e.stopPropagation();
  const btn = document.getElementById('del-'+id);
  if (S.delConfirm[id]) {
    clearTimeout(S.delConfirm[id]); delete S.delConfirm[id];
    setSyncing(true);
    try {
      await SB.deleteTask(id);
      if (S.openId === id) closeDrawer();
      await loadTasks(); render(); toast('Task deleted');
    } catch(e) { toast('Delete failed: '+e.message,'err'); }
  } else {
    if (btn) { btn.textContent = 'Delete?'; btn.classList.add('arming'); }
    S.delConfirm[id] = setTimeout(() => {
      delete S.delConfirm[id];
      const b = document.getElementById('del-'+id);
      if (b) { b.textContent = 'x'; b.classList.remove('arming'); }
    }, 2500);
  }
}

async function toggleDone(e, id) {
  e.stopPropagation();
  const task = S.tasks.find(t => t.id === id); if (!task) return;
  const ns = task.stage === 'done' ? 'todo' : 'done';
  if (ns === 'done' && timerRunning(task)) await stopTimer(id);
  await patch(id, { stage: ns, done: ns === 'done' }, ns === 'done' ? 'Marked done' : 'Marked active');
  if (ns === 'done') {
    try { await SB.insertNotif({ task_id: id, title: 'Task Complete', body: task.title, type: 'done' }); } catch {}
    await loadNotifs(); renderNotifBadge();
  }
  if (S.openId === id) await refreshDrawer();
}

async function cycleStage(e, id) {
  e.stopPropagation();
  const task = S.tasks.find(t => t.id === id); if (!task) return;
  const order = ['todo','in_progress','review','done'], cur = order.indexOf(task.stage), next = order[(cur+1)%order.length];
  if (next === 'done' && timerRunning(task)) await stopTimer(id);
  await patch(id, { stage: next, done: next === 'done' }, `Stage: ${STG[task.stage]?.label} to ${STG[next]?.label}`);
  if (S.openId === id) await refreshDrawer();
}

async function toggleBlock(e, id) {
  e.stopPropagation();
  const task = S.tasks.find(t => t.id === id); if (!task) return;
  if (task.stage === 'blocked') await patch(id, { stage: 'todo', done: false }, 'Unblocked');
  else await patch(id, { stage: 'blocked', done: false }, `Blocked (was ${STG[task.stage]?.label})`);
  if (S.openId === id) await refreshDrawer();
}

// inline edit
function startEdit(e, id) {
  e.stopPropagation();
  const task = S.tasks.find(t => t.id === id); if (!task) return;
  const el = document.getElementById('ct-'+id); if (!el || el.tagName === 'INPUT') return;
  el.outerHTML = `<input class="card-title-inp" id="ct-${id}" value="${esc(task.title)}" maxlength="140" onclick="event.stopPropagation()" onblur="commitEdit('${id}')" onkeydown="editKey(event,'${id}')">`;
  const inp = document.getElementById('ct-'+id); if (inp) { inp.focus(); inp.select(); }
}
function editKey(e, id) {
  if (e.key==='Enter') commitEdit(id);
  if (e.key==='Escape') render();
}
async function commitEdit(id) {
  const inp = document.getElementById('ct-'+id); if (!inp || inp.tagName!=='INPUT') return;
  const val = inp.value.trim(); const task = S.tasks.find(t => t.id === id); if (!task) return;
  if (val && val !== task.title) { await patch(id, { title: val }, `Title changed`); toast('Saved'); }
  else render();
}

async function quickDone(id) {
  const task = S.tasks.find(t=>t.id===id); if(!task) return;
  if (timerRunning(task)) await stopTimer(id);
  await patch(id, { stage:'done', done:true }, 'Marked done');
  try { await SB.insertNotif({ task_id:id, title:'Task Complete', body:task.title, type:'done' }); await loadNotifs(); renderNotifBadge(); } catch {}
  await refreshDrawer();
  toast('Task marked done');
}
async function quickClose(id) {
  const task = S.tasks.find(t=>t.id===id); if(!task) return;
  if (timerRunning(task)) await stopTimer(id);
  // Close = done + activity log entry "Closed"
  await patch(id, { stage:'done', done:true }, 'Task closed');
  await refreshDrawer();
  toast('Task closed');
}
async function quickReopen(id) {
  await patch(id, { stage:'todo', done:false }, 'Reopened');
  await refreshDrawer();
  toast('Task reopened');
}
async function markOverdueAction(id) {
  const task = S.tasks.find(t=>t.id===id); if(!task) return;
  await patch(id, {}, 'Marked as overdue action required');
  try { await SB.insertNotif({ task_id:id, title:'Overdue Task', body:task.title+' was past due', type:'overdue' }); await loadNotifs(); renderNotifBadge(); } catch {}
  await refreshDrawer();
  toast('Marked as overdue');
}

async function clearDone() {
  const done = S.tasks.filter(t => t.stage === 'done');
  if (!done.length) { toast('No completed tasks'); return; }
  if (!confirm(`Delete ${done.length} completed tasks?`)) return;
  for (const t of done) { try { await SB.deleteTask(t.id); } catch {} }
  await loadTasks(); render(); toast(`Cleared ${done.length} tasks`);
}

// ── FILTER / SORT ─────────────────────────────────────────────────────────────
let activeFilter = 'all';
function setFilter(el) {
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  el.classList.add('on'); activeFilter = el.dataset.f; render();
}
function toggleDoneList() { S.showDone = !S.showDone; render(); }

function filteredActive() {
  let tt = S.tasks.filter(t => t.stage !== 'done' && t.stage !== 'blocked' && t.stage !== 'closed');
  if (activeFilter !== 'all') tt = tt.filter(t => t.tag === activeFilter);
  const po={urgent:0,high:1,medium:2,low:3}, so={todo:0,in_progress:1,review:2};
  const sort = document.getElementById('sort-sel')?.value || 'time';
  tt.sort((a,b) => {
    if (sort==='priority') return po[a.priority]-po[b.priority];
    if (sort==='stage')    return so[a.stage]-so[b.stage];
    if (sort==='created')  return new Date(a.created_at)-new Date(b.created_at);
    const at=a.task_time||a.time, bt=b.task_time||b.time;
    if(at&&bt)return at<bt?-1:1; if(at&&!bt)return-1; if(!at&&bt)return 1;
    return new Date(a.created_at)-new Date(b.created_at);
  });
  return tt;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const today_tasks = S.tasks;
  const done    = today_tasks.filter(t => t.stage === 'done');
  const blocked = today_tasks.filter(t => t.stage === 'blocked');
  const active  = today_tasks.filter(t => t.stage !== 'done' && t.stage !== 'blocked');
  const overdue = today_tasks.filter(isOD);

  document.getElementById('st-total').textContent   = today_tasks.length;
  document.getElementById('st-done').textContent    = done.length;
  document.getElementById('st-active').textContent  = active.length;
  document.getElementById('st-overdue').textContent = overdue.length;

  const ob = document.getElementById('ob');
  if (overdue.length) { ob.className='overdue-banner on'; ob.textContent=`${overdue.length} overdue task${overdue.length>1?'s':''} - check your schedule`; }
  else ob.className='overdue-banner';

  // Active
  const al = document.getElementById('active-list'); al.innerHTML='';
  const fa = filteredActive();
  if (!fa.length) al.innerHTML=`<div class="empty-state"><div class="empty-icon">[ ]</div><div class="empty-text">No active tasks${activeFilter!=='all'?' in this category':''}</div></div>`;
  else {
    if (S_dateFilter !== 'today') {
      // Group by date
      const groups = {};
      fa.forEach(t => { const d=t.task_date||t.date||today(); if(!groups[d])groups[d]=[]; groups[d].push(t); });
      Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date => {
        const isPast = date < today();
        const lbl = date === today() ? 'Today' : date;
        const grpHdr = document.createElement('div');
        grpHdr.style.cssText='padding:8px 4px 4px;font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:'+(isPast?'var(--red)':'var(--gold)');
        grpHdr.textContent = lbl + (isPast?' - PAST':'');
        al.appendChild(grpHdr);
        groups[date].forEach(t => al.appendChild(buildCard(t)));
      });
    } else {
      fa.forEach(t => al.appendChild(buildCard(t)));
    }
  }

  // Done
  const dl=document.getElementById('done-list'), dh=document.getElementById('done-hdr'), sdw=document.getElementById('show-done-wrap'), sdb=document.getElementById('show-done-btn');
  const doneFilt = (activeFilter==='all' ? done : done.filter(t=>t.tag===activeFilter)).concat(S.tasks.filter(t=>t.stage==='closed'&&(activeFilter==='all'||t.tag===activeFilter)));
  dl.innerHTML='';
  if (!doneFilt.length) { dh.style.display='none'; sdw.style.display='none'; }
  else if (S.showDone) { dh.style.display='flex'; sdw.style.display='none'; doneFilt.forEach(t=>dl.appendChild(buildCard(t))); }
  else { dh.style.display='none'; sdw.style.display=''; sdb.textContent=`Show ${doneFilt.length} completed`; }

  // Blocked
  const bFilt = activeFilter==='all' ? blocked : blocked.filter(t=>t.tag===activeFilter);
  document.getElementById('blocked-hdr').style.display = bFilt.length ? 'flex' : 'none';
  const bl=document.getElementById('blocked-list'); bl.innerHTML='';
  bFilt.forEach(t=>bl.appendChild(buildCard(t)));

  calcDayLoad();
  setupScrollReveal();
}

function buildCard(task) {
  const tm = TAG[task.tag]     || {label:task.tag,col:'#888'};
  const pm = PRI[task.priority]|| PRI.medium;
  const sm = STG[task.stage]   || STG.todo;
  const od = isOD(task);
  const taskTime = task.task_time || task.time || '';
  const off = minOff(taskTime);
  let timeTxt = '', timeCls = 'card-time';
  if (taskTime) {
    const [h,m]=taskTime.split(':').map(Number), ap=h>=12?'pm':'am', hr=h%12||12;
    timeTxt=`${hr}:${String(m).padStart(2,'0')} ${ap}`;
    if (!task.done && task.stage!=='done' && off!==null) {
      if(off>5){timeCls='card-time overdue';timeTxt+=' - overdue';}
      else if(off>-20) timeCls='card-time soon';
    }
  }
  const rc=(task.remarks||[]).length, ac=(task.attachments||[]).length;
  const running = timerRunning(task);
  const elapsed = timerElapsed(task);
  const taskDate = task.task_date || task.date || '';
  const isNotToday = taskDate && taskDate !== today();

  const card = document.createElement('div');
  card.className='task-card'+(task.stage==='done'||task.stage==='closed'?' done-card':'')+(task.stage==='blocked'?' blocked-card':'')+(od?' overdue-card':'');
  card.style.setProperty('--accent-col', od ? '#ff2d2d' : tm.col);
  card.dataset.id = task.id;

  card.innerHTML=`
    <div class="card-shine"></div>
    <div class="card-body">
      <button class="card-check" onclick="toggleDone(event,'${task.id}')" style="${task.stage==='done'?'background:var(--green);border-color:var(--green);color:#fff':''}">&#10003;</button>
      <div class="card-main">
        <div class="card-title" id="ct-${task.id}" ondblclick="startEdit(event,'${task.id}')">${esc(task.title)}</div>
        <div class="card-tags">
          <div class="pri-dot" style="background:${pm.col}" title="${pm.label}"></div>
          <span class="tag-chip" style="color:${tm.col};border-color:${tm.col}30;background:${tm.col}10">${tm.label}</span>
          <span class="stage-chip" style="color:${sm.col};border-color:${sm.col}30;background:${sm.col}10" onclick="event.stopPropagation();cycleStage(event,'${task.id}')">${sm.label}</span>
          ${timeTxt?`<span class="${timeCls}">${timeTxt}</span>`:''}
          <div class="card-counts">
            ${isNotToday?`<span class="ccount" style="color:var(--amber)">${taskDate}</span>`:''}
            ${rc?`<span class="ccount">${rc} note${rc>1?'s':''}</span>`:''}
            ${ac?`<span class="ccount">${ac} file${ac>1?'s':''}</span>`:''}
            ${elapsed>0?`<span class="ccount" id="timer-${task.id}" style="color:${running?'var(--red)':'var(--gold)'}">${fmtTimer(elapsed)}</span>`:''}
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="card-del" id="del-${task.id}" onclick="delTask(event,'${task.id}')">x</button>
        <button class="card-block" onclick="toggleBlock(event,'${task.id}')">${task.stage==='blocked'?'unblock':'block'}</button>
      </div>
    </div>
    ${(running || elapsed > 0) ? `
    <div class="card-timer">
      <span class="timer-disp${running?' running':''}" id="timer-${task.id}">${fmtTimer(elapsed)}</span>
      ${running ? `<button class="timer-stop-btn" onclick="stopTimer('${task.id}');event.stopPropagation()">Stop Timer</button>` : ''}
    </div>` : ''}`;

  card.addEventListener('click', e => {
    if (e.target.closest('.card-check,.card-del,.card-block,.stage-chip,.card-title-inp')) return;
    openDrawer(task.id);
  });
  return card;
}

// ── DRAWER ────────────────────────────────────────────────────────────────────
function openDrawer(id) {
  S.openId = id;
  S.editingRemark = null; // always reset editing state
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  refreshDrawer();
}
function closeDrawer() {
  S.openId = null;
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}
async function refreshDrawer() {
  if (!S.openId) return;
  const task = S.tasks.find(t => t.id === S.openId);
  if (!task) { closeDrawer(); return; }
  let atts = [];
  try { atts = await SB.getAttachments(task.id); } catch {}
  task.attachments = atts.map(a=>({id:a.id,name:a.name,size:a.size,type:a.mime_type,path:a.storage_path}));
  renderDrawer(task, atts);
}

function renderDrawer(task, atts) {
  const steps = ['todo','in_progress','review','done'];
  const curIdx = steps.indexOf(task.stage);
  const isBlocked = task.stage === 'blocked';
  const isPast = task.task_date && task.task_date < today();
  const running = timerRunning(task);
  const elapsed = timerElapsed(task);
  const doneStage = task.stage === 'done';
  const closedStage = task.stage === 'closed';

  document.getElementById('dr-body').innerHTML = `
    <!-- STATUS BANNER -->
    ${isPast && !doneStage && !closedStage ? `<div style="background:rgba(255,45,45,.08);border:1px solid rgba(255,45,45,.25);border-radius:8px;padding:10px 14px;font-family:var(--font-mono);font-size:10px;color:var(--red);letter-spacing:.06em">PAST TASK - ${task.task_date} - Mark as overdue or done</div>` : ''}
    ${doneStage ? `<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:10px 14px;font-family:var(--font-mono);font-size:10px;color:var(--green);letter-spacing:.06em">COMPLETED ${task.activity?.filter(a=>a.text==='Marked done').length?'':'today'}</div>` : ''}
    ${closedStage ? `<div style="background:rgba(100,100,100,.1);border:1px solid rgba(100,100,100,.2);border-radius:8px;padding:10px 14px;font-family:var(--font-mono);font-size:10px;color:var(--grey);letter-spacing:.06em">CLOSED TASK</div>` : ''}

    <!-- TITLE -->
    <div>
      <div class="dr-label">Title</div>
      <input class="dr-inp" id="dr-title" value="${esc(task.title)}" maxlength="140" onchange="drPatch('title',this.value)">
    </div>

    <!-- QUICK ACTIONS ROW -->
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${!doneStage && !closedStage ? `<button onclick="quickDone('${task.id}')" style="flex:1;background:var(--green);color:#fff;border:none;border-radius:8px;padding:11px 10px;font-family:var(--font-display);font-size:14px;font-weight:800;letter-spacing:.1em;cursor:pointer;text-transform:uppercase">Mark Done</button>` : ''}
      ${!closedStage ? `<button onclick="quickClose('${task.id}')" style="flex:1;background:var(--s3);color:var(--grey);border:1px solid var(--b3);border-radius:8px;padding:11px 10px;font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase">Close Task</button>` : ''}
      ${doneStage || closedStage ? `<button onclick="quickReopen('${task.id}')" style="flex:1;background:var(--s3);color:var(--amber);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:11px 10px;font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:.1em;cursor:pointer;text-transform:uppercase">Reopen</button>` : ''}
      ${isPast && !doneStage && !closedStage ? `<button onclick="markOverdueAction('${task.id}')" style="flex:1;background:rgba(255,45,45,.1);color:var(--red);border:1px solid rgba(255,45,45,.3);border-radius:8px;padding:11px 10px;font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:.08em;cursor:pointer;text-transform:uppercase">Mark Overdue</button>` : ''}
    </div>

    <!-- FIELDS -->
    <div class="dr-row">
      <div>
        <div class="dr-label">Category</div>
        <select class="dr-sel" onchange="drPatch('tag',this.value)">${Object.entries(TAG).map(([k,v])=>`<option value="${k}"${task.tag===k?' selected':''}>${v.label}</option>`).join('')}</select>
      </div>
      <div>
        <div class="dr-label">Priority</div>
        <select class="dr-sel" onchange="drPatch('priority',this.value)">${Object.entries(PRI).map(([k,v])=>`<option value="${k}"${task.priority===k?' selected':''}>${v.label}</option>`).join('')}</select>
      </div>
    </div>
    <div class="dr-row">
      <div>
        <div class="dr-label">Time</div>
        <input class="dr-time" type="time" value="${task.task_time||task.time||''}" onchange="drPatch('task_time',this.value)">
      </div>
      <div>
        <div class="dr-label">Date</div>
        <input class="dr-time" type="date" value="${task.task_date||task.date||''}" onchange="drPatch('task_date',this.value)">
      </div>
    </div>

    <!-- STAGE PIPELINE -->
    <div>
      <div class="dr-label">Stage Pipeline</div>
      <div class="stepper">${steps.map((s,i)=>{
        let cls='step-node';
        if(isBlocked&&i===0) cls+=' step-blocked';
        else if(i<curIdx) cls+=' step-past';
        else if(i===curIdx) cls+=' step-active'+(s==='done'?' step-done':'');
        return \`<div class="\${cls}" onclick="drSetStage('\${s}')">
          <div class="step-circle">\${i<curIdx?'+':STG[s].icon}</div>
          <div class="step-name">\${STG[s].label}</div>
        </div>\`;
      }).join('')}${isBlocked?`<div class="step-node"><div class="step-circle" style="border-color:var(--red);background:rgba(255,45,45,.15);color:var(--red)">x</div><div class="step-name">Blocked</div></div>`:''}</div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="toggleBlock(event,'${task.id}')" style="font-family:var(--font-mono);font-size:10px;padding:6px 12px;border-radius:5px;border:1px solid ${task.stage==='blocked'?'rgba(245,158,11,.4)':'rgba(255,45,45,.3)'};background:transparent;color:${task.stage==='blocked'?'var(--amber)':'var(--red)'};cursor:pointer;letter-spacing:.06em;text-transform:uppercase">
          ${task.stage==='blocked'?'Unblock':'Block Task'}
        </button>
      </div>
    </div>

    <!-- TIMER -->
    <div>
      <div class="dr-label">Time Tracker</div>
      <div class="timer-card">
        <div class="timer-display">
          <div class="timer-hhmm${running?' running':''}" id="dr-timer-disp">${fmtTimer(elapsed)}</div>
          <div class="timer-label">${running?'Timer is running':'Total tracked time'}</div>
        </div>
        <div class="timer-actions">
          ${running
            ? `<button class="timer-btn timer-stop" onclick="stopTimer('${task.id}')">Stop</button>`
            : task.stage!=='done'&&task.stage!=='closed'?`<button class="timer-btn timer-start" onclick="startTimer('${task.id}')">Start</button>`:''
          }
        </div>
        ${elapsed>0?`<div class="timer-total">${fmtTimer(elapsed)} total (${(elapsed/3600).toFixed(2)}h including all sessions)</div>`:'<div class="timer-total">No time tracked yet</div>'}
      </div>
    </div>

    <!-- REMARKS - FULL EDIT -->
    <div>
      <div class="dr-label" style="display:flex;align-items:center;justify-content:space-between">
        <span>Remarks (${(task.remarks||[]).length})</span>
      </div>
      <div id="remark-list">
        ${(task.remarks||[]).length === 0 ? '<div style="font-family:var(--font-mono);font-size:10px;color:var(--grey2);padding:8px 0">No remarks yet. Add your first note below.</div>' : ''}
        ${(task.remarks||[]).map((r,i)=>`
          <div class="remark-item" id="remark-${i}">
            ${S.editingRemark===i
              ? `<textarea class="remark-textarea" id="remark-edit-inp" rows="2" style="margin-bottom:6px">${esc(r.text)}</textarea>
                 <div style="display:flex;gap:6px">
                   <button onclick="saveRemarkEdit(${i})" style="background:var(--red);color:#fff;border:none;border-radius:5px;padding:5px 12px;font-family:var(--font-mono);font-size:10px;cursor:pointer">Save</button>
                   <button onclick="cancelRemarkEdit()" style="background:var(--s3);color:var(--grey);border:1px solid var(--b3);border-radius:5px;padding:5px 12px;font-family:var(--font-mono);font-size:10px;cursor:pointer">Cancel</button>
                 </div>`
              : `<div class="remark-text">${esc(r.text)}</div>
                 <div class="remark-meta">
                   <span class="remark-ts">${fmtTs(r.ts)}</span>
                   <div style="display:flex;gap:8px">
                     <button onclick="editRemark(${i})" style="background:none;border:none;color:var(--grey2);font-family:var(--font-mono);font-size:9px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em">Edit</button>
                     <button class="remark-del" onclick="delRemark(${i})">x</button>
                   </div>
                 </div>`
            }
          </div>`).join('')}
      </div>
      <div class="remark-add" style="margin-top:8px">
        <textarea class="remark-textarea" id="remark-inp" rows="2" placeholder="Add a note, decision, update, or blocker..." onkeydown="remarkKey(event)"></textarea>
        <button class="remark-submit" onclick="addRemark()">Add</button>
      </div>
    </div>

    <!-- ATTACHMENTS -->
    <div>
      <div class="dr-label">Files (${atts.length})</div>
      <div class="attach-list" id="att-list">
        ${atts.length===0?'<div style="font-family:var(--font-mono);font-size:10px;color:var(--grey2);padding:4px 0">No files attached</div>':''}
        ${atts.map(a=>`
          <div class="attach-row">
            <div style="min-width:0;flex:1">
              <div class="attach-name">${esc(a.name)}</div>
              <div class="attach-size">${fmtSz(a.size)}</div>
            </div>
            <button class="attach-dl" onclick="dlAtt('${a.storage_path||a.path||''}','${esc(a.name)}')">Download</button>
            <button class="attach-del" onclick="delAtt('${a.id}','${a.storage_path||a.path||''}')">x</button>
          </div>`).join('')}
      </div>
      <div class="attach-drop" id="att-drop" ondragover="dragOn(event)" ondragleave="dragOff()" ondrop="dropFiles(event)" style="margin-top:8px">
        <input type="file" multiple onchange="pickFiles(this)" onclick="event.stopPropagation()">
        <div class="attach-drop-text">Drop files or tap to upload (max 5MB each)</div>
      </div>
      <div id="att-warn" class="attach-warn" style="display:none"></div>
    </div>

    <!-- FULL TASK JOURNEY -->
    <div>
      <div class="dr-label">Task Journey (${(task.activity||[]).length} events)</div>
      <div class="act-list" id="journey-list">
        ${[...(task.activity||[])].reverse().map(a=>`
          <div class="act-item">
            <div class="act-dot" style="background:${a.text.includes('done')?'var(--green)':a.text.includes('Blocked')?'var(--red)':a.text.includes('Timer')?'var(--gold)':'var(--grey3)'}"></div>
            <div class="act-text">${esc(a.text)}</div>
            <div class="act-ts">${fmtTs(a.ts)}</div>
          </div>`).join('')||'<div style="font-size:11px;color:var(--grey2);font-family:var(--font-mono)">No activity yet</div>'}
      </div>
    </div>

    <button class="dr-save" onclick="closeDrawer()">Close</button>
  `;
}


async function drPatch(field, val) {
  if (!S.openId) return;
  const task = S.tasks.find(t => t.id === S.openId); if (!task) return;
  if (String(task[field]||'') === String(val)) return;
  await patch(S.openId, { [field]: val }, `${field} updated`);
  if (['tag','priority','stage'].includes(field)) await refreshDrawer();
}
async function drSetStage(stage) {
  if (!S.openId) return;
  const task = S.tasks.find(t => t.id === S.openId); if (!task) return;
  if (stage === 'done' && timerRunning(task)) await stopTimer(S.openId);
  await patch(S.openId, { stage, done: stage==='done' }, `Stage set to ${STG[stage]?.label}`);
  await refreshDrawer();
}

// remarks
function editRemark(idx) {
  S.editingRemark = idx;
  refreshDrawer();
}
function cancelRemarkEdit() {
  S.editingRemark = null;
  refreshDrawer();
}
async function saveRemarkEdit(idx) {
  const inp = document.getElementById('remark-edit-inp');
  const text = inp?.value.trim();
  if (!text || !S.openId) { S.editingRemark=null; await refreshDrawer(); return; }
  const task = S.tasks.find(t => t.id === S.openId); if (!task) return;
  const remarks = [...(task.remarks||[])];
  remarks[idx] = { ...remarks[idx], text, editedAt: nowTs() };
  S.editingRemark = null;
  await patch(S.openId, { remarks }, `Remark edited`);
  await refreshDrawer();
}

async function addRemark() {
  const inp = document.getElementById('remark-inp'), text = inp?.value.trim(); if (!text||!S.openId) return;
  const task = S.tasks.find(t => t.id === S.openId); if (!task) return;
  await patch(S.openId, { remarks: [...(task.remarks||[]), {ts:nowTs(),text}] }, 'Remark added');
  inp.value=''; await refreshDrawer();
}
async function delRemark(idx) {
  if (!S.openId) return;
  const task = S.tasks.find(t => t.id === S.openId); if (!task) return;
  const remarks = [...(task.remarks||[])]; remarks.splice(idx,1);
  await patch(S.openId, { remarks }, 'Remark removed'); await refreshDrawer();
}
function remarkKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addRemark();} }

// attachments
async function dlAtt(path, name) {
  try { const url=await SB.getSignedUrl(path); const a=document.createElement('a'); a.href=url; a.download=name; a.target='_blank'; a.click(); }
  catch(e) { toast('Download failed: '+e.message,'err'); }
}
async function delAtt(id, path) {
  try { await SB.deleteAttachment(id,path); await patch(S.openId,{},'File removed'); await refreshDrawer(); }
  catch(e) { toast('Delete failed: '+e.message,'err'); }
}
async function processFiles(files) {
  if (!S.openId) return;
  const warns=[], warnEl=document.getElementById('att-warn');
  for (const f of [...files]) {
    if(f.size>MAX_FILE){warns.push(`${f.name} exceeds 5MB`);continue;}
    if(f.size>WARN_FILE) warns.push(`${f.name} is large`);
    try { await SB.uploadFile(S.openId, f); await patch(S.openId,{},'File attached: '+f.name); }
    catch(e){warns.push(`${f.name}: ${e.message}`);}
  }
  if(warnEl){warnEl.style.display=warns.length?'':'none';warnEl.textContent=warns.join(' | ');}
  await refreshDrawer(); render();
}
function pickFiles(inp){processFiles(inp.files);inp.value='';}
function dragOn(e){e.preventDefault();document.getElementById('att-drop')?.classList.add('drag-on');}
function dragOff(){document.getElementById('att-drop')?.classList.remove('drag-on');}
function dropFiles(e){e.preventDefault();dragOff();processFiles(e.dataTransfer.files);}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
function renderNotifBadge() {
  const unread = S.notifs.filter(n => !n.read).length;
  const badge = document.getElementById('notif-badge');
  const tabBadge = document.getElementById('tab-badge');
  if (unread > 0) {
    badge.textContent = unread > 9 ? '9+' : unread;
    badge.className = 'notif-badge on';
    tabBadge.textContent = unread; tabBadge.className = 'ntab-badge on';
  } else {
    badge.className = 'notif-badge';
    tabBadge.className = 'ntab-badge';
  }
}

function renderNotifList(containerId) {
  const el = document.getElementById(containerId); if (!el) return;
  if (!S.notifs.length) { el.innerHTML='<div class="notif-empty">No notifications</div>'; return; }
  el.innerHTML = S.notifs.map(n => `
    <div class="notif-item ${!n.read?'unread':''} ${n.type==='overdue'?'unread-overdue':''}">
      <div class="notif-item-title">${esc(n.title)}</div>
      ${n.body?`<div class="notif-item-body">${esc(n.body)}</div>`:''}
      <div class="notif-item-time">${fmtTs(new Date(n.created_at).getTime())} - ${n.type}</div>
    </div>`).join('');
}

function openNotif() {
  document.getElementById('notif-panel').classList.add('open');
  renderNotifList('notif-panel-list');
}
function closeNotif() { document.getElementById('notif-panel').classList.remove('open'); }

async function markAllRead() {
  try {
    await SB.markNotifsRead();
    S.notifs.forEach(n => n.read = true);
    renderNotifBadge();
    renderNotifList('notif-panel-list');
    renderNotifList('notif-list-main');
    toast('All marked as read');
  } catch(e) { toast('Error: '+e.message,'err'); }
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
let currentTab = 'tasks';
function showTab(name) {
  currentTab = name;
  document.querySelectorAll('.ntab').forEach(t => t.classList.toggle('active', t.id==='tab-'+name));
  ['tasks','notifs','analytics'].forEach(n => {
    document.getElementById('tab-'+n+'-view').style.display = n===name?'':'none';
  });
  if (name === 'analytics') renderAnalytics();
  if (name === 'notifs') { renderNotifList('notif-list-main'); }
}

// ── ANALYTICS ─────────────────────────────────────────────────────────────────
async function renderAnalytics() {
  const today_tasks = S.tasks;
  const done    = today_tasks.filter(t => t.stage==='done');
  const blocked = today_tasks.filter(t => t.stage==='blocked');
  const active  = today_tasks.filter(t => t.stage!=='done'&&t.stage!=='blocked');
  const overdue = today_tasks.filter(isOD);
  const total = today_tasks.length || 1;

  // Total tracked hours today
  const trackedSecs = today_tasks.reduce((sum, t) => sum + timerElapsed(t), 0);

  const wrap = document.getElementById('analytics-wrap');
  wrap.innerHTML = '';

  // Velocity card
  const vc = document.createElement('div');
  vc.className = 'an-card reveal';
  vc.innerHTML = `
    <div class="an-card-title">Today at a Glance</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><div class="an-big">${done.length}</div><div class="an-sub">tasks done</div></div>
      <div><div class="an-big" style="color:var(--gold)">${fmtTimer(trackedSecs)}</div><div class="an-sub">tracked today</div></div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--amber)">${active.length} active</span>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--red)">${overdue.length} overdue</span>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--grey)">${blocked.length} blocked</span>
    </div>`;
  wrap.appendChild(vc);

  // Donut
  const dc = document.createElement('div');
  dc.className = 'an-card reveal';
  const segs = [
    {label:'Done',val:done.length,col:'#22c55e'},
    {label:'Active',val:active.length,col:'#c8a84b'},
    {label:'Blocked',val:blocked.length,col:'#ff2d2d'},
  ].filter(s=>s.val>0);
  const r=36,cx=44,cy=44,sw=14,circ=2*Math.PI*r; let offset=0;
  let svgInner=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e1e1e" stroke-width="${sw}"/>`;
  segs.forEach(s=>{const dash=(s.val/total)*circ; svgInner+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.col}" stroke-width="${sw}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;offset+=dash;});
  const pct=Math.round(done.length/total*100);
  svgInner+=`<text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="900" fill="#f0f0f0" font-family="Barlow Condensed">${pct}%</text>`;
  dc.innerHTML=`<div class="an-card-title">Completion Rate</div><div class="donut-wrap"><svg width="88" height="88" viewBox="0 0 88 88">${svgInner}</svg><div class="donut-legend">${segs.map(s=>`<div class="dl-row"><div class="dl-dot" style="background:${s.col}"></div><span class="dl-lbl">${s.label}</span><span class="dl-val">${s.val}</span></div>`).join('')}</div></div>`;
  wrap.appendChild(dc);

  // Tag bar
  const bc = document.createElement('div');
  bc.className = 'an-card reveal';
  const maxN = Math.max(...Object.keys(TAG).map(tag=>today_tasks.filter(t=>t.tag===tag).length),1);
  bc.innerHTML=`<div class="an-card-title">By Category</div><div class="bar-chart">${Object.entries(TAG).filter(([tag])=>today_tasks.some(t=>t.tag===tag)).map(([tag,tm])=>{
    const all=today_tasks.filter(t=>t.tag===tag).length, dn=today_tasks.filter(t=>t.tag===tag&&t.stage==='done').length;
    return `<div class="bc-row"><div class="bc-label">${tm.label}</div><div class="bc-track"><div class="bc-fill" style="width:${Math.round(all/maxN*100)}%;background:${tm.col}"></div></div><div class="bc-val" style="color:${tm.col}">${dn}/${all}</div></div>`;
  }).join('')||'<div style="font-family:var(--font-mono);font-size:10px;color:var(--grey2)">No tasks yet</div>'}</div>`;
  wrap.appendChild(bc);

  // 7-day sparkline
  const sc = document.createElement('div');
  sc.className = 'an-card reveal';
  const data=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    let dt=key===today()?S.tasks:[];
    if(key!==today()){try{dt=(await SB.getTasksRange(key,key)).map(norm);}catch{dt=[];}}
    const ttl=dt.length, dn=dt.filter(t=>t.stage==='done').length;
    data.push({key,lbl:d.toLocaleDateString('en-IN',{weekday:'short'}).slice(0,2),pct:ttl?Math.round(dn/ttl*100):0,done:dn,total:ttl});
  }
  const maxP=Math.max(...data.map(d=>d.pct),1);
  sc.innerHTML=`<div class="an-card-title">7-Day Trend</div><div class="spark-bars">${data.map(d=>`<div class="spark-bar" style="height:${Math.max(3,d.pct/maxP*44)}px;background:${d.key===today()?'var(--red)':'var(--b3)'};opacity:${d.key===today()?'1':'.6'}" title="${d.lbl}: ${d.done}/${d.total}"></div>`).join('')}</div><div class="spark-lbls">${data.map(d=>`<div class="spark-lbl" style="color:${d.key===today()?'var(--gold)':'var(--grey3)'}">${d.lbl}</div>`).join('')}</div>`;
  wrap.appendChild(sc);

  setTimeout(setupScrollReveal, 50);
}

// ── CLOCK + BURN ──────────────────────────────────────────────────────────────
function tick() {
  const n=new Date();
  const h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('hclock').textContent=`${h}:${m}`;
  const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('day-date').textContent=`${DAYS[n.getDay()]}, ${n.getDate()} ${MONS[n.getMonth()]}`;
  const mins=n.getHours()*60+n.getMinutes();
  document.getElementById('burn-fill').style.width=Math.min(100,Math.max(0,(mins-540)/720*100))+'%';
}

// ── REMINDERS ─────────────────────────────────────────────────────────────────
async function checkReminders() {
  const n=new Date(),nm=n.getHours()*60+n.getMinutes();
  S.tasks.filter(t=>!t.done&&t.stage!=='done'&&(t.task_time||t.time)).forEach(async t=>{
    const time=t.task_time||t.time; const[h,m]=time.split(':').map(Number);
    const key=`${t.id}_${time}`;
    if(Math.abs(nm-(h*60+m))<=1&&!S.reminded.has(key)){
      S.reminded.add(key);
      toast(`Reminder: ${t.title}`);
      if(Notification.permission==='granted') new Notification('MUSTAINE',{body:t.title});
      try {
        await SB.insertNotif({ task_id: t.id, title: 'Task Reminder', body: t.title, type: 'reminder' });
        await loadNotifs(); renderNotifBadge();
      } catch {}
    }
  });
  // Check overdue
  S.tasks.filter(t=>isOD(t)&&!S.reminded.has('od_'+t.id)).forEach(async t=>{
    S.reminded.add('od_'+t.id);
    try {
      await SB.insertNotif({ task_id: t.id, title: 'Task Overdue', body: t.title, type: 'overdue' });
      await loadNotifs(); renderNotifBadge();
    } catch {}
  });
}

// ── SYNC DOT ─────────────────────────────────────────────────────────────────
function setSyncing(on, err) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot ' + (err?'err':on?'syncing':'ok');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg, type='ok') {
  const el=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  el.className=`show t-${type}`;
  clearTimeout(_tt); _tt=setTimeout(hideToast,type==='err'?7000:3500);
}
function hideToast(){ document.getElementById('toast').className=''; }

// ── SCROLL REVEAL ─────────────────────────────────────────────────────────────
function setupScrollReveal() {
  const els = document.querySelectorAll('.reveal:not(.visible)');
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);} });
  },{threshold:.1});
  els.forEach(el=>obs.observe(el));
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){closeDrawer();closeNotif();}
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('add-title')?.focus();}
});
document.getElementById('add-title')?.addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
document.getElementById('a-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});

// Drawer drag-to-close
let drStartY=0;
document.getElementById('drawer').addEventListener('touchstart',e=>{drStartY=e.touches[0].clientY;},{passive:true});
document.getElementById('drawer').addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientY-drStartY>80) closeDrawer();
},{passive:true});

// ── BOOT ─────────────────────────────────────────────────────────────────────
if('Notification' in window && Notification.permission==='default') setTimeout(()=>Notification.requestPermission(),10000);
window.addEventListener('load',()=>{
  setTimeout(()=>{ init(); },1200);
});
</script>
