<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>MUSTAINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--s1:#111111;--s2:#181818;--s3:#202020;--s4:#282828;
  --b1:#1e1e1e;--b2:#2a2a2a;--b3:#383838;--b4:#484848;
  --red:#ff2d2d;--red2:#cc1a1a;
  --gold:#c8a84b;--gold2:#a88930;
  --white:#f0f0f0;--grey:#888;--grey2:#555;--grey3:#333;
  --green:#22c55e;--amber:#f59e0b;--blue:#3b82f6;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--font-body);-webkit-font-smoothing:antialiased}

/* ── SHINE KEYFRAMES ── */
@keyframes shine{0%{transform:translateX(-100%) skewX(-15deg)}100%{transform:translateX(300%) skewX(-15deg)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(255,45,45,.4)}70%{box-shadow:0 0 0 8px rgba(255,45,45,0)}}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(200,168,75,.3)}70%{box-shadow:0 0 0 6px rgba(200,168,75,0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes glow-red{0%,100%{text-shadow:0 0 8px rgba(255,45,45,.6)}50%{text-shadow:0 0 20px rgba(255,45,45,1),0 0 40px rgba(255,45,45,.4)}}
@keyframes burn{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ── LOADING ── */
#loading-screen{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
}
.load-logo{font-family:var(--font-display);font-size:56px;font-weight:900;letter-spacing:.06em;color:var(--red);animation:glow-red 2s infinite}
.load-sub{font-family:var(--font-mono);font-size:11px;letter-spacing:.3em;color:var(--grey);text-transform:uppercase}
.load-bar{width:180px;height:2px;background:var(--b2);border-radius:1px;overflow:hidden}
.load-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:1px;animation:loading-fill 1.5s ease-out forwards}
@keyframes loading-fill{from{width:0}to{width:100%}}

/* ── AUTH ── */
#auth-screen{
  position:fixed;inset:0;background:var(--bg);z-index:1000;
  display:none;align-items:center;justify-content:center;
  padding:20px;overflow-y:auto;
}
.auth-wrap{width:100%;max-width:360px;padding:20px 0}
.auth-logo{
  font-family:var(--font-display);font-size:52px;font-weight:900;letter-spacing:.06em;
  color:var(--red);text-align:center;margin-bottom:4px;
  text-shadow:0 0 30px rgba(255,45,45,.4);
}
.auth-tagline{font-family:var(--font-mono);font-size:9px;letter-spacing:.3em;color:var(--grey2);text-align:center;text-transform:uppercase;margin-bottom:28px}
.auth-box{background:var(--s1);border:1px solid var(--b2);border-radius:12px;padding:24px;display:flex;flex-direction:column;gap:14px}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg);border-radius:7px;padding:3px}
.atab{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:8px;border-radius:5px;border:none;background:transparent;color:var(--grey);cursor:pointer;transition:all .2s}
.atab.active{background:var(--red);color:var(--white)}
.afield{display:flex;flex-direction:column;gap:6px}
.afield label{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;color:var(--grey2);text-transform:uppercase}
.ainp{
  background:var(--s2);border:1px solid var(--b3);color:var(--white);
  font-family:var(--font-body);font-size:15px;padding:12px 14px;border-radius:8px;outline:none;width:100%;
  transition:border-color .2s;-webkit-appearance:none;
}
.ainp:focus{border-color:var(--red)}
.ainp::placeholder{color:var(--grey2)}
.auth-btn{
  position:relative;overflow:hidden;
  background:var(--red);color:var(--white);border:none;border-radius:8px;padding:14px;
  font-family:var(--font-display);font-size:17px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;width:100%;transition:opacity .15s,transform .1s;
}
.auth-btn::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shine 2s infinite}
.auth-btn:active{transform:scale(.98);opacity:.85}
.auth-btn:disabled{opacity:.4;cursor:not-allowed}
.auth-err{font-family:var(--font-mono);font-size:11px;color:var(--red);background:rgba(255,45,45,.08);border:1px solid rgba(255,45,45,.2);border-radius:6px;padding:8px 12px;display:none;text-align:center}
.auth-err.on{display:block}
.auth-ok{font-family:var(--font-mono);font-size:11px;color:var(--green);background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:6px;padding:8px 12px;display:none;text-align:center}
.auth-ok.on{display:block}
.auth-or{display:flex;align-items:center;gap:10px;color:var(--grey3)}
.auth-or::before,.auth-or::after{content:'';flex:1;height:1px;background:var(--b2)}
.auth-or span{font-family:var(--font-mono);font-size:10px;color:var(--grey2)}
.magic-btn{background:transparent;border:1px solid var(--b3);color:var(--grey);border-radius:8px;padding:11px;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;cursor:pointer;width:100%;text-transform:uppercase;transition:all .2s}
.magic-btn:hover,.magic-btn:active{border-color:var(--red);color:var(--red)}

/* ── APP SHELL ── */
#app{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--b1);
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  position:relative;z-index:50;
}
.hdr-logo{font-family:var(--font-display);font-size:28px;font-weight:900;letter-spacing:.1em;color:var(--red);line-height:1}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-clock{font-family:var(--font-mono);font-size:12px;color:var(--gold);letter-spacing:.08em}
.hdr-notif{position:relative;cursor:pointer;padding:6px;border-radius:6px;transition:background .15s}
.hdr-notif:active{background:var(--s2)}
.notif-icon{width:20px;height:20px;color:var(--grey)}
.notif-badge{
  position:absolute;top:2px;right:2px;width:14px;height:14px;background:var(--red);
  border-radius:50%;font-family:var(--font-mono);font-size:8px;color:#fff;
  display:flex;align-items:center;justify-content:center;display:none;
  animation:pulse-red 2s infinite;
}
.notif-badge.on{display:flex}
.hdr-user{font-family:var(--font-mono);font-size:10px;color:var(--grey2);cursor:pointer;padding:4px 8px;border-radius:4px;border:1px solid var(--b2)}

/* ── BURN BAR ── */
.burn-bar{height:2px;background:var(--b1);flex-shrink:0;position:relative}
.burn-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold),var(--red));background-size:200% 100%;animation:burn 3s linear infinite;transition:width .5s}

/* ── NAV TABS ── */
.nav{flex-shrink:0;display:flex;border-bottom:1px solid var(--b1);background:var(--bg)}
.ntab{
  flex:1;padding:11px 4px;font-family:var(--font-display);font-size:13px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--grey);border:none;background:transparent;
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;position:relative;
}
.ntab.active{color:var(--red);border-bottom-color:var(--red)}
.ntab-badge{position:absolute;top:8px;right:calc(50% - 16px);background:var(--red);color:#fff;border-radius:8px;font-size:9px;font-family:var(--font-mono);padding:1px 5px;display:none}
.ntab-badge.on{display:inline}

/* ── SCROLL AREA ── */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:calc(var(--safe-bot) + 80px)}
.scroll-area::-webkit-scrollbar{display:none}

/* ── DAY HEADER (tasks view) ── */
.day-hero{
  padding:18px 16px 12px;background:linear-gradient(180deg,var(--s1) 0%,var(--bg) 100%);
  border-bottom:1px solid var(--b1);
}
.day-date{font-family:var(--font-display);font-size:13px;font-weight:600;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:2px}
.day-stats{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.dstat{
  font-family:var(--font-mono);font-size:10px;padding:3px 8px;border-radius:4px;
  background:var(--s2);border:1px solid var(--b2);color:var(--grey);white-space:nowrap;
}
.dstat b{color:var(--white);font-weight:600}
.dstat.overdue b{color:var(--red)}
.day-hours-bar{margin-top:10px}
.day-hours-label{display:flex;justify-content:space-between;margin-bottom:4px}
.dhl-text{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;color:var(--grey2);text-transform:uppercase}
.dhl-val{font-family:var(--font-mono);font-size:9px;color:var(--gold)}
.hours-track{height:4px;background:var(--b2);border-radius:2px;overflow:hidden}
.hours-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--red),var(--gold));transition:width .6s}
.load-meter{margin-top:8px;padding:6px 10px;border-radius:6px;border:1px solid;font-family:var(--font-mono);font-size:10px;letter-spacing:.05em}
.load-meter.light{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2);color:var(--green)}
.load-meter.medium{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2);color:var(--amber)}
.load-meter.heavy{background:rgba(255,45,45,.06);border-color:rgba(255,45,45,.2);color:var(--red)}
.load-meter.maxed{background:rgba(255,45,45,.1);border-color:rgba(255,45,45,.4);color:var(--red);animation:pulse-red 2s infinite}

/* ── ADD TASK ── */
.add-section{padding:12px 16px;border-bottom:1px solid var(--b1);background:var(--s1)}
.add-main{display:flex;gap:8px;align-items:stretch}
.add-inp{
  flex:1;background:var(--bg);border:1px solid var(--b3);color:var(--white);
  font-family:var(--font-body);font-size:15px;padding:11px 14px;border-radius:8px;outline:none;
  -webkit-appearance:none;transition:border-color .2s;
}
.add-inp:focus{border-color:var(--red)}
.add-inp::placeholder{color:var(--grey2)}
.add-inp.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.add-go{
  position:relative;overflow:hidden;
  background:var(--red);color:var(--white);border:none;border-radius:8px;
  padding:0 18px;font-family:var(--font-display);font-size:16px;font-weight:800;
  letter-spacing:.1em;cursor:pointer;white-space:nowrap;transition:transform .1s;
}
.add-go:active{transform:scale(.96)}
.add-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.meta-sel{
  background:var(--bg);border:1px solid var(--b3);color:var(--grey);
  font-family:var(--font-mono);font-size:11px;padding:8px 10px;border-radius:7px;
  outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;width:100%;
}
.meta-sel:focus{border-color:var(--red)}
.add-time-row{display:flex;gap:8px;margin-top:8px}
.time-inp{
  flex:1;background:var(--bg);border:1px solid var(--b3);color:var(--grey);
  font-family:var(--font-mono);font-size:12px;padding:8px 10px;border-radius:7px;outline:none;
  -webkit-appearance:none;
}
.time-inp:focus{border-color:var(--red)}
.pri-sel{flex:1;background:var(--bg);border:1px solid var(--b3);color:var(--grey);font-family:var(--font-mono);font-size:11px;padding:8px 10px;border-radius:7px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}
.pri-sel:focus{border-color:var(--red)}

/* ── SECTION HEADER ── */
.sec-hdr{
  padding:12px 16px 6px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:rgba(10,10,10,.95);backdrop-filter:blur(10px);z-index:10;
}
.sec-title{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.2em;color:var(--grey2);text-transform:uppercase}
.sec-action{font-family:var(--font-mono);font-size:10px;color:var(--gold);cursor:pointer;padding:2px 0;border:none;background:none}

/* ── TASK CARD ── */
.task-list{padding:0 12px;display:flex;flex-direction:column;gap:8px;padding-bottom:8px}
.task-card{
  background:var(--s1);border:1px solid var(--b2);border-radius:10px;
  overflow:hidden;cursor:pointer;position:relative;
  transition:border-color .2s,transform .15s;
  animation:fadeInUp .25s ease both;
}
.task-card:active{transform:scale(.99)}
.task-card.done-card{opacity:.38}
.task-card.blocked-card{border-color:rgba(255,45,45,.3)}
.task-card:hover{border-color:var(--b3)}

/* left accent bar */
.task-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--accent-col,var(--b3));
}

/* shine on card */
.task-card .card-shine{
  position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
  pointer-events:none;
}
.task-card:hover .card-shine{animation:shine 1.2s ease}

.card-body{padding:11px 12px 11px 16px;display:flex;align-items:flex-start;gap:10px}
.card-check{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--b3);
  flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:transparent;transition:all .2s;
}
.done-card .card-check{background:var(--green);border-color:var(--green);color:#fff}
.card-main{flex:1;min-width:0}
.card-title{font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--white);line-height:1.35;margin-bottom:7px;word-break:break-word}
.done-card .card-title{text-decoration:line-through;color:var(--grey)}
.card-title-inp{font-size:14px;font-weight:500;color:var(--white);background:var(--s3);border:1px solid var(--red);border-radius:4px;padding:2px 7px;outline:none;font-family:var(--font-body);width:100%}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tag-chip{
  font-family:var(--font-mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 7px;border-radius:4px;white-space:nowrap;border:1px solid;
}
.stage-chip{
  font-family:var(--font-mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:4px;cursor:pointer;border:1px solid;
  transition:filter .15s;
}
.stage-chip:active{filter:brightness(1.3)}
.pri-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.card-time{font-family:var(--font-mono);font-size:9px;color:var(--grey2)}
.card-time.overdue{color:var(--red)}
.card-time.soon{color:var(--amber)}
.card-actions{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.card-del{background:transparent;border:none;color:var(--grey3);font-size:20px;cursor:pointer;line-height:1;padding:2px 4px;border-radius:4px;transition:color .15s;width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.card-del:active,.card-del.arming{color:var(--red)}
.card-del.arming{font-size:10px;font-family:var(--font-mono);width:auto;padding:3px 7px;border:1px solid rgba(255,45,45,.3)}
.card-block{background:transparent;border:none;color:var(--grey3);cursor:pointer;font-size:9px;font-family:var(--font-mono);padding:2px 5px;border-radius:3px;transition:color .15s}
.card-block:active{color:var(--red)}
.blocked-card .card-block{color:var(--amber)}

/* timer strip on card */
.card-timer{
  background:var(--s2);border-top:1px solid var(--b2);
  padding:7px 12px 7px 16px;display:flex;align-items:center;justify-content:space-between;
}
.timer-disp{font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;color:var(--gold)}
.timer-disp.running{color:var(--red);animation:glow-red 2s infinite}
.timer-stop-btn{
  background:var(--red);color:#fff;border:none;border-radius:5px;
  padding:4px 10px;font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
  cursor:pointer;text-transform:uppercase;transition:opacity .15s;
}
.timer-stop-btn:active{opacity:.75}

/* counts */
.card-counts{display:flex;gap:5px;margin-left:auto}
.ccount{font-family:var(--font-mono);font-size:9px;color:var(--grey);background:var(--s3);padding:1px 6px;border-radius:3px}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:52px 20px;color:var(--grey2)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.3}
.empty-text{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;line-height:1.7}

/* ── NOTIFICATIONS PANEL ── */
#notif-panel{
  position:fixed;top:0;right:0;bottom:0;width:min(320px,100vw);
  background:var(--s1);border-left:1px solid var(--b2);z-index:200;
  transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#notif-panel.open{transform:translateX(0)}
.notif-hdr{padding:calc(var(--safe-top) + 14px) 16px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;flex-shrink:0}
.notif-hdr-title{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:.08em;flex:1;color:var(--white)}
.notif-close{background:none;border:none;color:var(--grey);font-size:24px;cursor:pointer}
.notif-clear{background:none;border:none;color:var(--gold);font-family:var(--font-mono);font-size:10px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase}
.notif-list{flex:1;overflow-y:auto;padding:8px}
.notif-list::-webkit-scrollbar{display:none}
.notif-item{
  background:var(--s2);border-radius:8px;padding:12px;margin-bottom:6px;
  border-left:3px solid var(--b3);cursor:pointer;transition:background .15s;
  animation:fadeInDown .2s ease;
}
.notif-item.unread{border-left-color:var(--red)}
.notif-item.unread-overdue{border-left-color:var(--amber)}
.notif-item:active{background:var(--s3)}
.notif-item-title{font-family:var(--font-body);font-size:13px;font-weight:500;margin-bottom:3px}
.notif-item-body{font-family:var(--font-mono);font-size:10px;color:var(--grey)}
.notif-item-time{font-family:var(--font-mono);font-size:9px;color:var(--grey2);margin-top:4px}
.notif-empty{text-align:center;padding:48px 16px;font-family:var(--font-mono);font-size:11px;color:var(--grey2);text-transform:uppercase;letter-spacing:.1em}

/* ── DRAWER (task detail) ── */
#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px)}
#backdrop.open{opacity:1;pointer-events:all}
#drawer{
  position:fixed;bottom:0;left:0;right:0;
  max-height:92vh;background:var(--s1);border-radius:16px 16px 0 0;border-top:1px solid var(--b2);
  z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
#drawer.open{transform:translateY(0)}
.dr-drag{width:40px;height:4px;background:var(--b3);border-radius:2px;margin:10px auto 4px;flex-shrink:0}
.dr-hdr{padding:12px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dr-hdr-title{font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:.06em;flex:1}
.dr-close{background:none;border:none;color:var(--grey);font-size:24px;cursor:pointer;line-height:1}
.dr-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.dr-body::-webkit-scrollbar{display:none}
.dr-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;color:var(--grey2);text-transform:uppercase;margin-bottom:6px}
.dr-inp{background:var(--s2);border:1px solid var(--b3);color:var(--white);font-family:var(--font-body);font-size:15px;padding:11px 13px;border-radius:8px;outline:none;width:100%;-webkit-appearance:none}
.dr-inp:focus{border-color:var(--red)}
.dr-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dr-sel{background:var(--s2);border:1px solid var(--b3);color:var(--white);font-family:var(--font-mono);font-size:11px;padding:10px 11px;border-radius:8px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;width:100%}
.dr-sel:focus{border-color:var(--red)}
.dr-time{background:var(--s2);border:1px solid var(--b3);color:var(--white);font-family:var(--font-mono);font-size:12px;padding:10px 11px;border-radius:8px;outline:none;width:100%;-webkit-appearance:none}
.dr-time:focus{border-color:var(--red)}

/* stage stepper */
.stepper{display:flex;align-items:center;overflow-x:auto;gap:0;padding-bottom:4px}
.stepper::-webkit-scrollbar{display:none}
.step-node{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1;position:relative;min-width:60px}
.step-node:not(:last-child)::after{content:'';position:absolute;top:12px;left:50%;width:100%;height:1px;background:var(--b3);z-index:0}
.step-node.step-past::after,.step-node.step-done::after{background:var(--green)}
.step-circle{width:24px;height:24px;border-radius:50%;border:2px solid var(--b3);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:9px;z-index:1;position:relative;transition:all .2s;flex-shrink:0;color:var(--grey)}
.step-node.step-past .step-circle{border-color:var(--red);background:rgba(255,45,45,.15);color:var(--red)}
.step-node.step-active .step-circle{border-color:var(--red);background:var(--red);color:#fff;box-shadow:0 0 10px rgba(255,45,45,.4)}
.step-node.step-done .step-circle{border-color:var(--green);background:var(--green);color:#fff}
.step-name{font-family:var(--font-mono);font-size:8px;color:var(--grey2);text-transform:uppercase;letter-spacing:.06em;text-align:center;position:relative;z-index:1}
.step-node.step-active .step-name{color:var(--white)}

/* remarks */
.remark-list{display:flex;flex-direction:column;gap:6px}
.remark-item{background:var(--s2);border-radius:7px;padding:10px 12px;animation:fadeInDown .2s}
.remark-text{font-size:13px;color:var(--white);line-height:1.45;word-break:break-word;margin-bottom:4px}
.remark-meta{display:flex;justify-content:space-between;align-items:center}
.remark-ts{font-family:var(--font-mono);font-size:9px;color:var(--grey2)}
.remark-del{background:none;border:none;color:var(--grey3);cursor:pointer;font-size:14px;padding:0 2px}
.remark-del:active{color:var(--red)}
.remark-add{display:flex;gap:7px;margin-top:4px}
.remark-textarea{flex:1;background:var(--s2);border:1px solid var(--b3);color:var(--white);font-family:var(--font-body);font-size:13px;padding:9px 12px;border-radius:7px;outline:none;resize:none;-webkit-appearance:none}
.remark-textarea:focus{border-color:var(--red)}
.remark-textarea::placeholder{color:var(--grey2)}
.remark-submit{background:var(--red);color:#fff;border:none;border-radius:7px;padding:0 14px;font-family:var(--font-display);font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0}
.remark-submit:active{opacity:.8}

/* task timer (in drawer) */
.timer-card{
  background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:14px;
  display:flex;flex-direction:column;gap:10px;
}
.timer-display{text-align:center}
.timer-hhmm{font-family:var(--font-display);font-size:44px;font-weight:900;letter-spacing:.04em;color:var(--gold);line-height:1}
.timer-hhmm.running{color:var(--red);animation:glow-red 2s infinite}
.timer-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;color:var(--grey2);text-transform:uppercase;margin-top:2px}
.timer-actions{display:flex;gap:8px;justify-content:center}
.timer-btn{
  position:relative;overflow:hidden;
  border:none;border-radius:8px;padding:10px 24px;
  font-family:var(--font-display);font-size:15px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:opacity .15s,transform .1s;
}
.timer-btn:active{transform:scale(.96);opacity:.85}
.timer-start{background:var(--red);color:#fff}
.timer-start::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shine 2s infinite}
.timer-stop{background:var(--b3);color:var(--white)}
.timer-total{font-family:var(--font-mono);font-size:10px;color:var(--grey);text-align:center}

/* attachments */
.attach-drop{border:1px dashed var(--b3);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.attach-drop.drag-on{border-color:var(--red);background:rgba(255,45,45,.04)}
.attach-drop input{position:absolute;inset:0;opacity:0;cursor:pointer}
.attach-drop-text{font-family:var(--font-mono);font-size:10px;color:var(--grey2);letter-spacing:.06em;pointer-events:none}
.attach-list{display:flex;flex-direction:column;gap:5px}
.attach-row{background:var(--s2);border-radius:7px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.attach-name{font-size:12px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attach-size{font-family:var(--font-mono);font-size:9px;color:var(--grey2)}
.attach-dl{background:none;border:none;color:var(--gold);font-family:var(--font-mono);font-size:10px;cursor:pointer;padding:0 4px}
.attach-del{background:none;border:none;color:var(--grey3);font-size:16px;cursor:pointer;padding:0 2px}
.attach-del:active{color:var(--red)}
.attach-warn{font-family:var(--font-mono);font-size:10px;color:var(--amber);padding:6px 0}

/* activity */
.act-list{display:flex;flex-direction:column;gap:0}
.act-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--b1)}
.act-item:last-child{border-bottom:none}
.act-dot{width:5px;height:5px;border-radius:50%;background:var(--grey3);flex-shrink:0;margin-top:6px}
.act-text{font-family:var(--font-mono);font-size:10px;color:var(--grey);flex:1;line-height:1.5}
.act-ts{font-family:var(--font-mono);font-size:9px;color:var(--grey3);flex-shrink:0}

/* analytics */
.analytics-wrap{padding:0 12px}
.an-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:10px;animation:fadeInUp .3s ease both}
.an-card-title{font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:.15em;color:var(--grey);text-transform:uppercase;margin-bottom:12px}
.an-big{font-family:var(--font-display);font-size:48px;font-weight:900;color:var(--red);letter-spacing:-.01em;line-height:1}
.an-sub{font-family:var(--font-mono);font-size:10px;color:var(--grey);margin-top:2px}
.donut-wrap{display:flex;align-items:center;gap:14px}
.donut-legend{display:flex;flex-direction:column;gap:5px;flex:1}
.dl-row{display:flex;align-items:center;gap:7px;font-size:11px}
.dl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dl-lbl{color:var(--grey);flex:1;font-family:var(--font-mono);font-size:10px}
.dl-val{font-family:var(--font-mono);font-weight:600;color:var(--white)}
.bar-chart{display:flex;flex-direction:column;gap:7px}
.bc-row{display:flex;align-items:center;gap:8px}
.bc-label{font-family:var(--font-mono);font-size:9px;color:var(--grey);width:60px;flex-shrink:0;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bc-track{flex:1;height:7px;background:var(--s3);border-radius:3px;overflow:hidden}
.bc-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bc-val{font-family:var(--font-mono);font-size:9px;width:28px;text-align:right;flex-shrink:0}
.spark-bars{display:flex;align-items:flex-end;gap:4px;height:48px}
.spark-bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;transition:height .5s}
.spark-lbls{display:flex;gap:4px;margin-top:5px}
.spark-lbl{flex:1;font-family:var(--font-mono);font-size:8px;text-align:center;color:var(--grey3)}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:calc(var(--safe-bot) + 90px);left:50%;
  transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--s1);border:1px solid var(--b3);border-radius:10px;
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  font-family:var(--font-mono);font-size:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  z-index:500;max-width:calc(100vw - 32px);pointer-events:none;min-width:220px;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:all}
#toast.t-ok{border-color:rgba(34,197,94,.3)}
#toast.t-err{border-color:rgba(255,45,45,.4)}
#toast.t-warn{border-color:rgba(245,158,11,.3)}
.toast-msg{flex:1;line-height:1.4}
.toast-close{background:none;border:none;color:var(--grey);font-size:18px;cursor:pointer;line-height:1}

/* filter tabs */
.filter-row{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--b1);-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
.filter-row::-webkit-scrollbar{display:none}
.ftab{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:10px 14px;border:none;background:transparent;color:var(--grey);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;flex-shrink:0}
.ftab.on{color:var(--white);border-bottom-color:var(--gold)}
.date-ftab.on{color:var(--white);border-color:var(--red)}

/* sort + toolbar */
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sort-sel{background:var(--s1);border:1px solid var(--b2);color:var(--grey);font-family:var(--font-mono);font-size:10px;padding:5px 9px;border-radius:5px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none}
.tb-btn{font-family:var(--font-mono);font-size:10px;padding:5px 10px;border-radius:5px;border:1px solid var(--b2);background:transparent;color:var(--grey);cursor:pointer;white-space:nowrap;letter-spacing:.05em;transition:all .15s}
.tb-btn:active{color:var(--red);border-color:rgba(255,45,45,.3)}
.tb-sep{flex:1}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--grey3);transition:background .3s;flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse-gold 1s infinite}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}

/* overdue banner */
.overdue-banner{margin:8px 12px 0;padding:8px 12px;background:rgba(255,45,45,.07);border:1px solid rgba(255,45,45,.25);border-radius:7px;font-family:var(--font-mono);font-size:10px;color:var(--red);letter-spacing:.05em;display:none;animation:pulse-red 2s infinite}
.overdue-banner.on{display:block}

/* dr save btn */
.dr-save{position:relative;overflow:hidden;background:var(--red);color:#fff;border:none;border-radius:8px;padding:13px;font-family:var(--font-display);font-size:16px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:100%;margin-top:4px}
.dr-save::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shine 2.5s infinite}
.dr-save:active{opacity:.85}

/* scroll animation trigger */
.reveal{opacity:0;transform:translateY(12px);transition:opacity .35s ease,transform .35s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="load-logo">MUSTAINE</div>
  <div class="load-sub">Task Tracker</div>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo">MUSTAINE</div>
    <div class="auth-tagline">Troopod Task Tracker</div>
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="atab active" data-m="login" onclick="switchTab('login')">Sign In</button>
        <button class="atab" data-m="signup" onclick="switchTab('signup')">Sign Up</button>
      </div>
      <div id="af-name" style="display:none" class="afield">
        <label>Full Name</label>
        <input class="ainp" id="a-name" type="text" placeholder="Vinit Singh" autocomplete="name">
      </div>
      <div class="afield">
        <label>Email</label>
        <input class="ainp" id="a-email" type="email" placeholder="vinit.singh@pushstart.in" autocomplete="email" inputmode="email">
      </div>
      <div class="afield">
        <label>Password</label>
        <input class="ainp" id="a-pass" type="password" placeholder="Min 6 characters" autocomplete="current-password">
      </div>
      <div class="auth-err" id="a-err"></div>
      <div class="auth-ok"  id="a-ok"></div>
      <button class="auth-btn" id="a-btn" onclick="doAuth()"><span id="a-btn-txt">Sign In</span></button>
      <div class="auth-or"><span>or</span></div>
      <button class="magic-btn" onclick="doMagic()">Send Magic Link</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <div class="hdr-logo">MUSTAINE</div>
    <div class="hdr-right">
      <div class="hdr-clock" id="hclock">00:00</div>
      <div class="hdr-notif" onclick="openNotif()" id="notif-btn">
        <svg class="notif-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <div class="notif-badge" id="notif-badge">0</div>
      </div>
      <div class="hdr-user" id="hdr-user" onclick="doLogout()">Sign Out</div>
    </div>
  </div>
  <div class="burn-bar"><div class="burn-fill" id="burn-fill" style="width:0%"></div></div>

  <div class="nav">
    <button class="ntab active" id="tab-tasks"   onclick="showTab('tasks')">Tasks</button>
    <button class="ntab"        id="tab-notifs"  onclick="showTab('notifs')">Alerts<span class="ntab-badge" id="tab-badge"></span></button>
    <button class="ntab"        id="tab-analytics" onclick="showTab('analytics')">Stats</button>
  </div>

  <!-- TASKS TAB -->
  <div id="tab-tasks-view" class="scroll-area">
    <div class="day-hero">
      <div class="day-date" id="day-date"></div>
      <div class="day-stats">
        <div class="dstat">Total <b id="st-total">0</b></div>
        <div class="dstat">Done <b id="st-done">0</b></div>
        <div class="dstat">Active <b id="st-active">0</b></div>
        <div class="dstat overdue">Overdue <b id="st-overdue">0</b></div>
      </div>
      <div class="day-hours-bar" id="hours-bar" style="display:none">
        <div class="day-hours-label">
          <span class="dhl-text">Today's scheduled hours</span>
          <span class="dhl-val" id="hours-val">0h</span>
        </div>
        <div class="hours-track"><div class="hours-fill" id="hours-fill" style="width:0%"></div></div>
      </div>
      <div class="load-meter" id="load-meter" style="display:none"></div>
    </div>

    <div class="add-section">
      <div class="add-main">
        <input class="add-inp" id="add-title" placeholder="Add task..." maxlength="140">
        <button class="add-go" onclick="addTask()">ADD</button>
      </div>
      <div class="add-meta">
        <select class="meta-sel" id="add-tag">
          <option value="sales">Sales</option>
          <option value="revenue">Revenue</option>
          <option value="client">Client</option>
          <option value="kam">KAM</option>
          <option value="design">Design</option>
          <option value="ops">Ops</option>
          <option value="follow-up">Follow-up</option>
          <option value="control">Control</option>
          <option value="management">Management</option>
          <option value="personal">Personal</option>
        </select>
        <select class="pri-sel" id="add-pri">
          <option value="medium">Medium Priority</option>
          <option value="urgent">Urgent</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="add-time-row">
        <input class="time-inp" type="time" id="add-time">
        <input class="time-inp" type="date" id="add-date" style="flex:1.4">
      </div>
    </div>

    <div class="filter-row" id="filter-row">
      <button class="ftab on" data-f="all" onclick="setFilter(this)">All</button>
      <button class="ftab" data-f="sales" onclick="setFilter(this)">Sales</button>
      <button class="ftab" data-f="revenue" onclick="setFilter(this)">Revenue</button>
      <button class="ftab" data-f="client" onclick="setFilter(this)">Client</button>
      <button class="ftab" data-f="kam" onclick="setFilter(this)">KAM</button>
      <button class="ftab" data-f="design" onclick="setFilter(this)">Design</button>
      <button class="ftab" data-f="ops" onclick="setFilter(this)">Ops</button>
      <button class="ftab" data-f="follow-up" onclick="setFilter(this)">Follow-up</button>
      <button class="ftab" data-f="control" onclick="setFilter(this)">Control</button>
      <button class="ftab" data-f="management" onclick="setFilter(this)">Management</button>
    </div>

    <div class="toolbar" style="flex-wrap:wrap;gap:6px">
      <button class="tb-btn date-ftab on" data-df="today" onclick="setDateFilter('today')">Today</button>
      <button class="tb-btn date-ftab" data-df="week" onclick="setDateFilter('week')">7 Days</button>
      <button class="tb-btn date-ftab" data-df="all" onclick="setDateFilter('all')">All</button>
      <span class="tb-sep"></span>
      <select class="sort-sel" id="sort-sel" onchange="render()">
        <option value="time">By Time</option>
        <option value="priority">By Priority</option>
        <option value="stage">By Stage</option>
        <option value="created">By Created</option>
      </select>
      <button class="tb-btn" onclick="clearDone()">Clear Done</button>
      <div class="sync-dot ok" id="sync-dot"></div>
    </div>

    <div class="overdue-banner" id="ob"></div>

    <div class="sec-hdr" id="active-hdr">
      <div class="sec-title">Active</div>
    </div>
    <div class="task-list" id="active-list"></div>

    <div id="done-section">
      <div class="sec-hdr" id="done-hdr" style="display:none">
        <div class="sec-title">Completed</div>
        <button class="sec-action" onclick="toggleDoneList()">Hide</button>
      </div>
      <div class="task-list" id="done-list"></div>
      <div style="padding:4px 16px 8px" id="show-done-wrap" style="display:none">
        <button class="tb-btn" id="show-done-btn" onclick="toggleDoneList()" style="width:100%;text-align:center;padding:9px"></button>
      </div>
    </div>

    <div id="blocked-section">
      <div class="sec-hdr" id="blocked-hdr" style="display:none">
        <div class="sec-title">Blocked</div>
      </div>
      <div class="task-list" id="blocked-list"></div>
    </div>
  </div>

  <!-- NOTIFICATIONS TAB -->
  <div id="tab-notifs-view" class="scroll-area" style="display:none">
    <div class="sec-hdr">
      <div class="sec-title">Notifications</div>
      <button class="sec-action" onclick="markAllRead()">Mark All Read</button>
    </div>
    <div id="notif-list-main" style="padding:0 12px"></div>
  </div>

  <!-- ANALYTICS TAB -->
  <div id="tab-analytics-view" class="scroll-area" style="display:none">
    <div class="analytics-wrap" id="analytics-wrap"></div>
  </div>
</div>

<!-- NOTIFICATIONS SIDE PANEL -->
<div id="notif-panel">
  <div class="notif-hdr">
    <div class="notif-hdr-title">Alerts</div>
    <button class="notif-clear" onclick="markAllRead()">Mark All Read</button>
    <button class="notif-close" onclick="closeNotif()">x</button>
  </div>
  <div class="notif-list" id="notif-panel-list"></div>
</div>

<!-- DRAWER -->
<div id="backdrop" onclick="closeDrawer()"></div>
<div id="drawer">
  <div class="dr-drag"></div>
  <div class="dr-hdr">
    <div class="dr-hdr-title">Task Detail</div>
    <button class="dr-close" onclick="closeDrawer()">x</button>
  </div>
  <div class="dr-body" id="dr-body"></div>
</div>

<!-- TOAST -->
<div id="toast">
  <span class="toast-msg" id="toast-msg"></span>
  <button class="toast-close" onclick="hideToast()">x</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════

    let url = SUPA + path;

      const p = new URLSearchParams();

// ── UTILS ─────────────────────────────────────────────────────────────────────
function uid6()    { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2); }
function today()   { return new Date().toISOString().slice(0,10); }
function nowTs()   { return Date.now(); }
function esc(s)    { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTs(ts) { return new Date(ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}); }
function fmtSz(b)  { return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB'; }
function minOff(t) { if(!t)return null; const[h,m]=t.split(':').map(Number),n=new Date(),d=new Date(n); d.setHours(h,m,0,0); return Math.floor((n-d)/60000); }
function isOD(t)   { if(!t||t.done||t.stage==='done'||t.stage==='blocked')return false; const o=minOff(t.task_time||t.time); return o!==null&&o>5; }

function parseJSON(s, fb) { try { return JSON.parse(s); } catch { return fb; } }

function norm(t) {
  return {
    ...t,
    date:        t.task_date || t.date || today(),
    time:        t.task_time || t.time || '',
    remarks:     typeof t.remarks  === 'string' ? parseJSON(t.remarks,  []) : (t.remarks  || []),
    activity:    typeof t.activity === 'string' ? parseJSON(t.activity, []) : (t.activity || []),
    attachments: t.attachments || [],
    timer_total_seconds: t.timer_total_seconds || 0,
  };
}

// ── TIMER LOGIC ───────────────────────────────────────────────────────────────
function timerRunning(t) {
  return !!(t.timer_started_at && !t.timer_stopped_at);
}
function timerElapsed(t) {
  // total seconds accumulated
  let secs = t.timer_total_seconds || 0;
  if (timerRunning(t)) {
    secs += Math.floor((Date.now() - new Date(t.timer_started_at).getTime()) / 1000);
  }
  return secs;
}
function fmtTimer(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
async function startTimer(id) {
  const task = S.tasks.find(t => t.id === id); if (!task) return;
  if (timerRunning(task)) return; // already running
  await patch(id, {
    timer_started_at: new Date().toISOString(),
    timer_stopped_at: null,
  }, 'Timer started');
  startTickLoop();
  render(); if (S.openId === id) await refreshDrawer();
}
async function stopTimer(id) {
  const task = S.tasks.find(t => t.id === id); if (!task) return;
  if (!timerRunning(task)) return;
  const elapsed = timerElapsed(task); // compute before clearing
  await patch(id, {
    timer_started_at: null,
    timer_stopped_at: new Date().toISOString(),
    timer_total_seconds: elapsed,
  }, `Timer stopped (${fmtTimer(elapsed)})`);
  render(); if (S.openId === id) await refreshDrawer();
}
function startTickLoop() {
  if (S.timerTick) return;
  S.timerTick = setInterval(() => {
    // Update all running timers in DOM
    S.tasks.filter(timerRunning).forEach(t => {
      const el = document.getElementById('timer-' + t.id);
      if (el) { el.textContent = fmtTimer(timerElapsed(t)); }
    });
    // Drawer timer
    if (S.openId) {
      const task = S.tasks.find(t => t.id === S.openId);
      if (task && timerRunning(task)) {
        const el = document.getElementById('dr-timer-disp');
        if (el) el.textContent = fmtTimer(timerElapsed(task));
      }
    }
  }, 1000);
}

// ── LOAD / DAY CALCULATION ────────────────────────────────────────────────────
function calcDayLoad() {
  const active = S.tasks.filter(t => t.stage !== 'done' && t.stage !== 'blocked');
  const timed  = active.filter(t => t.task_time || t.time);
  const total  = S.tasks.length;

  // Estimate hours: each task ~45min if no time, or 1h if timed
  const estHours = (active.length * 0.75);
  const schedHours = timed.length; // rough: 1h per timed task

  document.getElementById('hours-bar').style.display = total > 0 ? '' : 'none';
  const pct = Math.min(100, Math.round(schedHours / 16 * 100)); // 16h day
  document.getElementById('hours-fill').style.width = pct + '%';
  document.getElementById('hours-val').textContent = schedHours + 'h scheduled';

  const lm = document.getElementById('load-meter');
  if (total === 0) { lm.style.display = 'none'; return; }
  lm.style.display = '';

  if (active.length === 0)            { lm.className = 'load-meter light';  lm.textContent = 'Clear day — all tasks done'; }
  else if (active.length <= 3)        { lm.className = 'load-meter light';  lm.textContent = `${active.length} tasks — light load`; }
  else if (active.length <= 6)        { lm.className = 'load-meter medium'; lm.textContent = `${active.length} tasks — moderate load, ${schedHours}h scheduled`; }
  else if (active.length <= 9)        { lm.className = 'load-meter heavy';  lm.textContent = `${active.length} tasks — heavy day, consider deferring some`; }
  else                                 { lm.className = 'load-meter maxed'; lm.textContent = `${active.length} tasks — maxed out. Prioritise ruthlessly.`; }
}

let S_dateFilter = 'today'; // 'today' | 'week' | 'all'

async function loadTasks() {
  setSyncing(true);
  try {
    let raw;
    if (S_dateFilter === 'today') {
      raw = await SB.getTasks(today());
    } else if (S_dateFilter === 'week') {
      const d7 = new Date(); d7.setDate(d7.getDate()-7);
      raw = await SB.getTasksRange(d7.toISOString().slice(0,10), today());
    } else {
      // all: last 90 days
      const d90 = new Date(); d90.setDate(d90.getDate()-90);
      raw = await SB.getTasksRange(d90.toISOString().slice(0,10), today());
    }
    S.tasks = (raw || []).map(norm);
    // Sort by task_date desc, then created_at
    S.tasks.sort((a,b) => {
      const dd = (b.task_date||b.date||'').localeCompare(a.task_date||a.date||'');
      return dd !== 0 ? dd : new Date(b.created_at)-new Date(a.created_at);
    });
    setSyncing(false);
  } catch(e) {
    setSyncing(false, true);
    toast('Sync failed: ' + e.message, 'err');
  }
}

let authMode = 'login';
function switchTab(m) {
  authMode = m;
  document.querySelectorAll('.atab').forEach(t => t.classList.toggle('active', t.dataset.m === m));
  document.getElementById('af-name').style.display = m === 'signup' ? '' : 'none';
  document.getElementById('a-btn-txt').textContent = m === 'signup' ? 'Create Account' : 'Sign In';

function authMsg(msg, isErr) {
  const el = document.getElementById(isErr ? 'a-err' : 'a-ok');
  el.textContent = msg; el.className = (isErr ? 'auth-err' : 'auth-ok') + (msg ? ' on' : '');
}
async function doAuth() {
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  const name  = document.getElementById('a-name')?.value.trim() || '';
  authMsg('', true); authMsg('', false);
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { authMsg('Enter a valid email', true); return; }
  if (pass.length < 6) { authMsg('Password must be 6+ characters', true); return; }
  if (authMode === 'signup' && !name) { authMsg('Enter your name', true); return; }
  const btn = document.getElementById('a-btn');
  btn.disabled = true; btn.textContent = authMode === 'signup' ? 'Creating...' : 'Signing in...';
  try {
    if (authMode === 'signup') {
      const res = await SB.signUp(email, pass, name);
      if (res?.access_token) { await init(); }
      else authMsg('Check your email to confirm account', false);
    } else {
      await SB.signIn(email, pass);
      await init();
    }
  } catch(e) {
    let msg = e.message || 'Something went wrong';
    if (msg.includes('Invalid login')) msg = 'Wrong email or password';
    if (msg.includes('Email not confirmed')) msg = 'Confirm your email first';
    if (msg.includes('User already registered')) msg = 'Account exists - sign in instead';
    authMsg(msg, true);
  }
  btn.disabled = false; btn.textContent = authMode === 'signup' ? 'Create Account' : 'Sign In';
}
